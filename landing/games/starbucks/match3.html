            align-items: center;
            justify-content: center;

        }

            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        }

            aspect-ratio: 1;
            border: 1px solid #e5e7eb;
        }

<style>.screen:not(.active){display:none!important}.screen.active{display:block!important}</style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <script>
        let gameState = null;

        /** @returns {object} */
        function initState() { return {
        screen: 'home',
        board: Array(8).fill(null).map(() => Array(8).fill(0)),
        selectedCell: null,
        score: 0,
        moves: 30,
        level: 1,
        maxLevel: 20,
        gameActive: false,
        coins: 100,
        powerups: {
            bomb: 0,
            shuffle: 0,
            extraMoves: 0
        },
        settings: {
            soundEnabled: true,
            musicEnabled: true,
            difficulty: 'normal'
        },
        highScores: [
            { level: 1, score: 5000, moves: 25 },
            { level: 2, score: 4500, moves: 28 },
            { level: 3, score: 4000, moves: 30 }
        ],
        levelTargets: {
            1: { targetScore: 1000, moves: 30 },
            2: { targetScore: 1500, moves: 28 },
            3: { targetScore: 2000, moves: 26 },
            4: { targetScore: 2500, moves: 25 },
            5: { targetScore: 3000, moves: 24 }
        }
    } }

        /** @param {object} state @param {object} action @returns {object} */
        function handleAction(state, action) { let newState = { ...state };

switch (action.type) {
    case 'navigate':
        newState.screen = action.screen;
        if (action.screen === 'gameplay') {
            newState.board = generateBoard(newState);
            newState.selectedCell = null;
            newState.score = 0;
            newState.moves = 30;
            newState.gameOver = false;
        }
        break;

    case 'select_level':
        newState.level = action.level;
        newState.screen = 'gameplay';
        newState.board = generateBoard(newState);
        newState.selectedCell = null;
        newState.score = 0;
        newState.moves = 30;
        newState.gameOver = false;
        break;

    case 'cell_click':
        if (newState.gameOver) break;
        
        if (!newState.selectedCell) {
            newState.selectedCell = { row: action.row, col: action.col };
        } else {
            let { row: row1, col: col1 } = newState.selectedCell;
            let { row: row2, col: col2 } = { row: action.row, col: action.col };
            
            if (row1 === row2 && col1 === col2) {
                newState.selectedCell = null;
            } else if (Math.abs(row1 - row2) + Math.abs(col1 - col2) === 1) {
                if (isValidSwap(newState, row1, col1, row2, col2)) {
                    let swappedState = swapPieces(newState, row1, col1, row2, col2);
                    newState.board = swappedState.board;
                    newState.moves = Math.max(0, newState.moves - 1);
                    
                    let allMatches = [];
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 8; c++) {
                            let matches = findMatches(newState, r, c);
                            if (matches.length >= 3) {
                                allMatches.push(...matches);
                            }
                        }
                    }
                    
                    if (allMatches.length > 0) {
                        let uniqueMatches = [];
                        let seen = new Set();
                        for (let match of allMatches) {
                            let key = `${match[0]},${match[1]}`;
                            if (!seen.has(key)) {
                                seen.add(key);
                                uniqueMatches.push(match);
                            }
                        }
                        
                        let removedState = removeMatches(newState, uniqueMatches);
                        newState.board = removedState.board;
                        newState.score += uniqueMatches.length * 10;
                        
                        let droppedState = dropPieces(newState);
                        newState.board = droppedState.board;
                        
                        let filledState = fillEmpty(newState);
                        newState.board = filledState.board;
                    }
                }
                newState.selectedCell = null;
            } else {
                newState.selectedCell = { row: action.row, col: action.col };
            }
        }
        
        if (checkGameOver(newState)) {
            newState.gameOver = true;
            newState.screen = 'game_result';
        } else if (checkLevelComplete(newState)) {
            newState.screen = 'game_result';
        }
        break;

    case 'pause':
        newState.screen = 'pause_menu';
        break;

    case 'resume':
        newState.screen = 'gameplay';
        break;

    case 'restart':
        newState.board = generateBoard(newState);
        newState.selectedCell = null;
        newState.score = 0;
        newState.moves = 30;
        newState.gameOver = false;
        newState.screen = 'gameplay';
        break;

    case 'quit':
        newState.screen = 'home';
        break;

    case 'next_level':
        newState.level++;
        newState.board = generateBoard(newState);
        newState.selectedCell = null;
        newState.score = 0;
        newState.moves = 30;
        newState.gameOver = false;
        newState.screen = 'gameplay';
        break;

    case 'replay':
        newState.board = generateBoard(newState);
        newState.selectedCell = null;
        newState.score = 0;
        newState.moves = 30;
        newState.gameOver = false;
        newState.screen = 'gameplay';
        break;

    case 'buy_item':
        if (newState.coins >= action.cost) {
            newState.coins -= action.cost;
            if (!newState.inventory) newState.inventory = [];
            newState.inventory.push(action.item);
        }
        break;

    case 'toggle_sound':
        newState.soundEnabled = !newState.soundEnabled;
        break;

    case 'toggle_music':
        newState.musicEnabled = !newState.musicEnabled;
        break;

    default:
        break;
}

return newState; }

        /** @param {object} state @returns {void} */
        function render(state) { showScreen(state.screen);

    // Update score and moves display
    let scoreEl = document.getElementById('score-display');
    let movesEl = document.getElementById('moves-display');
    if (scoreEl) scoreEl.textContent = state.score;
    if (movesEl) movesEl.textContent = state.moves;

    // Render game board if on gameplay screen
    if (state.screen === 'gameplay') {
        renderBoard(state);
    }

    // Render level select if on level select screen
    if (state.screen === 'level_select') {
        renderLevelSelect(state);
    }

    // Render shop if on shop screen
    if (state.screen === 'shop') {
        renderShop(state);
    }

    // Render high scores if on high scores screen
    if (state.screen === 'high_scores') {
        renderHighScores(state);
    }

    // Render settings if on settings screen
    if (state.screen === 'settings') {
        renderSettings(state);
    }

    // Render game result screen
    if (state.screen === 'game_result') {
        let titleEl = document.getElementById('result-title');
        let statsEl = document.getElementById('result-stats');
        let nextBtnEl = document.getElementById('next-level-btn');
        
        if (titleEl) {
            titleEl.textContent = state.gameWon ? 'Level Complete!' : 'Game Over';
        }
        
        if (statsEl) {
            statsEl.innerHTML = `
                <div>Score: ${state.score}</div>
                <div>Level: ${state.level}</div>
            `;
        }
        
        if (nextBtnEl) {
            nextBtnEl.style.display = state.gameWon ? 'block' : 'none';
        }
    } }

        /** @param {string} screenId @returns {void} */
        function showScreen(screenId) { // Hide all screens first
let screens = document.querySelectorAll('.screen');
screens.forEach(screen => screen.classList.remove('active'));

// Show the requested screen
let targetScreen = document.getElementById(screenId + '-screen');
if (targetScreen) {
    targetScreen.classList.add('active');
} }

        /** @returns {void} */
        function startGame() { gameState = initState();
render(gameState);

// Home screen buttons
document.getElementById('play-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'gameplay'});
    render(gameState);
});

document.getElementById('levels-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'level_select'});
    render(gameState);
});

document.getElementById('shop-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'shop'});
    render(gameState);
});

document.getElementById('scores-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'high_scores'});
    render(gameState);
});

// Level select screen
document.getElementById('back-from-levels-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'home'});
    render(gameState);
});

// Gameplay screen
document.getElementById('pause-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'pause'});
    render(gameState);
});

document.getElementById('settings-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'settings'});
    render(gameState);
});

// Pause menu screen
document.getElementById('resume-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'resume'});
    render(gameState);
});

document.getElementById('restart-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'restart'});
    render(gameState);
});

document.getElementById('quit-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'quit'});
    render(gameState);
});

// Settings screen
document.getElementById('back-from-settings-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'gameplay'});
    render(gameState);
});

// Shop screen
document.getElementById('back-from-shop-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'home'});
    render(gameState);
});

// Game result screen
document.getElementById('next-level-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'next_level'});
    render(gameState);
});

document.getElementById('replay-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'replay'});
    render(gameState);
});

document.getElementById('home-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'quit'});
    render(gameState);
});

// High scores screen
document.getElementById('back-from-scores-btn').addEventListener('click', () => {
    gameState = handleAction(gameState, {type: 'navigate', screen: 'home'});
    render(gameState);
}); }

        /** @param {object} state @returns {void} */
        function renderBoard(state) { let board = gameState.board;
    let boardElement = document.getElementById('game-board');
    
    if (!boardElement || !board) return;
    
    boardElement.innerHTML = '';
    
    for (let row = 0; row < board.length; row++) {
        for (let col = 0; col < board[row].length; col++) {
            let cellDiv = document.createElement('div');
            cellDiv.className = 'grid-cell flex items-center justify-center';
            
            let pieceType = board[row][col];
            if (pieceType > 0) {
                let pieceDiv = document.createElement('div');
                pieceDiv.className = 'game-piece';
                pieceDiv.textContent = getPieceEmoji(pieceType);
                
                if (state.selectedCell && state.selectedCell.row === row && state.selectedCell.col === col) {
                    pieceDiv.classList.add('piece-selected');
                }
                
                pieceDiv.addEventListener('click', () => handleBoardClick(row, col));
                cellDiv.appendChild(pieceDiv);
            }
            
            boardElement.appendChild(cellDiv);
        }
    } }

        /** @param {number} row @param {number} col @returns {void} */
        function handleBoardClick(row, col) {
    if (!gameState.board || gameState.gameOver) return;
    if (row < 0 || row >= 8 || col < 0 || col >= 8) return;
    gameState = handleAction(gameState, {type: 'cell_click', row: row, col: col});
    render(gameState);
}

        /** @param {object} state @returns {Array<Array<number>>} */
        function generateBoard(state) { let board = [];
    let rows = 8;
    let cols = 8;
    
    for (let row = 0; row < rows; row++) {
        board[row] = [];
        for (let col = 0; col < cols; col++) {
            let pieceType;
            let attempts = 0;
            let maxAttempts = 10;
            
            do {
                pieceType = getRandomPieceType();
                attempts++;
            } while (attempts < maxAttempts && wouldCreateMatch(board, row, col, pieceType));
            
            board[row][col] = pieceType;
        }
    }
    
    function wouldCreateMatch(board, row, col, pieceType) {
        // Check horizontal match (3 in a row)
        if (col >= 2 && 
            board[row][col-1] === pieceType && 
            board[row][col-2] === pieceType) {
            return true;
        }
        
        // Check vertical match (3 in a row)
        if (row >= 2 && 
            board[row-1] && board[row-2] &&
            board[row-1][col] === pieceType && 
            board[row-2][col] === pieceType) {
            return true;
        }
        
        return false;
    }
    
    return board; }

        /** @param {object} state @param {number} row @param {number} col @returns {Array<[number,number]>} */
        function findMatches(state, row, col) { // Find all connected matches starting from the given position
if (state.board[row][col] === 0) return []; // Empty cell has no matches

let pieceType = state.board[row][col];
let matches = [];
let visited = Array(8).fill().map(() => Array(8).fill(false));

// Check horizontal matches
let horizontalMatches = [[row, col]];
visited[row][col] = true;

// Check left
for (let c = col - 1; c >= 0; c--) {
    if (state.board[row][c] === pieceType) {
        horizontalMatches.push([row, c]);
        visited[row][c] = true;
    } else {
        break;
    }
}

// Check right
for (let c = col + 1; c < 8; c++) {
    if (state.board[row][c] === pieceType) {
        horizontalMatches.push([row, c]);
        visited[row][c] = true;
    } else {
        break;
    }
}

// Add horizontal matches if 3 or more
if (horizontalMatches.length >= 3) {
    matches = matches.concat(horizontalMatches);
}

// Reset visited for vertical check
visited = Array(8).fill().map(() => Array(8).fill(false));

// Check vertical matches
let verticalMatches = [[row, col]];
visited[row][col] = true;

// Check up
for (let r = row - 1; r >= 0; r--) {
    if (state.board[r][col] === pieceType) {
        verticalMatches.push([r, col]);
        visited[r][col] = true;
    } else {
        break;
    }
}

// Check down
for (let r = row + 1; r < 8; r++) {
    if (state.board[r][col] === pieceType) {
        verticalMatches.push([r, col]);
        visited[r][col] = true;
    } else {
        break;
    }
}

// Add vertical matches if 3 or more
if (verticalMatches.length >= 3) {
    matches = matches.concat(verticalMatches);
}

// Remove duplicates (the center piece might be in both horizontal and vertical)
let uniqueMatches = [];
for (let match of matches) {
    let isDuplicate = false;
    for (let unique of uniqueMatches) {
        if (unique[0] === match[0] && unique[1] === match[1]) {
            isDuplicate = true;
            break;
        }
    }
    if (!isDuplicate) {
        uniqueMatches.push(match);
    }
}

return uniqueMatches; }

        /** @param {object} state @param {Array<[number,number]>} matches @returns {object} */
        function removeMatches(state, matches) { let newState = { ...state };
    let newBoard = state.board.map(row => [...row]);
    let newScore = state.score;
    
    // Remove matched pieces and calculate score
    for (let match of matches) {
        var [row, col] = match;
        newBoard[row][col] = 0; // 0 represents empty cell
        newScore += 10; // Points per piece matched
    }
    
    newState.board = newBoard;
    newState.score = newScore;
    
    return newState; }

        /** @param {object} state @returns {object} */
        function dropPieces(state) { let newBoard = state.board.map(row => [...row]);
    let piecesDropped = false;
    
    // Process each column from bottom to top
    for (let col = 0; col < newBoard[0].length; col++) {
        let writePos = newBoard.length - 1;
        
        // Move all non-zero pieces down
        for (let row = newBoard.length - 1; row >= 0; row--) {
            if (newBoard[row][col] !== 0) {
                if (row !== writePos) {
                    newBoard[writePos][col] = newBoard[row][col];
                    newBoard[row][col] = 0;
                    piecesDropped = true;
                }
                writePos--;
            }
        }
    }
    
    return { ...state, board: newBoard }; }

        /** @param {object} state @returns {object} */
        function fillEmpty(state) { let newState = { ...state };
    let board = newState.board.map(row => [...row]);
    let changed = false;

    // Fill empty cells (0) from top to bottom
    for (let col = 0; col < board[0].length; col++) {
        for (let row = board.length - 1; row >= 0; row--) {
            if (board[row][col] === 0) {
                board[row][col] = getRandomPieceType();
                changed = true;
            }
        }
    }

    newState.board = board;
    return newState; }

        /** @param {object} state @param {number} row1 @param {number} col1 @param {number} row2 @param {number} col2 @returns {boolean} */
        function isValidSwap(state, row1, col1, row2, col2) { // Check if two adjacent cells can be swapped
if (Math.abs(row1 - row2) + Math.abs(col1 - col2) !== 1) {
    return false;
}

// Check bounds
if (row1 < 0 || row1 >= 8 || col1 < 0 || col1 >= 8 ||
    row2 < 0 || row2 >= 8 || col2 < 0 || col2 >= 8) {
    return false;
}

// Create a temporary board with swapped pieces
let tempBoard = state.board.map(row => [...row]);
let temp = tempBoard[row1][col1];
tempBoard[row1][col1] = tempBoard[row2][col2];
tempBoard[row2][col2] = temp;

// Create temporary state
let tempState = { ...state, board: tempBoard };

// Check if either position creates matches
let matches1 = findMatches(tempState, row1, col1);
let matches2 = findMatches(tempState, row2, col2);

return matches1.length > 0 || matches2.length > 0; }

        /** @param {object} state @param {number} row1 @param {number} col1 @param {number} row2 @param {number} col2 @returns {object} */
        function swapPieces(state, row1, col1, row2, col2) { let newBoard = state.board.map(row => [...row]);
    
    // Swap the pieces
    let temp = newBoard[row1][col1];
    newBoard[row1][col1] = newBoard[row2][col2];
    newBoard[row2][col2] = temp;
    
    return {
        ...state,
        board: newBoard
    }; }

        /** @param {object} state @returns {boolean} */
        function checkGameOver(state) {
if (state.moves <= 0) {
    return true;
}

for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
        if (col < 7) {
            if (isValidSwap(state, row, col, row, col + 1)) {
                return false;
            }
        }
        if (row < 7) {
            if (isValidSwap(state, row, col, row + 1, col)) {
                return false;
            }
        }
    }
}

return true; }

        /** @param {object} state @returns {boolean} */
        function checkLevelComplete(state) {
let target = state.levelTargets && state.levelTargets[state.level];
if (target && target.targetScore && state.score >= target.targetScore) {
    return true;
}
return false; }
