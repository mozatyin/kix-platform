<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>消消乐 - Match-3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gem-0: #ff4757;
            --gem-1: #ffa502;
            --gem-2: #ffdd59;
            --gem-3: #2ed573;
            --gem-4: #1e90ff;
            --gem-5: #a55eea;
            --cell-size: 10vw;
            --max-cell: 42px;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
        body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#eee;overflow-x:hidden;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
        .screen{display:none;width:100%;max-width:460px;min-height:100dvh;flex-direction:column;align-items:center;padding:16px 12px 80px}
        .screen.active{display:flex}
        .hidden{display:none!important}
        #game-board{display:grid;gap:3px;padding:8px;background:rgba(255,255,255,.06);border-radius:16px;justify-content:center;align-content:center}
        .gem-cell{width:var(--cell-size);height:var(--cell-size);max-width:var(--max-cell);max-height:var(--max-cell);border-radius:10px;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,5vw,26px);box-shadow:0 3px 8px rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.25);position:relative}
        .gem-cell:active{transform:scale(.88)}
        .gem-cell.selected{box-shadow:0 0 0 3px #fff,0 0 18px 4px #ffd700,0 4px 12px rgba(0,0,0,.4);z-index:2;animation:pulse .8s ease-in-out infinite}
        .gem-cell.matched{animation:popOut .35s ease-out forwards}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 3px #fff,0 0 18px 4px #ffd700,0 4px 12px rgba(0,0,0,.4)}50%{box-shadow:0 0 0 5px #fff,0 0 26px 8px #ffd700,0 4px 16px rgba(0,0,0,.5)}}
        @keyframes popOut{0%{transform:scale(1);opacity:1}50%{transform:scale(1.25);opacity:.7}100%{transform:scale(0);opacity:0}}
        @keyframes dropIn{0%{transform:translateY(-60px);opacity:.3}100%{transform:translateY(0);opacity:1}}
        .gem-cell.dropping{animation:dropIn .28s ease-out}
        #action-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:40;width:100%;max-width:460px;display:flex;justify-content:space-around;align-items:center;padding:10px 8px;background:rgba(20,20,40,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.08);gap:6px;flex-wrap:wrap}
        #action-bar button{flex:1;min-width:48px;max-width:100px;padding:10px 8px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;color:#fff;letter-spacing:.3px;white-space:nowrap}
        #action-bar button:active{transform:scale(.94);opacity:.85}
        .btn-primary{background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
        .btn-secondary{background:linear-gradient(135deg,#4a4a6a,#2d2d4a)}
        .btn-accent{background:linear-gradient(135deg,#ffd700,#f0a500);color:#1a1a2e!important}
        .btn-success{background:linear-gradient(135deg,#2ed573,#1abc9c)}
        .btn-danger{background:linear-gradient(135deg,#ff4757,#c0392b)}
        .overlay-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:35;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
        .score-pop{position:absolute;font-weight:700;font-size:20px;color:#ffd700;pointer-events:none;animation:scoreFly .9s ease-out forwards;z-index:10}
        @keyframes scoreFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.4)}}
    </style>
<style>.screen:not(.active){display:none!important}.screen.active{display:block!important}
/* RING0: intersection-based board — SVG background lines */
.board{background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 100'><line x1='5' y1='5' x2='85' y2='5' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='15' x2='85' y2='15' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='25' x2='85' y2='25' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='35' x2='85' y2='35' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='45' x2='85' y2='45' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='55' x2='85' y2='55' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='65' x2='85' y2='65' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='75' x2='85' y2='75' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='85' x2='85' y2='85' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='95' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='5' x2='5' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='15' y1='5' x2='15' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='25' y1='5' x2='25' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='35' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='45' y1='5' x2='45' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='55' y1='5' x2='55' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='65' y1='5' x2='65' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='75' y1='5' x2='75' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='85' y1='5' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='55' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='5' x2='35' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='35' y1='75' x2='55' y2='95' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='75' x2='35' y2='95' stroke='%238B4513' stroke-width='0.8'/></svg>")!important;background-size:100% 100%!important;background-repeat:no-repeat!important;background-color:#E8D5A0!important}}
/* Clear cell borders — SVG handles all lines */
.board>div,.board>*,.cell,[class*=cell],[class*=board-cell]{border:none!important;background:transparent!important}
</style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>
</head>
<body class="flex flex-col items-center w-full min-h-dvh bg-[#1a1a2e]">

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen">
        <div style="font-size:48px;margin-bottom:8px">☕</div>
<h1 style="font-size:2rem;font-weight:700;color:white;margin-bottom:4px">南洋茶饮</h1>
        <p class="text-gray-400 text-sm mb-8">Match-3 Puzzle</p>
        <div id="home-menu" class="flex flex-col gap-4 w-full max-w-xs mt-4"></div>
    </div>

    <!-- LEVEL SELECT SCREEN -->
    <div id="level_select-screen" class="screen">
        <h2 class="text-2xl font-bold mt-4 mb-6">选择关卡</h2>
        <div id="level-grid" class="grid grid-cols-4 gap-3 w-full max-w-sm"></div>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="gameplay-screen" class="screen">
        <div class="flex justify-between items-center w-full max-w-sm mb-3 px-2">
            <span id="score-display" class="text-lg font-bold text-yellow-400">⭐ 0</span>
            <span id="level-display" class="text-sm text-gray-400">关卡 1</span>
            <span id="moves-display" class="text-lg font-bold text-cyan-300">🔁 30</span>
        </div>
        <div id="game-board" class="mx-auto"></div>
        <div id="combo-indicator" class="h-7 text-center text-orange-400 font-bold text-sm mt-2"></div>
    </div>

    <!-- PAUSE MENU SCREEN -->
    <div id="pause_menu-screen" class="screen">
        <div class="overlay-mask"></div>
        <div class="relative z-40 bg-[#1e1e3a] rounded-2xl p-8 flex flex-col items-center gap-5 mt-32 w-[85%] max-w-xs shadow-2xl border border-white/10">
            <h2 class="text-2xl font-bold">暂停</h2>
            <div id="pause-buttons" class="flex flex-col gap-3 w-full"></div>
        </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settings-screen" class="screen">
        <h2 class="text-2xl font-bold mt-4 mb-8">设置</h2>
        <div id="settings-options" class="flex flex-col gap-5 w-full max-w-xs"></div>
    </div>

    <!-- SHOP SCREEN -->
    <div id="shop-screen" class="screen">
        <h2 class="text-2xl font-bold mt-4 mb-2">商店</h2>
        <span id="coins-display" class="text-yellow-400 font-bold text-lg mb-5">🪙 100</span>
        <div id="shop-items" class="flex flex-col gap-4 w-full max-w-xs"></div>
    </div>

    <!-- GAME RESULT SCREEN -->
    <div id="game_result-screen" class="screen">
        <div class="overlay-mask"></div>
        <div class="relative z-40 bg-[#1e1e3a] rounded-2xl p-8 flex flex-col items-center gap-4 mt-20 w-[85%] max-w-xs shadow-2xl border border-white/10">
            <h2 id="result-title" class="text-3xl font-extrabold"></h2>
            <p id="result-score" class="text-xl text-yellow-400"></p>
            <div id="result-stars" class="flex gap-2 text-3xl"></div>
            <div id="result-buttons" class="flex flex-col gap-3 w-full mt-2"></div>
        </div>
    </div>

    <!-- HIGH SCORES SCREEN -->
    <div id="high_scores-screen" class="screen">
        <h2 class="text-2xl font-bold mt-4 mb-6">🏆 排行榜</h2>
        <div id="scores-list" class="flex flex-col gap-2 w-full max-w-xs"></div>
    </div>

    <!-- FIXED BOTTOM ACTION BAR -->
    <div id="action-bar">
        <button id="btn-home" class="btn-secondary">🏠 主菜单</button>
        <button id="btn-play" class="btn-primary">▶ 开始</button>
        <button id="btn-pause" class="btn-accent">⏸ 暂停</button>
        <button id="btn-resume" class="btn-success">▶ 继续</button>
        <button id="btn-restart" class="btn-secondary">🔄 重来</button>
        <button id="btn-settings" class="btn-secondary">⚙ 设置</button>
        <button id="btn-shop" class="btn-accent">🛒 商店</button>
        <button id="btn-scores" class="btn-secondary">🏆 排行</button>
        <button id="btn-next-level" class="btn-success">▶ 下一关</button>
        <button id="btn-quit" class="btn-danger">🚪 退出</button>
    </div>

    <script>
        /* ======================== GAME STATE ======================== */
        /** @type {object} */
        let gameState;

        /* ======================== CORE FUNCTIONS ======================== */

        /** Initializes and returns the full default game state object.
         *  @returns {object} */
        function initState() { let initialLevels = [];
let totalLevels = 20;
for (let i = 0; i < totalLevels; i++) {
  initialLevels.push({
    unlocked: i === 0,
    stars: 0,
    bestScore: 0
  });
}
let state = {
  screen: 'home',
  levels: initialLevels,
  currentLevel: 1,
  board: null,
  rows: 8,
  cols: 8,
  gemTypes: 6,
  moves: 30,
  score: 0,
  targetScore: 500,
  combo: 0,
  selectedCell: null,
  isProcessing: false,
  settings: { sound: true, music: true },
  coins: 100,
  highScores: [
    { score: 200, level: 1, timestamp: 1700000000000 },
    { score: 150, level: 1, timestamp: 1690000000000 },
  ]
};
return state; }

        /** Pure synchronous state reducer. Deep clones state, applies action, returns new state.
         *  @param {object} state
         *  @param {object} action - flat object, e.g. {type:'NAVIGATE', target:'gameplay'}
         *  @returns {object} */
        function handleAction(state, action) { let newState = JSON.parse(JSON.stringify(state));
switch (action.type) {
  case 'NAVIGATE': {
    newState.screen = action.target;
    if (newState.screen !== 'gameplay') {
      newState.selected = null;
    }
    break;
  }
  case 'START_LEVEL': {
    let level = action.level || newState.level || 1;
    newState.level = level;
    let data = generateLevelData(level);
    newState.board = createBoard(data.rows, data.cols, data.gemTypes);
    newState.score = 0;; if (window._kixUpdateScore) window._kixUpdateScore(newState.score);
    newState.moves = data.moves;
    newState.targetScore = data.targetScore;
    newState.combo = 0;
    newState.selected = null;
    newState.gameStatus = 'playing';
    newState.screen = 'gameplay';
    break;
  }
  case 'BOARD_CLICK': {
    if (newState.screen === 'gameplay' && newState.gameStatus === 'playing') {
      newState = handleBoardClick(newState, action.row, action.col);
    }
    break;
  }
  case 'PAUSE': {
    newState.previousScreen = newState.screen;
    newState.screen = 'pause_menu';
    break;
  }
  case 'RESUME': {
    newState.screen = newState.previousScreen || 'gameplay';
    newState.previousScreen = null;
    break;
  }
  case 'RESTART': {
    let data = generateLevelData(newState.level);
    newState.board = createBoard(data.rows, data.cols, data.gemTypes);
    newState.score = 0;
    newState.moves = data.moves;
    newState.targetScore = data.targetScore;
    newState.combo = 0;
    newState.selected = null;
    newState.gameStatus = 'playing';
    newState.screen = 'gameplay';
    break;
  }
  case 'QUIT': {
    newState.screen = 'home';
    newState.selected = null;
    newState.board = null;
    newState.score = 0;
    newState.moves = 0;
    newState.gameStatus = null;
    newState.combo = 0;
    break;
  }
  case 'SETTINGS': {
    newState.screen = 'settings';
    break;
  }
  case 'SHOP': {
    newState.screen = 'shop';
    break;
  }
  case 'HIGH_SCORES': {
    newState.screen = 'high_scores';
    break;
  }
  case 'NEXT_LEVEL': {
    if (newState.gameStatus === 'won') {
      let nextLevel = newState.level + 1;
      let data = generateLevelData(nextLevel);
      newState.level = nextLevel;
      newState.board = createBoard(data.rows, data.cols, data.gemTypes);
      newState.score = 0;
      newState.moves = data.moves;
      newState.targetScore = data.targetScore;
      newState.combo = 0;
      newState.selected = null;
      newState.gameStatus = 'playing';
      newState.screen = 'gameplay';
    }
    break;
  }
  case 'TOGGLE_SOUND': {
    if (!newState.settings) newState.settings = {};
    newState.settings.soundEnabled = !newState.settings.soundEnabled;
    break;
  }
  case 'TOGGLE_MUSIC': {
    if (!newState.settings) newState.settings = {};
    newState.settings.musicEnabled = !newState.settings.musicEnabled;
    break;
  }
  case 'BUY_ITEM': {
    let item = action.item;
    let cost = 0;
    if (item === 'moves') cost = 10;
    else if (item === 'bomb') cost = 15;
    if (newState.coins >= cost) {
      newState.coins -= cost;
      if (item === 'moves') {
        newState.moves += 5;
      }
    }
    break;
  }
  case 'ADD_HIGH_SCORE': {
    if (!newState.highScores) newState.highScores = [];
    newState.highScores.push({
      score: action.score,
      level: newState.level || 1,
      date: new Date().toISOString()
    });
    newState.highScores.sort((a, b) => b.score - a.score);
    if (newState.highScores.length > 10) {
      newState.highScores = newState.highScores.slice(0, 10);
    }
    break;
  }
  default:
    break;
}
return newState; }

        /** Reads state.screen, builds all visible DOM content, calls showScreen.
         *  @param {object} state */
        function render(state) { showScreen(state.screen);
updateActionBar(state.screen);

switch (state.screen) {
    case 'home':
        renderHomeScreen(state);
        break;
    case 'level_select':
        renderLevelSelect(state);
        break;
    case 'gameplay':
        document.getElementById('score-display').textContent = '⭐ ' + state.score;
        document.getElementById('level-display').textContent = '关卡 ' + state.level;
        document.getElementById('moves-display').textContent = '🔁 ' + state.moves;
        document.getElementById('combo-indicator').textContent = state.combo > 0 ? '🔥 连击 x' + state.combo : '';
        renderBoard(state);
        break;
    case 'pause_menu':
        renderPauseMenu(state);
        break;
    case 'settings':
        renderSettings(state);
        break;
    case 'shop':
        renderShop(state);
        break;
    case 'game_result':
        renderGameResult(state);
        break;
    case 'high_scores':
        renderHighScores(state);
        break;
    default:
        break;
} }

        /** Shows the screen div whose ID is screenId + '-screen'. Hides all others.
         *  @param {string} screenId - base name (e.g. 'home', 'gameplay') */
        function showScreen(screenId) { let screens = document.querySelectorAll('.screen');
for (let i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
}
let targetScreen = document.getElementById(screenId + '-screen');
if (targetScreen) {
    targetScreen.classList.add('active');
} }

        /** Entry point. Called once on DOMContentLoaded. Creates state, wires all button listeners, calls render. */
        function startGame() { gameState = initState();
render(gameState);

document.getElementById('btn-home').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NAVIGATE', target: 'home'});
    render(gameState);
});

document.getElementById('btn-play').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NAVIGATE', target: 'level_select'});
    render(gameState);
});

document.getElementById('btn-pause').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'PAUSE'});
    render(gameState);
});

document.getElementById('btn-resume').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'RESUME'});
    render(gameState);
});

document.getElementById('btn-restart').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'RESTART'});
    render(gameState);
});

document.getElementById('btn-settings').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NAVIGATE', target: 'settings'});
    render(gameState);
});

document.getElementById('btn-shop').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NAVIGATE', target: 'shop'});
    render(gameState);
});

document.getElementById('btn-scores').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NAVIGATE', target: 'high_scores'});
    render(gameState);
});

document.getElementById('btn-next-level').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'NEXT_LEVEL'});
    render(gameState);
});

document.getElementById('btn-quit').addEventListener('click', function() {
    gameState = handleAction(gameState, {type: 'QUIT'});
    render(gameState);
});

render(gameState); }

        /* ======================== BOARD & MATCH-3 HELPERS ======================== */

        /** Renders the game board grid into #game-board based on state.board.
         *  @param {object} state */
        function renderBoard(state) { let boardEl = document.getElementById('game-board');
boardEl.innerHTML = '';
boardEl.style.gridTemplateColumns = `repeat(${state.cols}, auto)`;
for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
        let cell = document.createElement('div');
        cell.className = 'gem-cell';
        if (state.selected && state.selected.row === r && state.selected.col === c) {
            cell.classList.add('selected');
        }
        let gemType = state.board[r][c];
        if (gemType !== -1) {
            cell.style.backgroundColor = `var(--gem-${gemType})`;
        } else {
            cell.style.visibility = 'hidden';
        }
        cell.dataset.row = r;
        cell.dataset.col = c;
        boardEl.appendChild(cell);
    }
} }

        /** Handles a click on a board cell at (row, col). Manages gem selection and swap initiation.
         *  @param {object} state
         *  @param {number} row
         *  @param {number} col */
        function handleBoardClick(state, row, col) { if (!state.selected) {
    state.selected = { row, col };
} else {
    let sel = state.selected;
    if (sel.row === row && sel.col === col) {

            render(gameState);
        });
        resultButtons.appendChild(replayBtn);
    } else {
        let retryBtn = document.createElement('button');
        retryBtn.className = 'btn-primary w-full py-3 rounded-xl text-lg font-bold';
        retryBtn.textContent = '🔄 再试一次';
        retryBtn.addEventListener('click', function() {
            handleAction(gameState, {type: 'RESTART_LEVEL'});
            render(gameState);
        });
        resultButtons.appendChild(retryBtn);
    }

    let quitBtn = document.createElement('button');
    quitBtn.className = 'btn-danger w-full py-3 rounded-xl text-lg font-bold';
    quitBtn.textContent = '🏠 返回主菜单';
    quitBtn.addEventListener('click', function() {
        handleAction(gameState, {type: 'NAVIGATE', target: 'home'});
        render(gameState);
    });
    resultButtons.appendChild(quitBtn);
} }

        /** Renders the high scores list.
         *  @param {object} state */
        function renderHighScores(state) { let scoresList = document.getElementById('scores-list');
if (!scoresList) return {};
let scores = state.highScores || [];
let html = '';
if (scores.length === 0) {
    html = '<div class="text-gray-500 text-center py-8">暂无记录</div>';
} else {
    let sorted = [...scores].sort((a, b) => b.score - a.score);
    for (let i = 0; i < sorted.length; i++) {
        let entry = sorted[i];
        let rankDisplay = (i === 0) ? '🥇' : (i === 1) ? '🥈' : (i === 2) ? '🥉' : `${i + 1}`;
        html += `<div class="flex items-center justify-between bg-white/5 rounded-xl px-4 py-3">
            <span class="text-lg font-bold w-8 text-center">${rankDisplay}</span>
            <span class="flex-1 text-left ml-2">${entry.name || '玩家'}</span>
            <span class="text-yellow-400 font-bold text-lg mr-2">${entry.score}</span>
            <span class="text-sm text-gray-400">关卡 ${entry.level || 1}</span>
        </div>`;
    }
}
scoresList.innerHTML = html; }

        /** Updates the visibility of action bar buttons based on current screen.
         *  @param {string} screenId */
        function updateActionBar(screenId) { const visibleMap = {
  home: ['btn-play', 'btn-settings', 'btn-shop', 'btn-scores'],
  level_select: ['btn-home', 'btn-play'],
  gameplay: ['btn-pause', 'btn-restart', 'btn-quit'],
  pause_menu: ['btn-resume', 'btn-restart', 'btn-quit'],
  settings: ['btn-home'],
  shop: ['btn-home'],
  game_result: ['btn-next-level', 'btn-restart', 'btn-home'],
  high_scores: ['btn-home']
};

let toShow = visibleMap[screenId] || [];
let allIds = ['btn-home','btn-play','btn-pause','btn-resume','btn-restart','btn-settings','btn-shop','btn-scores','btn-next-level','btn-quit'];

for (let id of allIds) {
  let btn = document.getElementById(id);
  if (!btn) continue;
  if (toShow.includes(id)) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
} }

        /** Plays a simple haptic-like flash animation on an element.
         *  @param {HTMLElement} el */
        function flashElement(el) { if (!el) return {};
el.animate([
    { transform: 'scale(0.92)', opacity: 0.6 },
    { transform: 'scale(1)', opacity: 1 }
], { duration: 120, easing: 'ease-out' }); }

        /** Shows a floating score popup at a board position.
         *  @param {HTMLElement} boardEl
         *  @param {number} row
         *  @param {number} col
         *  @param {number} points */
        function showScorePopup(boardEl, row, col, points) { let cell = boardEl.querySelector(`.gem-cell[data-row="${row}"][data-col="${col}"]`);
if (!cell) return {};
boardEl.style.position = boardEl.style.position || 'relative';
let boardRect = boardEl.getBoundingClientRect();
let cellRect = cell.getBoundingClientRect();
let left = cellRect.left + cellRect.width / 2 - boardRect.left;
let top = cellRect.top - boardRect.top;
let pop = document.createElement('div');
pop.className = 'score-pop';
pop.textContent = `+${points}`;
pop.style.left = `${left}px`;
pop.style.top = `${top}px`;
boardEl.appendChild(pop);
pop.addEventListener('animationend', () => { pop.remove(); }); }

        /* ======================== BOOTSTRAP ======================== */
        document.addEventListener('DOMContentLoaded', startGame);
    
        function getPieceEmoji(pieceType) { const emojis = ['🍵','🫖','🧋','🍃','🪷','☕']; return emojis[pieceType - 1] || emojis[0]; }
    </script>
