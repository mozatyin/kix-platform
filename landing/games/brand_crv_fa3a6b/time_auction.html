<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow-x:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.screen{position:absolute;top:0;left:0;width:100%;min-height:100dvh;padding-bottom:72px;overflow-y:auto}
.screen.hidden{display:none!important}
#game-board{display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(10,1fr);aspect-ratio:9/10;max-width:360px;width:100%;margin:0 auto;border:2px solid #5d4037;background:#f0d9b5}
#game-board .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;font-size:clamp(14px,4vw,22px);font-weight:bold;cursor:pointer;border:0.5px solid #b8956a}
#game-board .cell.red-piece{color:#c62828;text-shadow:0 1px 0 #fff}
#game-board .cell.black-piece{color:#1a1a1a;text-shadow:0 1px 0 #fff}
#game-board .cell.selected{background:#ffeb3b;box-shadow:inset 0 0 0 3px #f9a825}
#game-board .cell.valid-move{background:rgba(76,175,80,.45);border-radius:50%;box-shadow:inset 0 0 0 2px #388e3c}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#1a1a2e;padding:10px 12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;box-shadow:0 -2px 12px rgba(0,0,0,.35)}
.bottom-bar button{min-width:48px;padding:10px 16px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.bottom-bar button:active{transform:scale(.95);opacity:.85}
.btn-primary{background:#e53935;color:#fff}
.btn-secondary{background:#37474f;color:#fff}
.btn-accent{background:#ff9800;color:#fff}
.btn-success{background:#43a047;color:#fff}
.btn-outline{background:transparent;color:#e0e0e0;border:2px solid #555}
.bottom-bar button.hidden-btn{display:none}
.auction-card{background:linear-gradient(135deg,#1e1e30,#2a2a40);border:2px solid #ff9800;border-radius:16px;padding:20px;margin:12px auto;max-width:360px;text-align:center;color:#fff}
.player-info-bar{display:flex;justify-content:space-between;padding:8px 12px;margin:4px 8px;border-radius:10px;font-weight:600;font-size:14px}
.player-red{background:#ffcdd2;color:#b71c1c}
.player-black{background:#cfd8dc;color:#263238}
.timer-display{font-variant-numeric:tabular-nums;font-size:18px;font-weight:700}
</style>

/* Clear cell borders — SVG handles all lines */
.board>div,.board>*,.cell,[class*=cell],[class*=board-cell]{border:none!important;background:transparent!important}

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

<script>
/* ========== ALL FUNCTION DECLARATIONS ========== */

/** @returns {object} initial game state */
function initState() { let board = [];
for (let row = 0; row < 10; row++) {
  board[row] = [];
  for (let col = 0; col < 9; col++) {
    board[row][col] = null;
  }
}
let types = ['rook','knight','elephant','advisor','general','advisor','elephant','knight','rook'];
for (let i = 0; i < 9; i++) {
  board[0][i] = { color: 'black', type: types[i] };
  board[9][i] = { color: 'red', type: types[i] };
}
board[2][1] = { color: 'black', type: 'cannon' };
board[2][7] = { color: 'black', type: 'cannon' };
board[7][1] = { color: 'red', type: 'cannon' };
board[7][7] = { color: 'red', type: 'cannon' };
for (let i = 0; i < 9; i += 2) {
  board[3][i] = { color: 'black', type: 'pawn' };
  board[6][i] = { color: 'red', type: 'pawn' };
}
return {
  screen: 'home',
  players: [
    { name: '你', color: 'red', timeLeft: 300, isAI: false, capturedPieces: [] },
    { name: '电脑', color: 'black', timeLeft: 300, isAI: true, capturedPieces: [] }
  ],
  board: board,
  currentPlayerIndex: null,
  phase: 'home',
  auction: null,
  turn: 0,
  history: [],
  selectedCell: null,
  validMoves: [],
  gameResult: null
}; }

/** @param {object} state @param {object} action @returns {object} new state */
function handleAction(state, action) { let newState = cloneState(state);

// Route actions
switch (action.type) {
  case 'play': {
    // Start a new game and go straight to auction
    newState = initState();
    newState.screen = 'auction_phase';
    break;
  }
  case 'settings': {
    newState.screen = 'settings';
    break;
  }
  case 'rules': {
    newState.screen = 'rules';
    break;
  }
  case 'tutorial': {
    newState.screen = 'tutorial';
    break;
  }
  case 'leaderboard': {
    newState.screen = 'leaderboard';
    break;
  }
  case 'back': {
    newState.screen = 'home';
    break;
  }
  case 'bid':
  case 'pass': {
    // Only allow during active bidding
    if (newState.screen === 'auction_phase' && newState.auctionPhase === 'bidding' && !newState.gameOver) {
      let amount = action.type === 'pass' ? 0 : (action.amount || 0);
      let currentBidder = newState.auctionPlayerIndex;
      // Register bid if not yet placed
      if (newState.auctionBids[currentBidder] === null) {
        newState.auctionBids[currentBidder] = amount;
        // Check if both players have bid
        let bothBid = newState.auctionBids[0] !== null && newState.auctionBids[1] !== null;
        if (bothBid) {
          newState = resolveAuction(newState);
        } else {
          newState.auctionPlayerIndex = 1 - currentBidder;
        }
      }
    }
    break;
  }
  case 'board_click': {
    // Only during action phase
    if (newState.screen === 'action_phase' && !newState.gameOver) {
      newState = handleBoardClick(newState, action.row, action.col);
    }
    break;
  }
  case 'end_turn': {
    // Switch players and start a new auction round
    if (newState.screen === 'action_phase' && !newState.gameOver) {
      newState.currentPlayerIndex = 1 - newState.currentPlayerIndex;
      newState.selectedCell = null;
      newState.validMoves = [];
      // Auction setup
      newState.auctionPhase = 'bidding';
      newState.auctionBids = [null, null];
      newState.auctionPlayerIndex = 0;
      // Cycle through predefined auction items deterministically
      let items = ['extra_time', 'extra_move', 'steal_time', 'shield'];
      let idx = (newState.auctionItemIndex || 0) + 1;
      newState.auctionItemIndex = idx;
      newState.auctionItem = items[idx % items.length];
      newState.screen = 'auction_phase';
    }
    break;
  }
  case 'undo': {
    // Restore previous snapshot if available
    if (newState.screen === 'action_phase' && !newState.gameOver && newState.history && newState.history.length > 0) {
      let history = [...newState.history];
      let prevState = history.pop();
      newState = cloneState(prevState);
      newState.history = history;
    }
    break;
  }
  case 'play_again': {
    newState = initState();
    newState.screen = 'auction_phase';
    break;
  }
  case 'go_home': {
    newState.screen = 'home';
    break;
  }
  // default: no change – return the already cloned state
}

return newState; }

/** @param {object} state — updates DOM from state */
function render(state) { showScreen(state.screen);
updateBottomBar(state);
if (state.screen === 'home') {
  renderHome(state);
} else if (state.screen === 'settings') {
  renderSettings(state);
} else if (state.screen === 'rules') {
  renderRules(state);
} else if (state.screen === 'tutorial') {
  renderTutorial(state);
} else if (state.screen === 'leaderboard') {
  renderLeaderboard(state);
} else if (state.screen === 'auction_phase') {
  renderAuctionPhase(state);
} else if (state.screen === 'action_phase') {
  renderActionPhase(state);
} else if (state.screen === 'game_result') {
  renderGameResult(state);
} }

/** @param {string} screenId — base screen name, appends '-screen' internally */
function showScreen(screenId) { let screens = document.querySelectorAll('.screen');
for (let s of screens) {
  s.classList.add('hidden');
}
let target = document.getElementById(screenId + '-screen');
if (target) {
  target.classList.remove('hidden');
} }

/** Initializes game state, wires all button listeners, shows initial screen */
function startGame() { let gameState = initState();
render(gameState);

function bind(btnId, action) {
  let btn = document.getElementById(btnId);
  if (btn) {
    btn.addEventListener('click', () => {
      gameState = handleAction(gameState, action);
      render(gameState);
    });
  }
}

bind('btn-play', {type: 'navigate'});
bind('btn-settings', {type: 'navigate'});
bind('btn-rules', {type: 'show_rules'});
bind('btn-tutorial', {type: 'show_tutorial'});
bind('btn-leaderboard', {type: 'show_leaderboard'});
bind('btn-back', {type: 'back'});
bind('btn-bid-small', {type: 'bid', amount: 10});
bind('btn-bid-medium', {type: 'bid', amount: 20});
bind('btn-bid-large', {type: 'bid', amount: 50});
bind('btn-pass', {type: 'pass'});
bind('btn-end-turn', {type: 'end_turn'});
bind('btn-undo', {type: 'undo'});
bind('btn-play-again', {type: 'play_again'});
bind('btn-go-home', {type: 'go_home'});

let board = document.getElementById('game-board');
if (board) {
  board.addEventListener('click', (e) => {
    let cell = e.target.closest('.cell');
    if (!cell) return {};
    let row = cell.dataset.row;
    let col = cell.dataset.col;
    if (row === undefined || col === undefined) return {};
    gameState = handleBoardClick(gameState, parseInt(row, 10), parseInt(col, 10));
    render(gameState);
  });
} }

/* --- Game-specific helpers --- */

/** @param {object} state @param {number} playerIndex @param {number} bidAmount @returns {object} new state */
function placeBid(state, playerIndex, bidAmount) { let newState = cloneState(state);
if (newState.auction && newState.auction.currentBidder === playerIndex && !newState.auction.bidStatus[playerIndex]) {
  newState.auction.bids[playerIndex] = bidAmount;
  newState.auction.bidStatus[playerIndex] = true;
  newState.auction.currentBidder = 1 - playerIndex;
}
return newState; }

/** @param {object} state @returns {object} new state after resolving current auction */
function resolveAuction(state) { let newState = cloneState(state);
let red = newState.players[0];
let black = newState.players[1];
let redBid = red.passed ? red.bid : 0;
let blackBid = black.passed ? black.bid : 0;
let winnerIdx = redBid >= blackBid ? 0 : 1;
let winner = newState.players[winnerIdx];
let winnerBid = winnerIdx === 0 ? redBid : blackBid;
winner.time = Math.max(0, winner.time - winnerBid);
newState.currentPlayerIndex = winnerIdx;
newState.screen = 'action_phase';
newState.phase = 'action';
newState.auctionResult = { winner: winner.color, bid: winnerBid };
red.bid = 0;
black.bid = 0;
red.passed = false;
black.passed = false;
return newState; }

/** @param {object} state @param {number} playerIndex @returns {Array<object>} available actions */
function getAvailableActions(state, playerIndex) { let validActions = [];
let playerColor = playerIndex === 0 ? 'red' : 'black';
let board = state.board;
for (let row = 0; row < 10; row++) {
  for (let col = 0; col < 9; col++) {
    let piece = board[row][col];
    if (piece && piece.color === playerColor) {
      let moves;
      switch (piece.type) {
        case 'general': moves = getGeneralMoves(state, row, col, piece.color); break;
        case 'horse': moves = getHorseMoves(state, row, col, piece.color); break;
        case 'rook': moves = getRookMoves(state, row, col, piece.color); break;
        case 'cannon': moves = getCannonMoves(state, row, col, piece.color); break;
        case 'elephant': moves = getElephantMoves(state, row, col, piece.color); break;
        case 'advisor': moves = getAdvisorMoves(state, row, col, piece.color); break;
        case 'pawn': moves = getPawnMoves(state, row, col, piece.color); break;
        default: moves = [];
      }
      for (let m = 0; m < moves.length; m++) {
        let [toRow, toCol] = moves[m];
        let clone = cloneState(state);
        applyMove(clone, row, col, toRow, toCol);
        if (!isInCheck(clone, playerColor)) {
          validActions.push({
            type: 'move',
            fromRow: row,
            fromCol: col,
            toRow: toRow,
            toCol: toCol
          });
        }
      }
    }
  }
}
return validActions; }

/** @param {object} state @param {object} action @returns {object} new state */
function performAction(state, action) { let newState = applyMove(state, action.fromRow, action.fromCol, action.toRow, action.toCol);
newState.turn = newState.turn === 'red' ? 'black' : 'red';
newState.selectedCell = null;
newState = checkGameEnd(newState);
return newState; }

/** @param {object} state @returns {object} AI move action */
function getAIMove(state) { let aiPlayerIndex = state.aiPlayerIndex;
if (aiPlayerIndex === undefined) {
  for (let i = 0; i < state.players.length; i++) {
    if (state.players[i].isAI) {
      aiPlayerIndex = i;
      break;
    }
  }
  if (aiPlayerIndex === undefined) {
    aiPlayerIndex = state.currentPlayerIndex;
  }
}
let actions = getAvailableActions(state, aiPlayerIndex);
if (!actions || actions.length === 0) {
  return { type: 'end_turn' };
}
function evaluate(s, pIdx) {
  let pieceValues = { general: 10000, chariot: 1000, horse: 500, cannon: 500, elephant: 200, advisor: 200, pawn: 100 };
  let playerColor = s.players[pIdx].side;
  let board = s.board;
  let score = 0;
  for (let r = 0; r < board.length; r++) {
    for (let c = 0; c < board[r].length; c++) {
      let piece = board[r][c];
      if (piece) {
        let val = pieceValues[piece.type] || 0;
        if (piece.color === playerColor) score += val;
        else score -= val;
      }
    }
  }
  let opponentColor = playerColor === 'red' ? 'black' : 'red';
  if (isInCheck(s, opponentColor)) score += 50;
  if (isInCheck(s, playerColor)) score -= 50;
  return score;
}
let bestScore = -Infinity;
let equalActions = [];
for (let i = 0; i < actions.length; i++) {
  let action = actions[i];
  let cloned = cloneState(state);
  let newState = performAction(cloned, action);
  let score = evaluate(newState, aiPlayerIndex);
  if (score > bestScore) {
    bestScore = score;
    equalActions = [action];
  } else if (score === bestScore) {
    equalActions.push(action);
  }
}
let chosen = equalActions[Math.floor(Math.random() * equalActions.length)];
return chosen; }

/** @param {object} state — renders the game board into #game-board */
function renderBoard(state) { let board = document.getElementById('game-board');
board.innerHTML = '';
for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 9; c++) {
        let cell = document.createElement('div');
        cell.className = 'cell';
        let piece = state.board[r][c];
        if (piece) {
            cell.textContent = piece.char;
            if (piece.color === 'red') {
                cell.classList.add('red-piece');
            } else if (piece.color === 'black') {
                cell.classList.add('black-piece');
            }
        }
        if (state.selectedCell && state.selectedCell.row === r && state.selectedCell.col === c) {
            cell.classList.add('selected');
        }
        if (state.validMoves) {
            for (let move of state.validMoves) {
                if (move[0] === r && move[1] === c) {
                    cell.classList.add('valid-move');
                    break;
                }
            }
        }
        cell.onclick = (function(row, col) {
            return function() {
                handleBoardClick(gameState, row, col);
            };
        })(r, c);
        board.appendChild(cell);
    }
} }

/** @param {object} state @param {number} row @param {number} col — handles board cell click */
function handleBoardClick(state, row, col) { if (state.phase !== 'action_phase') return state;
let playerColor = state.currentPlayer;
let playerIndex = playerColor === 'red' ? 0 : 1;
if (state.players[playerIndex].isAI) return state;
let actions = getAvailableActions(state, playerIndex);
if (actions.length === 0) return state;
let board = state.board;
let piece = (board[row] && board[row][col]) ? board[row][col] : null;
if (!state.selected) {
  if (piece && piece.color === playerColor) {
    let validMoves = [];
    for (let i = 0; i < actions.length; i++) {
      let a = actions[i];
      if (a.fromRow === row && a.fromCol === col) {
        validMoves.push({ row: a.toRow, col: a.toCol });
      }
    }
    return { ...state, selected: { row, col }, validMoves };
  }
  return state;
} else {
  let sel = state.selected;
  let isMove = false;
  for (let i = 0; i < state.validMoves.length; i++) {
    let m = state.validMoves[i];
    if (m.row === row && m.col === col) {
      isMove = true;
      break;
    }
  }
  if (isMove) {
    let action = null;
    for (let i = 0; i < actions.length; i++) {
      let a = actions[i];
      if (a.fromRow === sel.row && a.fromCol === sel.col && a.toRow === row && a.toCol === col) {
        action = a;
        break;
      }
    }
    if (action) {
      let newState = performAction(state, action);
      newState = { ...newState, selected: null, validMoves: [] };
      if (checkGameEnd(newState)) {
        newState = { ...newState, phase: 'game_result', scores: calculateScores(newState) };
      }
      return newState;
    }
    return { ...state, selected: null, validMoves: [] };
  } else if (piece && piece.color === playerColor) {
    let newValidMoves = [];
    for (let i = 0; i < actions.length; i++) {
      let a = actions[i];
      if (a.fromRow === row && a.fromCol === col) {
        newValidMoves.push({ row: a.toRow, col: a.toCol });
      }
    }
    return { ...state, selected: { row, col }, validMoves: newValidMoves };
  } else {
    return { ...state, selected: null, validMoves: [] };
  }
} }

/** @param {object} state @param {number} fromRow @param {number} fromCol @param {number} toRow @param {number} toCol @returns {object} new state */
function applyMove(state, fromRow, fromCol, toRow, toCol) { let newState = cloneState(state);
let piece = newState.board[fromRow] && newState.board[fromRow][fromCol];
if (!piece) return state;

let captured = newState.board[toRow] && newState.board[toRow][toCol];
let moveRecord = {
    fromRow: fromRow,
    fromCol: fromCol,
    toRow: toRow,
    toCol: toCol,
    pieceColor: piece.color,
    pieceType: piece.type,
    captured: captured ? { color: captured.color, type: captured.type } : null,
    prevTurn: newState.currentTurn,
    prevSelectedCell: newState.selectedCell ? { row: newState.selectedCell.row, col: newState.selectedCell.col } : null,
    prevValidMoves: newState.validMoves ? newState.validMoves.map(function(m) { return [m[0], m[1]]; }) : []
};

newState.board[toRow][toCol] = piece;
newState.board[fromRow][fromCol] = null;

if (!newState.moveHistory) {
    newState.moveHistory = [];
}
newState.moveHistory.push(moveRecord);

newState.selectedCell = null;
newState.validMoves = [];

newState.currentTurn = newState.currentTurn === 'red' ? 'black' : 'red';

let opponentColor = newState.currentTurn;
if (isCheckmate(newState, opponentColor)) {
    newState.gameOver = true;
    newState.winner = opponentColor === 'red' ? 'black' : 'red';
} else if (isInCheck(newState, opponentColor)) {
    newState.inCheck = opponentColor;
} else {
    newState.inCheck = null;
}

return newState; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} valid moves */
function getGeneralMoves(state, row, col, color) { let moves = [];
let isRed = color === 'red';
let minRow = isRed ? 7 : 0;
let maxRow = isRed ? 9 : 2;
let minCol = 3;
let maxCol = 5;
let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
let board = state.board;

let oppRow = -1;
let oppCol = -1;
for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 9; c++) {
        let piece = board[r][c];
        if (piece && piece.type === 'general' && piece.color !== color) {
            oppRow = r;
            oppCol = c;
            break;
        }
    }
    if (oppCol >= 0) break;
}

for (let d of dirs) {
    let nr = row + d[0];
    let nc = col + d[1];
    if (nr < minRow || nr > maxRow || nc < minCol || nc > maxCol) continue;
    let target = board[nr][nc];
    if (target && target.color === color) continue;

    if (oppCol >= 0 && nc === oppCol) {
        let minR = Math.min(nr, oppRow);
        let maxR = Math.max(nr, oppRow);
        let blocked = false;
        for (let r = minR + 1; r < maxR; r++) {
            if (r === row && nc === col) continue;
            if (board[r][nc]) {
                blocked = true;
                break;
            }
        }
        if (!blocked) continue;
    }
    moves.push([nr, nc]);
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getHorseMoves(state, row, col, color) { let moves = [];
let board = state.board;
let potentialMoves = [
  {dr: -2, dc: -1, legR: -1, legC: 0},
  {dr: -2, dc: 1, legR: -1, legC: 0},
  {dr: 2, dc: -1, legR: 1, legC: 0},
  {dr: 2, dc: 1, legR: 1, legC: 0},
  {dr: -1, dc: -2, legR: 0, legC: -1},
  {dr: -1, dc: 2, legR: 0, legC: 1},
  {dr: 1, dc: -2, legR: 0, legC: -1},
  {dr: 1, dc: 2, legR: 0, legC: 1}
];
for (let m of potentialMoves) {
  let nr = row + m.dr;
  let nc = col + m.dc;
  if (nr < 0 || nr > 9 || nc < 0 || nc > 8) continue;
  let legR = row + m.legR;
  let legC = col + m.legC;
  if (board[legR][legC] !== null) continue;
  let dest = board[nr][nc];
  if (!dest || dest.color !== color) {
    moves.push([nr, nc]);
  }
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getRookMoves(state, row, col, color) { let moves = [];
let directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
for (let d of directions) {
    let dr = d[0], dc = d[1];
    let nr = row + dr;
    let nc = col + dc;
    while (nr >= 0 && nr < 10 && nc >= 0 && nc < 9) {
        let target = state.board[nr][nc];
        if (target) {
            if (target.color !== color) {
                moves.push([nr, nc]);
            }
            break;
        }
        moves.push([nr, nc]);
        nr += dr;
        nc += dc;
    }
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getCannonMoves(state, row, col, color) { let moves = [];
let board = state.board;
if (!board || !board[row] || !board[row][col]) return moves;
let piece = board[row][col];
let pieceColor = piece.color;
let directions = [[-1,0],[1,0],[0,-1],[0,1]];
for (let [dr, dc] of directions) {
  let r = row + dr;
  let c = col + dc;
  let foundScreen = false;
  while (r >= 0 && r < 10 && c >= 0 && c < 9) {
    let target = board[r][c];
    if (target && target.color) {
      if (!foundScreen) {
        foundScreen = true;
      } else {
        if (target.color !== pieceColor) {
          moves.push([r, c]);
        }
        break;
      }
    } else {
      if (!foundScreen) {
        moves.push([r, c]);
      }
    }
    r += dr;
    c += dc;
  }
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getElephantMoves(state, row, col, color) { let moves = [];
let directions = [[-2, -2], [-2, 2], [2, -2], [2, 2]];
let rowLimit = color === 'red' ? 5 : 0;
let rowMax = color === 'red' ? 9 : 4;
for (let [dr, dc] of directions) {
  let nr = row + dr;
  let nc = col + dc;
  if (nr >= 0 && nr <= 9 && nc >= 0 && nc <= 8 && nr >= rowLimit && nr <= rowMax) {
    let midRow = row + dr / 2;
    let midCol = col + dc / 2;
    if (state.board[midRow][midCol] === null) {
      let target = state.board[nr][nc];
      if (target === null || target.color !== color) {
        moves.push([nr, nc]);
      }
    }
  }
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getAdvisorMoves(state, row, col, color) { let moves = [];
let board = state.board;
let minRow, maxRow;
if (color === 'red') {
  minRow = 7;
  maxRow = 9;
} else {
  minRow = 0;
  maxRow = 2;
}
let minCol = 3, maxCol = 5;
let dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
for (let d of dirs) {
  let nr = row + d[0];
  let nc = col + d[1];
  if (nr >= minRow && nr <= maxRow && nc >= minCol && nc <= maxCol) {
    let target = board[nr][nc];
    if (!target || target.color !== color) {
      moves.push([nr, nc]);
    }
  }
}
return moves; }

/** @param {object} state @param {number} row @param {number} col @param {string} color @returns {Array<[number,number]>} */
function getPawnMoves(state, row, col, color) { let moves = [];
let forward = color === 'red' ? -1 : 1;
let newRow = row + forward;
if (newRow >= 0 && newRow <= 9) {
  let pieceAtNew = state.board[newRow][col];
  if (!pieceAtNew || pieceAtNew.color !== color) {
    moves.push([newRow, col]);
  }
}
let crossed = (color === 'red' && row <= 4) || (color === 'black' && row >= 5);
if (crossed) {
  let dcList = [-1, 1];
  for (let i = 0; i < dcList.length; i++) {
    let dc = dcList[i];
    let newCol = col + dc;
    if (newCol >= 0 && newCol <= 8) {
      let pieceAtSide = state.board[row][newCol];
      if (!pieceAtSide || pieceAtSide.color !== color) {
        moves.push([row, newCol]);
      }
    }
  }
}
return moves; }

/** @param {object} state @param {string} color @returns {boolean} */
function isInCheck(state, color) { let generalPos = null;
for (let r = 0; r < state.board.length; r++) {
  for (let c = 0; c < state.board[r].length; c++) {
    let piece = state.board[r][c];
    if (piece && piece.color === color && piece.type === 'general') {
      generalPos = [r, c];
      break;
    }
  }
  if (generalPos) break;
}
if (!generalPos) return false;

let opponentColor = color === 'red' ? 'black' : 'red';
for (let r = 0; r < state.board.length; r++) {
  for (let c = 0; c < state.board[r].length; c++) {
    let piece = state.board[r][c];
    if (piece && piece.color === opponentColor) {
      let moves;
      switch (piece.type) {
        case 'general': moves = getGeneralMoves(state, r, c, opponentColor); break;
        case 'advisor': moves = getAdvisorMoves(state, r, c, opponentColor); break;
        case 'elephant': moves = getElephantMoves(state, r, c, opponentColor); break;
        case 'horse': moves = getHorseMoves(state, r, c, opponentColor); break;
        case 'rook': moves = getRookMoves(state, r, c, opponentColor); break;
        case 'cannon': moves = getCannonMoves(state, r, c, opponentColor); break;
        case 'pawn': moves = getPawnMoves(state, r, c, opponentColor); break;
        default: moves = [];
      }
      if (moves.some(([mr, mc]) => mr === generalPos[0] && mc === generalPos[1])) {
        return true;
      }
    }
  }
}
return false; }

/** @param {object} state @param {string} color @returns {boolean} */
function isCheckmate(state, color) { if (!isInCheck(state, color)) return false;
for (let row = 0; row < 10; row++) {
  for (let col = 0; col < 9; col++) {
    let piece = state.board[row][col];
    if (piece && piece.color === color) {
      let moves = [];
      if (piece.type === 'general') moves = getGeneralMoves(state, row, col, color);
      else if (piece.type === 'horse') moves = getHorseMoves(state, row, col, color);
      else if (piece.type === 'rook') moves = getRookMoves(state, row, col, color);
      else if (piece.type === 'cannon') moves = getCannonMoves(state, row, col, color);
      else if (piece.type === 'elephant') moves = getElephantMoves(state, row, col, color);
      else if (piece.type === 'advisor') moves = getAdvisorMoves(state, row, col, color);
      else if (piece.type === 'pawn') moves = getPawnMoves(state, row, col, color);
      for (let [toRow, toCol] of moves) {
        let newState = applyMove(state, row, col, toRow, toCol);
        if (!isInCheck(newState, color)) return false;
      }
    }
  }
}
return true; }

/** @param {object} state @returns {boolean} */
function checkGameEnd(state) { if (state.gameOver) return true;
let players = state.players;
for (let i = 0; i < players.length; i++) {
    if (players[i].timeRemaining <= 0) return true;
}
let actions = getAvailableActions(state, state.currentPlayer);
if (actions.length === 0) return true;
return false; }

/** @param {object} state @returns {object} */
function calculateScores(state) { var { winner } = state;
let redScore, blackScore;
if (winner === 'red') {
  redScore = 1;
  blackScore = 0;
} else if (winner === 'black') {
  redScore = 0;
  blackScore = 1;
} else {
  redScore = 0.5;
  blackScore = 0.5;
}
return { winner, redScore, blackScore }; }

/** @param {object} state @returns {object} deep cloned state using plain objects/arrays */
function cloneState(state) { return JSON.parse(JSON.stringify(state)); }

  detailsHTML += '<p>红方吃子: ' + redPlayer.captured.join(' ') + '</p>';
} else {
  detailsHTML += '<p>红方无吃子</p>';
}
if (blackPlayer && blackPlayer.captured && blackPlayer.captured.length > 0) {
  detailsHTML += '<p>黑方吃子: ' + blackPlayer.captured.join(' ') + '</p>';
} else {
  detailsHTML += '<p>黑方无吃子</p>';
}
detailsHTML += '</div>';
if (reason) {
  detailsHTML += '<p class="mt-2 text-gray-400 italic">结局原因: ' + reason + '</p>';
}
resultDetails.innerHTML = detailsHTML; }

/** @param {object} state — renders leaderboard screen */
function renderLeaderboard(state) { let container = document.getElementById('leaderboard-content');
let leaderboard = state.leaderboard || [];
let html = '';
if (leaderboard.length === 0) {
  html = '<p class="text-center text-gray-400 mt-8">暂无排行榜数据</p>';
} else {
  let sorted = leaderboard.slice().sort((a, b) => b.score - a.score);
  html = '<ul class="space-y-3 mt-4">';
  for (let i = 0; i < sorted.length; i++) {
    let entry = sorted[i];
    let rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
    html += `<li class="flex items-center justify-between bg-gray-800 bg-opacity-70 rounded-xl px-4 py-3">
      <span class="text-lg font-bold">${rankIcon} ${entry.name || '匿名玩家'}</span>
      <span class="text-base text-orange-400 font-semibold">${entry.score} 分</span>
    </li>`;
  }
  html += '</ul>';
}
container.innerHTML = html; }

/** @param {object} state — updates bottom bar button visibility */
function updateBottomBar(state) { let screen = state.screen;
let homeButtons = ['btn-play', 'btn-settings', 'btn-rules', 'btn-tutorial', 'btn-leaderboard'];
let backButton = ['btn-back'];
let auctionButtons = ['btn-bid-small', 'btn-bid-medium', 'btn-bid-large', 'btn-pass'];
let actionButtons = ['btn-end-turn', 'btn-undo'];
let resultButtons = ['btn-play-again', 'btn-go-home'];
function toggleButton(id, show) {
  let btn = document.getElementById(id);
  if (btn) {
    if (show) {
      btn.classList.remove('hidden-btn');
    } else {
      btn.classList.add('hidden-btn');
    }
  }
}
if (screen === 'home') {
  homeButtons.forEach(id => toggleButton(id, true));
  backButton.forEach(id => toggleButton(id, false));
  auctionButtons.forEach(id => toggleButton(id, false));
  actionButtons.forEach(id => toggleButton(id, false));
  resultButtons.forEach(id => toggleButton(id, false));
} else if (screen === 'settings' || screen === 'rules' || screen === 'tutorial' || screen === 'leaderboard') {
  homeButtons.forEach(id => toggleButton(id, false));
  backButton.forEach(id => toggleButton(id, true));
  auctionButtons.forEach(id => toggleButton(id, false));
  actionButtons.forEach(id => toggleButton(id, false));
  resultButtons.forEach(id => toggleButton(id, false));
} else if (screen === 'auction_phase') {
  homeButtons.forEach(id => toggleButton(id, false));
  backButton.forEach(id => toggleButton(id, true));
  auctionButtons.forEach(id => toggleButton(id, true));
  actionButtons.forEach(id => toggleButton(id, false));
  resultButtons.forEach(id => toggleButton(id, false));
} else if (screen === 'action_phase') {
  homeButtons.forEach(id => toggleButton(id, false));
  backButton.forEach(id => toggleButton(id, true));
  auctionButtons.forEach(id => toggleButton(id, false));
  actionButtons.forEach(id => toggleButton(id, true));
  resultButtons.forEach(id => toggleButton(id, false));
} else if (screen === 'game_result') {
  homeButtons.forEach(id => toggleButton(id, false));
  backButton.forEach(id => toggleButton(id, false));
  auctionButtons.forEach(id => toggleButton(id, false));
  actionButtons.forEach(id => toggleButton(id, false));
  resultButtons.forEach(id => toggleButton(id, true));
} else {
  homeButtons.forEach(id => toggleButton(id, false));
  backButton.forEach(id => toggleButton(id, false));
  auctionButtons.forEach(id => toggleButton(id, false));
  actionButtons.forEach(id => toggleButton(id, false));
  resultButtons.forEach(id => toggleButton(id, false));
} }
