    <style>
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 4.5rem;
        }
        .screen.active {
            display: flex;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            width: min(88vw, 400px);
            aspect-ratio: 1;
            background: #e5e7eb;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .15);
        }
        #game-board .cell {
            border-radius: 8px;
            cursor: pointer;
            transition: transform .12s, opacity .2s;
            position: relative;
        }
        #game-board .cell:active {
            transform: scale(.9);
        }
        #game-board .cell.selected {
            box-shadow: 0 0 0 3px #fff, 0 0 0 6px #facc15;
            z-index: 2;
            transform: scale(1.05);
        }
        #game-board .cell.matched {
            opacity: 0;
            transform: scale(.3);
            pointer-events: none;
        }
        #game-board .cell.empty {
            background: #d1d5db !important;
            pointer-events: none;
        }
        .gem-0 {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .gem-1 {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .gem-2 {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        .gem-3 {
            background: linear-gradient(135deg, #eab308, #ca8a04);
        }
        .gem-4 {
            background: linear-gradient(135deg, #a855f7, #9333ea);
        }
        .gem-5 {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }
        .hud-badge {
            background: #1f2937;
            color: #fbbf24;
            border-radius: 999px;
            padding: 4px 14px;
            font-weight: 700;
            font-size: .85rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
        }
        @keyframes pop-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            60% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .cell {
            animation: pop-in .18s ease-out;
        }
    </style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <script>
        /* ===================== GLOBAL STATE ===================== */
        let gameState = null;

        /* ===================== MANDATORY FUNCTIONS ===================== */

        /** @returns {object} initial game state */
        function initState() {
            return {
                screen: 'home',
                board: [],
                level: 1,
                score: 0,
                targetScore: 1000,
                moves: 30,
                selected: null,
                comboLevel: 0,
                boosters: {
                    hammer: 0,
                    shuffle: 0
                },
                coins: 500,
                highScores: [],
                settings: {
                    sound: true,
                    music: true,
                    vibration: true
                },
                prevScreen: null,
                result: null,
                stars: 0,
                maxLevel: 20,
                levels: [],
                shopItems: [
                    { id: 'hammer', name: '🔨 锤子', price: 100, quantity: 1 },
                    { id: 'shuffle', name: '🔀 洗牌', price: 150, quantity: 1 }
                ]
            };
        }

        /**
         * @param {object} state - current game state (deep clone expected before mutation)
         * @param {object} action - flat action object with .type and relevant props
         * @returns {object} new game state
         */
        function handleAction(state, action) {
            let newState = { ...state };
            newState.boosters = { ...state.boosters };
            newState.settings = { ...state.settings };
            newState.highScores = [...(state.highScores || [])];

            // Helper to start a level with given level number
            function startLevel(s, lv) {
                s.board = createBoard(8, 8);
                s.moves = 30;
                s.targetScore = 1000 * lv;
                s.score = 0;
                s.selected = null;
                s.comboLevel = 0;
                s.level = lv;
                s.screen = 'gameplay';
                s.result = null;
                s.stars = 0;
                // Ensure board has valid moves; if not, reshuffle
                if (!boardHasValidMoves(s.board)) {
                    s.board = createBoard(8, 8);
                }
            }

            // Helper to end the game and record result
            function endGame(s, resultType) {
                s.result = resultType;
                s.screen = 'game_result';
                s.selected = null;
                if (resultType === 'won') {
                    let target = s.targetScore || 0;
                    if (s.score >= target * 3) {
                        s.stars = 3;
                    } else if (s.score >= target * 2) {
                        s.stars = 2;
                    } else {
                        s.stars = 1;
                    }
                    let entry = { name: 'Player', score: s.score, level: s.level };
                    s.highScores = [...s.highScores, entry]
                        .sort(function(a, b) { return b.score - a.score; })
                        .slice(0, 10);
                } else {
                    s.stars = 0;
                }
            }

            switch (action.type) {
                case 'play': {
                    startLevel(newState, newState.level || 1);
                    break;
                }
                case 'level_select': {
                    newState.prevScreen = newState.screen;
                    newState.screen = 'level_select';
                    // Generate level data
                    let levels = [];
                    for (let i = 1; i <= (newState.maxLevel || 20); i++) {
                        levels.push({
                            id: i,
                            unlocked: i <= newState.level + 2,
                            stars: i < newState.level ? Math.floor(Math.random() * 3) + 1 : (i === newState.level && newState.stars ? newState.stars : 0)
                        });
                    }
                    newState.levels = levels;
                    break;
                }
                case 'select_level': {
                    let lv = action.levelId || action.level || 1;
                    startLevel(newState, lv);
                    break;
                }
                case 'shop': {
                    newState.prevScreen = newState.screen;
                    newState.screen = 'shop';
                    break;
                }
                case 'high_scores': {
                    newState.prevScreen = newState.screen;
                    newState.screen = 'high_scores';
                    break;
                }
                case 'settings': {
                    newState.prevScreen = newState.screen;
                    newState.screen = 'settings';
                    break;
                }
                case 'back':
                case 'go_back': {
                    if (newState.prevScreen) {
                        newState.screen = newState.prevScreen;
                        newState.prevScreen = null;
                    } else {
                        newState.screen = 'home';
                    }
                    break;
                }
                case 'go_home':
                case 'result_home': {
                    newState.screen = 'home';
                    newState.selected = null;
                    newState.prevScreen = null;
                    break;
                }
                case 'pause': {
                    newState.prevScreen = newState.screen;
                    newState.screen = 'pause_menu';
                    break;
                }
                case 'resume': {
                    if (newState.prevScreen) {
                        newState.screen = newState.prevScreen;
                        newState.prevScreen = null;
                    } else {
                        newState.screen = 'gameplay';
                    }
                    break;
                }
                case 'restart': {
                    startLevel(newState, newState.level);
                    break;
                }
                case 'quit': {
                    newState.screen = 'home';
                    newState.selected = null;
                    newState.prevScreen = null;
                    newState.result = null;
                    break;
                }
                case 'next_level': {
                    let nextLv = Math.min(newState.level + 1, newState.maxLevel || 100);
                    startLevel(newState, nextLv);
                    break;
                }
                case 'retry': {
                    startLevel(newState, newState.level);
                    break;
                }
                case 'toggle_sound': {
                    newState.settings.sound = !newState.settings.sound;
                    break;
                }
                case 'toggle_music': {
                    newState.settings.music = !newState.settings.music;
                    break;
                }
                case 'toggle_vibration': {
                    newState.settings.vibration = !newState.settings.vibration;
                    break;
                }
                case 'buy_item': {
                    let itemId = action.itemId;
                    let prices = { hammer: 100, shuffle: 150 };
                    if (itemId && prices[itemId] && newState.coins >= prices[itemId]) {
                        newState.coins -= prices[itemId];
                        newState.boosters[itemId] = (newState.boosters[itemId] || 0) + 1;
                    }
                    break;
                }
                case 'use_hammer': {
                    if (newState.selected && newState.boosters.hammer > 0 && newState.moves > 0 && newState.screen === 'gameplay') {
                        let sel = newState.selected;
                        let board = newState.board;
                        if (board[sel.row] && board[sel.row][sel.col] !== undefined && board[sel.row][sel.col] !== -1) {
                            board[sel.row][sel.col] = -1;
                            let matches = findMatches(board);
                            let combo = 0;
                            while (matches.length > 0) {
                                combo++;
                                newState.score += calculateScore(matches.length, combo);; if (window._kixUpdateScore) window._kixUpdateScore(newState.score);
                                removeMatches(board, matches);
                                cascadeBoard(board);
                                fillEmptyCells(board);
                                matches = findMatches(board);
                            }
                            newState.moves -= 1;
                            newState.boosters.hammer = newState.boosters.hammer - 1;
                            newState.selected = null;
                            let endResult = checkGameEnd(newState);
                            if (endResult !== 'playing') {
                                endGame(newState, endResult);
                            } else if (!boardHasValidMoves(newState.board)) {
                                endGame(newState, 'lost');
                            }
                        }
                    }
                    break;
                }
                case 'use_shuffle': {
                    if (newState.boosters.shuffle > 0 && newState.moves > 0 && newState.screen === 'gameplay') {
                        let board = newState.board;
                        let flat = [];
                        for (let r = 0; r < board.length; r++) {
                            for (let c = 0; c < board[0].length; c++) {
                                flat.push(board[r][c]);
                            }
                        }
                        // Fisher-Yates shuffle
                        for (let i = flat.length - 1; i > 0; i--) {
                            let j = Math.floor(Math.random() * (i + 1));
                            let tmp = flat[i];
                            flat[i] = flat[j];
                            flat[j] = tmp;
                        }
                        let idx = 0;
                        for (let r = 0; r < board.length; r++) {
                            for (let c = 0; c < board[0].length; c++) {
                                board[r][c] = flat[idx++];
                            }
                        }
                        let matches = findMatches(board);
                        let combo = 0;
                        while (matches.length > 0) {
                            combo++;
                            newState.score += calculateScore(matches.length, combo);
                            removeMatches(board, matches);
                            cascadeBoard(board);
                            fillEmptyCells(board);
                            matches = findMatches(board);
                        }
                        newState.moves -= 1;
                        newState.boosters.shuffle = newState.boosters.shuffle - 1;
                        newState.selected = null;
                        let endResult = checkGameEnd(newState);
                        if (endResult !== 'playing') {
                            endGame(newState, endResult);
                        } else if (!boardHasValidMoves(newState.board)) {
                            endGame(newState, 'lost');
                        }
                    }
                    break;
                }
                case 'cell_clicked': {
                    let row = action.row;
                    let col = action.col;
                    if (row === undefined || col === undefined) break;
                    if (newState.screen !== 'gameplay') break;
                    if (!newState.board || newState.board.length === 0) break;
                    if (newState.board[row][col] === -1) break;

                    if (!newState.selected) {
                        newState.selected = { row: row, col: col };
                    } else {
                        let sel = newState.selected;
                        if (sel.row === row && sel.col === col) {
                            newState.selected = null;
                        } else if (isValidAdjacent(sel.row, sel.col, row, col)) {
                            if (wouldCreateMatch(newState.board, sel.row, sel.col, row, col)) {
                                newState = applySwap(newState, sel.row, sel.col, row, col);
                                let endResult = checkGameEnd(newState);
                                if (endResult !== 'playing') {
                                    endGame(newState, endResult);
                                } else if (!boardHasValidMoves(newState.board)) {
                                    endGame(newState, 'lost');
                                }
                            } else {
                                newState.selected = { row: row, col: col };
                            }
                        } else {
                            newState.selected = { row: row, col: col };
                        }
                    }
                    break;
                }
                default:
                    // unknown action, no change
                    break;
            }
            return newState;
        }

        /**
         * @param {object} state - current game state
         */
        function render(state) {
            showScreen(state.screen);

            let barHome = document.getElementById('btn-bar-home');
            let barPause = document.getElementById('btn-bar-pause');
            let barBack = document.getElementById('btn-bar-back');
            if (barHome) barHome.classList.add('hidden');
            if (barPause) barPause.classList.add('hidden');
            if (barBack) barBack.classList.add('hidden');

            if (state.screen === 'gameplay') {
                if (barHome) barHome.classList.remove('hidden');
                if (barPause) barPause.classList.remove('hidden');
            } else if (['level_select', 'shop', 'settings', 'high_scores', 'game_result'].indexOf(state.screen) >= 0) {
                if (barBack) barBack.classList.remove('hidden');
            }

            if (state.screen === 'high_scores') {

            if (state.screen === 'settings') {

                if (soundKnob && soundBtn) setToggle(soundKnob, soundBtn, state.settings.sound);
                if (musicKnob && musicBtn) setToggle(musicKnob, musicBtn, state.settings.music);
                if (vibKnob && vibBtn) setToggle(vibKnob, vibBtn, state.settings.vibration);
            }
        }

        /**
         * @param {string} screenId - base screen name (e.g. 'home', 'gameplay')
         */
        function showScreen(screenId) {

            }

            if (activeScreen) {
                activeScreen.classList.add('active');
            }
        }

        /** Initializes game state, wires button listeners, renders initial screen */

render(gameState);

        /* ===================== MATCH-3 BOARD HELPERS ===================== */

        /**
         * @param {number} rows
         * @param {number} cols
         * @returns {number[][]} 2D board with no initial matches
         */
        function createBoard(rows, cols) {
            let board = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    let forbidden = [];
                    if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
                        forbidden.push(board[r][c - 1]);
                    }
                    if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
                        forbidden.push(board[r - 1][c]);
                    }
                    let piece;
                    do {
                        piece = generateRandomPiece();
                    } while (forbidden.indexOf(piece) >= 0);
                    board[r][c] = piece;
                }
            }
            return board;
        }

        /**
         * Finds all matches of 3+ identical gems in a row or column.
         * @param {number[][]} board
         * @returns {Array<{row:number,col:number}>} array of cell positions that are part of a match
         */
        function findMatches(board) {
            let matchedPositions = {};
            let R = board.length;
            let C = board[0].length;
            // Horizontal scans
            for (let r = 0; r < R; r++) {
                let c = 0;
                while (c < C) {
                    let gem = board[r][c];
                    if (gem === -1) { c++; continue; }
                    let start = c;
                    while (c < C && board[r][c] === gem) c++;
                    let len = c - start;
                    if (len >= 3) {
                        for (let i = start; i < c; i++) {
                            matchedPositions[r + ',' + i] = true;
                        }
                    }
                }
            }
            // Vertical scans
            for (let c = 0; c < C; c++) {
                let r = 0;
                while (r < R) {
                    let gem = board[r][c];
                    if (gem === -1) { r++; continue; }
                    let start = r;
                    while (r < R && board[r][c] === gem) r++;
                    let len = r - start;
                    if (len >= 3) {
                        for (let i = start; i < r; i++) {
                            matchedPositions[i + ',' + c] = true;
                        }
                    }
                }
            }
            let result = [];
            let keys = Object.keys(matchedPositions);
            for (let k = 0; k < keys.length; k++) {
                let parts = keys[k].split(',');
                result.push({ row: parseInt(parts[0]), col: parseInt(parts[1]) });
            }
            return result;
        }

        /**
         * Sets matched cell positions to -1 (empty).
         * @param {number[][]} board
         * @param {Array<{row:number,col:number}>} matches
         * @returns {number[][]} mutated board
         */
        function removeMatches(board, matches) {
            for (let i = 0; i < matches.length; i++) {
                let m = matches[i];
                board[m.row][m.col] = -1;
            }
            return board;
        }

        /**
         * Shifts gems downward to fill empty (-1) cells.
         * @param {number[][]} board
         * @returns {number[][]} mutated board after gravity
         */
        function cascadeBoard(board) {
            let rows = board.length;
            let cols = board[0].length;
            for (let c = 0; c < cols; c++) {
                let gems = [];
                for (let r = 0; r < rows; r++) {
                    if (board[r][c] !== -1) {
                        gems.push(board[r][c]);
                    }
                }
                let emptyCount = rows - gems.length;
                for (let r = 0; r < rows; r++) {
                    if (r < emptyCount) {
                        board[r][c] = -1;
                    } else {
                        board[r][c] = gems[r - emptyCount];
                    }
                }
            }
            return board;
        }

        /**
         * Fills empty (-1) cells with random new gems.
         * @param {number[][]} board
         * @returns {number[][]} mutated board
         */
        function fillEmptyCells(board) {
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[r].length; c++) {
                    if (board[r][c] === -1) {
                        board[r][c] = generateRandomPiece();
                    }
                }
            }
            return board;
        }

        /**
         * Runs cascade→fill→match loop until board stabilizes. Returns total matched positions across all cycles.
         * @param {number[][]} board
         * @returns {{board:number[][], totalMatched:number}}
         */
        function processBoard(board) {
            let totalMatched = 0;
            let matches = findMatches(board);
            while (matches.length > 0) {
                totalMatched += matches.length;
                removeMatches(board, matches);
                cascadeBoard(board);
                fillEmptyCells(board);
                matches = findMatches(board);
            }
            return { board: board, totalMatched: totalMatched };
        }

        /**
         * Checks if two grid cells are orthogonally adjacent.
         * @param {number} r1
         * @param {number} c1
         * @param {number} r2
         * @param {number} c2
         * @returns {boolean}
         */
        function isValidAdjacent(r1, c1, r2, c2) {
            return (Math.abs(r1 - r2) === 1 && c1 === c2) || (Math.abs(c1 - c2) === 1 && r1 === r2);
        }

        /**
         * Checks if swapping two adjacent cells would produce at least one match.
         * @param {number[][]} board
         * @param {number} r1
         * @param {number} c1
         * @param {number} r2
         * @param {number} c2
         * @returns {boolean}
         */
        function wouldCreateMatch(board, r1, c1, r2, c2) {
            let temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            let matches = findMatches(board);
            board[r2][c2] = board[r1][c1];
            board[r1][c1] = temp;
            return matches.length > 0;
        }

        /**
         * Checks whether any valid swap exists on the board.
         * @param {number[][]} board
         * @returns {boolean}
         */
        function boardHasValidMoves(board) {
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[r].length; c++) {
                    if (board[r][c] === -1) continue;
                    if (c + 1 < board[r].length && board[r][c + 1] !== -1) {
                        if (wouldCreateMatch(board, r, c, r, c + 1)) return true;
                    }
                    if (r + 1 < board.length && board[r + 1][c] !== -1) {
                        if (wouldCreateMatch(board, r, c, r + 1, c)) return true;
                    }
                }
            }
            return false;
        }

        /**
         * Calculates score for a set of matched gems.
         * @param {number} matchedCount - number of gems matched
         * @param {number} comboLevel - current combo chain level
         * @returns {number} score earned
         */
        function calculateScore(matchedCount, comboLevel) {
            return matchedCount * 10 * (comboLevel || 1);
        }

        /** @returns {number} random gem type 0-5 */
        function generateRandomPiece() {
            return Math.floor(Math.random() * 6);
        }

        /**
         * Checks win/lose conditions.
         * @param {object} state
         * @returns {'won'|'lost'|'playing'}
         */
        function checkGameEnd(state) {
            if (state.score >= state.targetScore) {
                return 'won';
            } else if (state.moves <= 0) {
                return 'lost';
            } else {
                return 'playing';
            }
        }

        /* ===================== RENDER HELPERS ===================== */

        /**
         * Populates #game-board with cell divs based on state.board.
         * @param {object} state
         */
        function renderBoard(state) {
            let boardEl = document.getElementById('game-board');
            if (!boardEl) return;
            boardEl.innerHTML = '';
            let board = state.board;
            if (!board || board.length === 0) return;
            let rows = board.length;
            let cols = board[0].length;
            let selected = state.selected;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let cellValue = board[r][c];
                    let cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    if (cellValue === -1) {
                        cellDiv.classList.add('empty');
                    } else {
                        cellDiv.classList.add('gem-' + cellValue);
                    }
                    if (selected && selected.row === r && selected.col === c) {
                        cellDiv.classList.add('selected');
                    }
                    cellDiv.setAttribute('data-row', r);
                    cellDiv.setAttribute('data-col', c);
                    boardEl.appendChild(cellDiv);
                }
            }
        }

        /**
         * Applies a swap between two adjacent cells and processes the board cascade.
         * @param {object} state - current state (will be mutated and returned)
         * @param {number} r1
         * @param {number} c1
         * @param {number} r2
         * @param {number} c2
         * @returns {object} updated state
         */
        function applySwap(state, r1, c1, r2, c2) {
            // Deep copy the board
            let newBoard = [];
            for (let r = 0; r < state.board.length; r++) {
                newBoard[r] = [];
                for (let c = 0; c < state.board[r].length; c++) {
                    newBoard[r][c] = state.board[r][c];
                }
            }
            state.board = newBoard;
            state.moves = state.moves - 1;
            let board = state.board;
            // Swap
            let temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
            let totalScore = 0;
            let comboLevel = 1;
            while (true) {
                let matches = findMatches(board);
                if (matches.length === 0) break;
                totalScore += calculateScore(matches.length, comboLevel);
                removeMatches(board, matches);
                cascadeBoard(board);
                fillEmptyCells(board);
                comboLevel++;
            }
            state.score = state.score + totalScore;
            state.selected = null;
            return state;
        }

        /* ===================== INITIALIZATION ===================== */
        document.addEventListener('DOMContentLoaded', startGame);
    
        function getPieceEmoji(pieceType) { const emojis = ['🍵','🫖','🧋','🍃','🪷','☕']; return emojis[pieceType - 1] || emojis[0]; }
    </script>
