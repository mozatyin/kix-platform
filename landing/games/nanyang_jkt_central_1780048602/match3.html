<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>消消乐 - Match-3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gem-0: #ef4444;
            --gem-1: #3b82f6;
            --gem-2: #22c55e;
            --gem-3: #eab308;
            --gem-4: #a855f7;
            --cell-size: 11vw;
            --max-cell: 44px;
        }
        .screen {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .screen.hidden {
            display: none;
        }
        #game-board {
            display: grid;
            gap: 2px;
            padding: 4px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .3);
            width: fit-content;
            margin: 0 auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .board-cell {
            width: var(--cell-size);
            max-width: var(--max-cell);
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            transition: transform .12s ease, opacity .2s ease;
            position: relative;
        }
        .board-cell:active {
            transform: scale(.9);
        }
        .board-cell.selected {
            box-shadow: 0 0 0 3px #fff, 0 0 14px 3px #fbbf24;
            z-index: 2;
            transform: scale(1.06);
        }
        .board-cell.matched {
            animation: pop .3s ease forwards;
        }
        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.25);
                opacity: .6;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }
        .gem-0 {
            background: radial-gradient(circle at 35% 35%, #fca5a5, #ef4444 60%, #b91c1c);
        }
        .gem-1 {
            background: radial-gradient(circle at 35% 35%, #93c5fd, #3b82f6 60%, #1d4ed8);
        }
        .gem-2 {
            background: radial-gradient(circle at 35% 35%, #86efac, #22c55e 60%, #15803d);
        }
        .gem-3 {
            background: radial-gradient(circle at 35% 35%, #fde047, #eab308 60%, #a16207);
        }
        .gem-4 {
            background: radial-gradient(circle at 35% 35%, #d8b4fe, #a855f7 60%, #7e22ce);
        }
        #action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: rgba(15, 23, 42, .92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, .1);
        }
        .btn-action {
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            transition: all .15s ease;
            white-space: nowrap;
        }
        .btn-action:active {
            transform: scale(.94);
            opacity: .85;
        }
    </style>
<style>.screen:not(.active){display:none!important}.screen.active{display:block!important}
/* RING0: intersection-based board — SVG background lines */
.board{background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 100'><line x1='5' y1='5' x2='85' y2='5' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='15' x2='85' y2='15' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='25' x2='85' y2='25' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='35' x2='85' y2='35' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='45' x2='85' y2='45' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='55' x2='85' y2='55' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='65' x2='85' y2='65' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='75' x2='85' y2='75' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='85' x2='85' y2='85' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='95' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='5' x2='5' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='15' y1='5' x2='15' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='25' y1='5' x2='25' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='35' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='45' y1='5' x2='45' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='55' y1='5' x2='55' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='65' y1='5' x2='65' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='75' y1='5' x2='75' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='85' y1='5' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='55' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='5' x2='35' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='35' y1='75' x2='55' y2='95' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='75' x2='35' y2='95' stroke='%238B4513' stroke-width='0.8'/></svg>")!important;background-size:100% 100%!important;background-repeat:no-repeat!important;background-color:#E8D5A0!important}}
/* Clear cell borders — SVG handles all lines */
.board>div,.board>*,.cell,[class*=cell],[class*=board-cell]{border:none!important;background:transparent!important}
</style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>
</head>

    <script>
        /* ========== CONSTANTS ========== */
        const ROWS = 8;
        const COLS = 8;
        const NUM_GEM_TYPES = 5;
        const GEM_COLORS = ['gem-0', 'gem-1', 'gem-2', 'gem-3', 'gem-4'];

        /* ========== STATE ========== */

        /** @returns {object} initial game state */
        function initState() { let levels = [];
for (let i = 0; i < 20; i++) {
  levels.push({
    targetScore: 1000 * (i + 1),
    moves: Math.max(15, 30 - i)
  });
}
let state = {
  screen: 'home',
  board: createBoard(ROWS, COLS, NUM_GEM_TYPES),
  score: 0,
  moves: levels[0].moves,
  targetScore: levels[0].targetScore,
  currentLevel: 0,
  currentLevelUnlocked: 0,
  levels: levels,
  selectedCell: null,
  result: null,
  soundOn: true,
  musicOn: true,
  coins: 100,
  powerUps: {
    bomb: 3,
    rocket: 2,
    swap: 1
  },
  highScores: [],
  shopItems: [
    { type: 'bomb', name: '💣 炸弹', cost: 50, description: '摧毁3x3区域' },
    { type: 'rocket', name: '🚀 火箭', cost: 40, description: '清除一整行' },
    { type: 'swap', name: '🔄 交换', cost: 60, description: '任意交换两个宝石' },
    { type: 'extra_moves', name: '➕ 额外步数', cost: 30, description: '+5步' }
  ]
};
return state; }

        /* ========== SCREEN NAVIGATION ========== */

        /**
         * @param {string} screenId - base screen name (e.g. 'home', 'gameplay')
         */
        function showScreen(screenId) { let screens = document.querySelectorAll('.screen');
for (let screen of screens) {
    screen.classList.add('hidden');
}
let target = document.getElementById(screenId + '-screen');
if (target) {
    target.classList.remove('hidden');
} }

        /* ========== RENDER ========== */

        /** @param {object} state */
        function render(state) { showScreen(state.screen);
if (state.screen === 'gameplay') {
    document.getElementById('score-display').textContent = state.score;
    document.getElementById('target-display').textContent = state.target;
    document.getElementById('moves-display').textContent = state.moves;
    document.getElementById('bomb-count').textContent = state.bombCount;
    document.getElementById('rocket-count').textContent = state.rocketCount;
    document.getElementById('swap-count').textContent = state.swapCount;
    renderBoard(state);
} else if (state.screen === 'level_select') {
    renderLevelSelect(state);
} else if (state.screen === 'shop') {
    document.getElementById('coins-display').textContent = state.coins;
    renderShop(state);
} else if (state.screen === 'game_result') {
    renderGameResult(state);
} else if (state.screen === 'high_scores') {
    renderHighScores(state);
} else if (state.screen === 'settings') {
    renderSettings(state);
}
renderActionBar(state); }

        /** @param {object} state */
        function renderBoard(state) { const boardEl = document.getElementById('game-board');
boardEl.style.gridTemplateColumns = `repeat(${COLS}, var(--cell-size))`;
let html = '';
for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
        let gemType = state.board[r][c];
        let gemClass = gemType >= 0 && gemType < NUM_GEM_TYPES ? GEM_COLORS[gemType] : '';
        let selectedClass = '';
        if (state.selectedCell && state.selectedCell.row === r && state.selectedCell.col === c) {
            selectedClass = ' selected';
        }
        html += `<div class="board-cell ${gemClass}${selectedClass}" data-row="${r}" data-col="${c}"></div>`;
    }
}
boardEl.innerHTML = html; }

        /** @param {object} state */
        function renderLevelSelect(state) { let grid = document.getElementById('level-grid');
    grid.innerHTML = '';
    let levels = state.levels;
    if (!levels || levels.length === 0) {
        levels = [];
        let maxLevel = state.maxLevel || 20;
        let unlocked = state.unlockedLevel || 1;
        for (let i = 1; i <= maxLevel; i++) {
            levels.push({ id: i, unlocked: i <= unlocked });
        }
    }
    for (let i = 0; i < levels.length; i++) {
        let level = levels[i];
        let btn = document.createElement('button');
        btn.textContent = level.id;
        btn.className = 'w-12 h-12 rounded-full font-bold text-lg ' + (level.unlocked ? 'bg-yellow-400 text-slate-900 active:scale-95 transition' : 'bg-slate-600 text-slate-400 cursor-not-allowed');
        btn.disabled = !level.unlocked;
        if (level.unlocked) {
            btn.addEventListener('click', function() {
                gameState = handleAction(gameState, { type: 'select_level', level: level.id });
                render(gameState);
            });
        }
        grid.appendChild(btn);
    } }

        /** @param {object} state */
        function renderShop(state) { let coinsDisplay = document.getElementById('coins-display');
coinsDisplay.textContent = state.coins;

let shopItemsContainer = document.getElementById('shop-items');
shopItemsContainer.innerHTML = '';

let items = [
    { type: 'bomb', icon: '💣', name: '炸弹', price: 100 },
    { type: 'rocket', icon: '🚀', name: '火箭', price: 150 },
    { type: 'swap', icon: '🔄', name: '交换', price: 200 }
];

for (let item of items) {
    let itemDiv = document.createElement('div');
    itemDiv.className = 'flex justify-between items-center bg-slate-700 rounded-xl px-4 py-3';
    
    let infoSpan = document.createElement('span');
    infoSpan.textContent = `${item.icon} ${item.name} - ${item.price}💰`;
    infoSpan.className = 'text-white text-sm';
    
    let buyBtn = document.createElement('button');
    buyBtn.textContent = '购买';
    buyBtn.className = 'px-4 py-1 bg-yellow-500 text-slate-900 rounded-full text-xs font-bold';
    
    if (state.coins < item.price) {
        buyBtn.disabled = true;
        buyBtn.className += ' opacity-50 cursor-not-allowed';
    }
    
    buyBtn.addEventListener('click', function() {
        gameState = handleAction(gameState, { type: 'buy_item', itemType: item.type });
        render(gameState);
    });
    
    itemDiv.appendChild(infoSpan);
    itemDiv.appendChild(buyBtn);
    shopItemsContainer.appendChild(itemDiv);
} }

        /** @param {object} state */
        function renderHighScores(state) { let scoresList = document.getElementById('scores-list');
scoresList.innerHTML = '';
let scores = state.highScores || [];
if (scores.length === 0) {
    let emptyItem = document.createElement('li');
    emptyItem.textContent = '暂无记录';
    emptyItem.className = 'text-slate-400 text-center';
    scoresList.appendChild(emptyItem);
} else {
    for (let i = 0; i < scores.length; i++) {
        let entry = scores[i];
        let scoreValue = (typeof entry === 'object' && entry !== null) ? entry.score : entry;
        let levelValue = (typeof entry === 'object' && entry !== null && entry.level !== undefined) ? entry.level : null;
        let li = document.createElement('li');
        let text = `${i + 1}. ${scoreValue}分`;
        if (levelValue !== null) {
            text += ` (关卡${levelValue})`;
        }
        li.textContent = text;
        li.className = 'py-1';
        scoresList.appendChild(li);
    }
} }

        /** @param {object} state */
        function renderGameResult(state) { let resultTitle = document.getElementById('result-title');
let resultScore = document.getElementById('result-score');
let btnNextLevel = document.getElementById('btn-next-level');

if (state.result === 'win') {
    resultTitle.textContent = '🎉 恭喜过关！';
    btnNextLevel.classList.remove('hidden');
} else {
    resultTitle.textContent = '😢 失败了';
    btnNextLevel.classList.add('hidden');
}
resultScore.textContent = '分数: ' + state.score; }

        /** @param {object} state */

        /**

         * @param {number} numTypes
         * @returns {Array<Array<number>>} 2D board array with no initial matches

        function createBoard(rows, cols, numTypes) { let board = [];

    board[r] = [];
    for (let c = 0; c < cols; c++) {
        let type;
        do {
            type = Math.floor(Math.random() * numTypes);
        } while (
            (c >= 2 && board[r][c - 1] === type && board[r][c - 2] === type) ||
            (r >= 2 && board[r - 1][c] === type && board[r - 2][c] === type)

    }

        /**
         * @param {Array<Array<number>>} board

        function findMatches(board) { let matches = [];

let visitedV = [];
for (let i = 0; i < rows; i++) {
    let rowH = [];
    let rowV = [];
    for (let j = 0; j < cols; j++) {

        rowV.push(false);
    }
    visitedH.push(rowH);
    visitedV.push(rowV);

for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
        if (board[r][c] === -1) continue;
        // horizontal match
        if (!visitedH[r][c]) {
            let color = board[r][c];
            let count = 1;
            let c2 = c + 1;
            while (c2 < cols && board[r][c2] === color) {
                count++;
                c2++;
            }
            if (count >= 3) {
                matches.push({ r: r, c: c, count: count, dir: 'h' });
                for (let i = c; i < c + count; i++) {
                    visitedH[r][i] = true;
                }

        }
        // vertical match
        if (!visitedV[r][c]) {
            let color = board[r][c];
            let count = 1;
            let r2 = r + 1;
            while (r2 < rows && board[r2][c] === color) {
                count++;
                r2++;
            }
            if (count >= 3) {
                matches.push({ r: r, c: c, count: count, dir: 'v' });
                for (let i = r; i < r + count; i++) {
                    visitedV[i][c] = true;
                }

        /**

    newBoard[cell.r][cell.c] = -1;

        /**
         * @param {Array<Array<number>>} board

    let colValues = [];
    for (let r = rows - 1; r >= 0; r--) {
        if (board[r][c] !== -1) {
            colValues.push(board[r][c]);
        }
    }
    for (let i = 0; i < colValues.length; i++) {
        newBoard[rows - 1 - i][c] = colValues[i];
    }

        /**
         * @param {Array<Array<number>>} board
         * @param {number} numTypes
         * @returns {Array<Array<number>>} board with empty cells (-1) filled
         */

  for (let c = 0; c < board[r].length; c++) {
    if (board[r][c] === -1) {
      board[r][c] = Math.floor(Math.random() * numTypes);
    }
  }
}

        /**
         * @param {number} r1
         * @param {number} c1
         * @param {number} r2
         * @param {number} c2

        /**
         * @param {Array<Array<number>>} board
         * @param {number} r1

         * @param {number} c2

tempBoard[r2][c2] = temp;
let matches = findMatches(tempBoard);

        /**
         * Process cascading: find matches, remove, apply gravity, fill, repeat.
         * @param {Array<Array<number>>} board
         * @param {number} numTypes
         * @returns {{board:Array<Array<number>>, totalCleared:number, cascades:number}}
         */
        function processBoard(board, numTypes) { let workingBoard = deepCloneBoard(board);

let cascades = 0;
while (true) {
    let matches = findMatches(workingBoard);
    if (!matches || matches.length === 0) break;
    let cellSet = {};
    for (let i = 0; i < matches.length; i++) {
        let m = matches[i];
        let r = m.r;
        let c = m.c;
        let count = m.count;
        let dir = m.dir;
        for (let d = 0; d < count; d++) {
            let rr = r;
            let cc = c;
            if (dir === 'vertical') {
                rr = r + d;
            } else if (dir === 'horizontal') {
                cc = c + d;
            }
            let key = rr + ',' + cc;
            cellSet[key] = { r: rr, c: cc };

        /**
         * @param {Array<Array<number>>} board

        function isBoardDeadlocked(board) { let rows = board.length;

    for (let c = 0; c < cols; c++) {

        /**
         * @param {Array<Array<number>>} board
         * @param {number} numTypes
         * @returns {Array<Array<number>>} shuffled board with at least one valid move

        function shuffleBoard(board, numTypes) { let rows = board.length;
let cols = board[0].length;

    for (let c = 0; c < cols; c++) {
        flat.push(board[r][c]);

let maxAttempts = 100;

    // Fisher-Yates shuffle
    for (let i = flat.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        let temp = flat[i];
        flat[i] = flat[j];
        flat[j] = temp;

    let newBoard = [];
    for (let r = 0; r < rows; r++) {
        let row = [];
        for (let c = 0; c < cols; c++) {
            row.push(flat[r * cols + c]);

        newBoard.push(row);
    }
    // Check for initial matches
    let matches = findMatches(newBoard);
    if (matches.length > 0) {
        attempts++;
        if (attempts >= maxAttempts) {
            // fallback to fresh board generation via createBoard then process
            newBoard = createBoard(rows, cols, numTypes);
            // In case createBoard yields a deadlock, we rely on caller to handle

    }
    // Ensure at least one valid move
    if (!isBoardDeadlocked(newBoard)) {
        return newBoard;
    }
    attempts++;
    if (attempts >= maxAttempts) {
        // fallback: create a fresh board, process it, and hope
        newBoard = createBoard(rows, cols, numTypes);
        let processed = processBoard(newBoard, numTypes);
        newBoard = processed.board;
        break;
    }

        /**
         * @param {number} matchSize - number of gems in the match

         */
        function calculateScore(matchSize) { let score = 0;

    score = 30;
} else if (matchSize === 4) {
    score = 60;
} else if (matchSize === 5) {

        /**
         * @param {object} state

        /**

                        newBoard[r][c] = -1;

            for (let r = 0; r < ROWS; r++) newBoard[r][col] = -1;

let isAdjacent = Math.abs(selected.row - row) + Math.abs(selected.col - col) === 1;

    return { ...state, selected: { row, col } };
}

if (!wouldCreateMatch(state.board, selected.row, selected.col, row, col)) {
    return { ...state, selected: { row, col } };
}

let newBoard = deepCloneBoard(state.board);
let temp = newBoard[selected.row][selected.col];
newBoard[selected.row][selected.col] = newBoard[row][col];
newBoard[row][col] = temp;

let processed = processBoard(newBoard, NUM_GEM_TYPES);
let scoreGain = processed.totalCleared * 10;
let newMoves = state.moves - 1;

let newState = {
    ...state,
    board: processed.board,
    score: state.score + scoreGain,
    moves: newMoves,
    selected: null,

let result = checkWinCondition(newState);

    newState.gameResult = result;

    } else {
        dispatch({ type: 'cell_click', row, col });
    }
});

// ---- initial render ----
render(gameState); }
