<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>消消乐 - Match-3</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root {
            --gem-0: #ef4444;
            --gem-1: #3b82f6;
            --gem-2: #22c55e;
            --gem-3: #eab308;
            --gem-4: #a855f7;
            --cell-size: 11vw;
            --board-padding: 2vw;
        }
        .screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 72px;
        }
        .screen.active {
            display: flex !important;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(8, var(--cell-size));
            gap: 2px;
            justify-content: center;
            align-content: center;
            padding: var(--board-padding);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .gem-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.9);
        }
        .gem-cell:active {
            transform: scale(0.9);
        }
        .gem-cell.selected {
            box-shadow: 0 0 0 4px #fff, 0 0 0 7px #fbbf24, 0 0 16px 4px rgba(251, 191, 36, 0.6);
            transform: scale(1.08);
            z-index: 2;
        }
        .gem-cell.hint-cell {
            box-shadow: 0 0 0 4px #fff, 0 0 0 7px #22d3ee, 0 0 14px 3px rgba(34, 211, 238, 0.55);
            transform: scale(1.05);
            z-index: 2;
            animation: hintPulse 0.7s ease-in-out infinite alternate;
        }
        @keyframes hintPulse {
            0% {
                box-shadow: 0 0 0 4px #fff, 0 0 0 7px #22d3ee, 0 0 14px 3px rgba(34, 211, 238, 0.55);
            }
            100% {
                box-shadow: 0 0 0 4px #fff, 0 0 0 10px #22d3ee, 0 0 20px 6px rgba(34, 211, 238, 0.75);
            }
        }
        .gem-cell.matched {
            animation: pop 0.35s ease-out forwards;
        }
        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            60% {
                transform: scale(1.25);
                opacity: 0.6;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }
        .gem-cell.drop-in {
            animation: drop 0.28s ease-out;
        }
        @keyframes drop {
            0% {
                transform: translateY(-60px);
                opacity: 0.5;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        #action-bar button {
            min-width: 56px;
            min-height: 44px;
            font-size: 0.85rem;
            border-radius: 8px;
            transition: background 0.15s;
        }
    </style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <!-- ========== SCRIPT ========== -->
    <script>
        // ── GLOBAL STATE REFERENCE ──
        let gameState;

        // ── GEM COLOR MAP ──
        const GEM_COLORS = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7'];
        const GEM_NAMES = ['🔴', '🔵', '🟢', '🟡', '🟣'];

        // ── SCREEN IDS ──
        const SCREEN_IDS = [
            'home', 'level_select', 'gameplay', 'pause_menu',
            'settings', 'shop', 'game_result', 'high_scores'
        ];

        /** @returns {object} Initial game state */
        function initState() {
            let board = [];
            for (let r = 0; r < 8; r++) {
                board[r] = [];
                for (let c = 0; c < 8; c++) {
                    let forbidden = [];
                    if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
                        forbidden.push(board[r][c - 1]);
                    }
                    if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
                        forbidden.push(board[r - 1][c]);
                    }
                    let gem;
                    do {
                        gem = Math.floor(Math.random() * 5);
                    } while (forbidden.includes(gem));
                    board[r][c] = gem;
                }
            }
            let state = {
                screen: 'home',
                phase: 'menu',
                board: board,
                score: 0,
                moves: 30,
                level: 1,
                targetScore: 500,
                selectedRow: null,
                selectedCol: null,
                coins: 100,
                soundOn: true,
                musicOn: true,
                highScores: [],
                shopItems: [
                    { id: 1, name: '额外步数+5', cost: 50, description: '增加5步', owned: 0 },
                    { id: 2, name: '炸弹', cost: 80, description: '清除3x3区域', owned: 0 }
                ],
                hint: null,
                powerUps: {},
                gameResult: null,
                levels: []
            };
            // Generate default levels
            for (let i = 0; i < 20; i++) {
                state.levels.push({
                    unlocked: i === 0,
                    stars: 0,
                    targetScore: 500 + i * 200,
                    moves: 30 - Math.floor(i / 3)
                });
            }
            return state;
        }

        /**
         * Helper: creates a fresh board with no initial matches.
         * Uses the same match-avoidance logic as initState.
         * @param {object} state - state with level info
         * @returns {Array<Array<number>>} 8x8 board
         */
        function generateCleanBoard(state) {
            let board = [];
            for (let r = 0; r < 8; r++) {
                board[r] = [];
                for (let c = 0; c < 8; c++) {
                    let forbidden = [];
                    if (c >= 2 && board[r][c - 1] === board[r][c - 2]) {
                        forbidden.push(board[r][c - 1]);
                    }
                    if (r >= 2 && board[r - 1][c] === board[r - 2][c]) {
                        forbidden.push(board[r - 1][c]);
                    }
                    let gem;
                    do {
                        gem = Math.floor(Math.random() * 5);
                    } while (forbidden.includes(gem));
                    board[r][c] = gem;
                }
            }
            // Verify no initial matches (safety check)
            let matches = findMatches({ board: board });
            let iterations = 0;
            while (matches.length > 0 && iterations < 50) {
                // Remove matches and refill with match-avoidance
                let flatMatches = [];
                for (let g = 0; g < matches.length; g++) {
                    for (let i = 0; i < matches[g].length; i++) {
                        flatMatches.push(matches[g][i]);
                    }
                }
                for (let k = 0; k < flatMatches.length; k++) {
                    let rr = flatMatches[k][0];
                    let cc = flatMatches[k][1];
                    board[rr][cc] = -1;
                }
                // Apply gravity
                for (let col = 0; col < 8; col++) {
                    let gems = [];
                    for (let row = 7; row >= 0; row--) {
                        if (board[row][col] !== -1) {
                            gems.push(board[row][col]);
                        }
                    }
                    for (let row = 7; row >= 0; row--) {
                        let gemIndex = 7 - row;
                        if (gemIndex < gems.length) {
                            board[row][col] = gems[gemIndex];
                        } else {
                            board[row][col] = -1;
                        }
                    }
                }
                // Fill empty cells with match avoidance
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (board[r][c] === -1) {
                            let forbidden = [];
                            if (c >= 2 && board[r][c - 1] === board[r][c - 2] && board[r][c - 1] !== -1) {
                                forbidden.push(board[r][c - 1]);
                            }
                            if (r >= 2 && board[r - 1][c] === board[r - 2][c] && board[r - 1][c] !== -1) {
                                forbidden.push(board[r - 1][c]);
                            }
                            let gem;
                            let attempts = 0;
                            do {
                                gem = Math.floor(Math.random() * 5);
                                attempts++;
                            } while (forbidden.includes(gem) && attempts < 20);
                            board[r][c] = gem;
                        }
                    }
                }
                matches = findMatches({ board: board });
                iterations++;
            }
            return board;
        }

        /**
         * Pure synchronous state reducer.
         * @param {object} state - Current game state (plain object, no Set/Map/Date)
         * @param {object} action - Flat action object, e.g. {type:'NAVIGATE', screen:'home'}
         * @returns {object} New game state
         */
        function handleAction(state, action) {
            switch (action.type) {
                case 'NAVIGATE': {
                    let newState = { ...state, screen: action.screen };
                    if (action.screen === 'gameplay') {
                        newState.phase = 'playing';
                    } else if (action.screen === 'pause_menu') {
                        newState.phase = 'paused';
                    } else if (action.screen === 'game_result') {
                        newState.phase = 'game_over';
                    } else {
                        newState.phase = 'menu';
                    }
                    if (newState.screen !== 'gameplay') {
                        newState.selectedRow = null;
                        newState.selectedCol = null;
                        newState.hint = null;
                    }
                    return newState;
                }

                case 'NEW_GAME': {
                    let level = action.level != null ? action.level : (state.level || 1);
                    let levelData = null;
                    if (state.levels && state.levels[level - 1]) {
                        levelData = state.levels[level - 1];
                    }
                    let levelMoves = (levelData && levelData.moves != null) ? levelData.moves : 30;
                    let levelTargetScore = (levelData && levelData.targetScore != null) ? levelData.targetScore : 500;
                    let newState = {
                        ...state,
                        screen: 'gameplay',
                        phase: 'playing',
                        level: level,
                        score: 0,
                        moves: levelMoves,
                        targetScore: levelTargetScore,
                        selectedRow: null,
                        selectedCol: null,
                        hint: null,
                        gameResult: null
                    };
                    newState.board = generateCleanBoard(newState);
                    return newState;
                }

                case 'RESTART_LEVEL':
                case 'RESTART':
                case 'REPLAY': {
                    let level = state.level || 1;
                    let levelData = null;
                    if (state.levels && state.levels[level - 1]) {
                        levelData = state.levels[level - 1];
                    }
                    let levelMoves = (levelData && levelData.moves != null) ? levelData.moves : 30;
                    let levelTargetScore = (levelData && levelData.targetScore != null) ? levelData.targetScore : 500;
                    let newState = {
                        ...state,
                        screen: 'gameplay',
                        phase: 'playing',
                        score: 0,
                        moves: levelMoves,
                        targetScore: levelTargetScore,
                        selectedRow: null,
                        selectedCol: null,
                        hint: null,
                        gameResult: null,
                        level: level
                    };
                    newState.board = generateCleanBoard(newState);
                    return newState;
                }

                case 'RESUME': {
                    return { ...state, screen: 'gameplay', phase: 'playing' };
                }

                case 'SELECT_LEVEL': {
                    let level = action.level || 1;
                    let levelData = null;
                    if (state.levels && state.levels[level - 1]) {
                        levelData = state.levels[level - 1];
                    }
                    let levelMoves = (levelData && levelData.moves != null) ? levelData.moves : 30;
                    let levelTargetScore = (levelData && levelData.targetScore != null) ? levelData.targetScore : 500;
                    let newState = {
                        ...state,
                        screen: 'gameplay',
                        phase: 'playing',
                        level: level,
                        score: 0,
                        moves: levelMoves,
                        targetScore: levelTargetScore,
                        selectedRow: null,
                        selectedCol: null,
                        hint: null,
                        gameResult: null
                    };
                    newState.board = generateCleanBoard(newState);
                    return newState;
                }

                case 'CELL_CLICK': {
                    if (state.screen !== 'gameplay') return state;
                    if (state.moves <= 0 && state.gameResult) return state;
                    if (state.phase === 'game_over') return state;
                    let row = action.row;
                    let col = action.col;
                    if (row == null || col == null) return state;
                    let newState = handleBoardClick(state, row, col);
                    // Check if game ended after this move (moves exhausted, no valid moves, or target score reached)
                    if (newState.screen === 'game_result' && !newState.gameResult) {
                        let won = newState.score >= (newState.targetScore || 500);
                        let stars = 0;
                        if (won) {
                            if (newState.score >= newState.targetScore * 2) stars = 3;
                            else if (newState.score >= newState.targetScore * 1.5) stars = 2;
                            else stars = 1;
                        }
                        newState.phase = 'game_over';
                        newState.gameResult = { won: won, score: newState.score, stars: stars };
                        // Update high scores
                        let highScores = [...(newState.highScores || [])];
                        highScores.push({ name: 'Player', score: newState.score, level: newState.level });
                        highScores.sort(function(a, b) { return b.score - a.score; });
                        highScores = highScores.slice(0, 20);
                        newState.highScores = highScores;
                        // Update level stars
                        if (newState.levels && newState.levels[newState.level - 1]) {
                            let newLevels = newState.levels.map(function(l, i) {
                                if (i === newState.level - 1 && l.stars < stars) {
                                    return { ...l, stars: stars };
                                }
                                // Unlock next level if won
                                if (i === newState.level && won && !l.unlocked) {
                                    return { ...l, unlocked: true };
                                }
                                return l;
                            });
                            newState.levels = newLevels;
                        }
                    }
                    return newState;
                }

                case 'TOGGLE_SOUND': {
                    return { ...state, soundOn: !state.soundOn };
                }

                case 'TOGGLE_MUSIC': {
                    return { ...state, musicOn: !state.musicOn };
                }

                case 'CLEAR_DATA': {
                    return { ...state, highScores: [], coins: 100, powerUps: {}, shopItems: state.shopItems.map(function(item) { return {
                                ...item, owned: 0 }; }) };
                }

                case 'BUY_ITEM': {
                    let itemId = action.itemId;
                    let shopItem = null;
                    let itemIndex = -1;
                    for (let i = 0; i < state.shopItems.length; i++) {
                        if (state.shopItems[i].id == itemId) {
                            shopItem = state.shopItems[i];
                            itemIndex = i;
                            break;
                        }
                    }
                    if (!shopItem) return state;
                    if (state.coins < shopItem.cost) return state;
                    let newShopItems = state.shopItems.map(function(item, idx) {
                        if (idx === itemIndex) {
                            return { ...item, owned: (item.owned || 0) + 1 };
                        }
                        return item;
                    });
                    return { ...state, coins: state.coins - shopItem.cost, shopItems: newShopItems };
                }

                case 'USE_POWERUP': {
                    let id = action.powerUpId;
                    let shopItem = null;
                    let itemIndex = -1;
                    for (let i = 0; i < state.shopItems.length; i++) {
                        if (state.shopItems[i].id == id) {
                            shopItem = state.shopItems[i];
                            itemIndex = i;
                            break;
                        }
                    }
                    if (!shopItem || !shopItem.owned || shopItem.owned <= 0) return state;
                    let newShopItems = state.shopItems.map(function(item, idx) {
                        if (idx === itemIndex) {
                            return { ...item, owned: item.owned - 1 };
                        }
                        return item;
                    });
                    let newState = { ...state, shopItems: newShopItems };
                    if (id == 1) {
                        // 额外步数+5
                        newState.moves = (state.moves || 0) + 5;
                    } else if (id == 2) {
                        // 炸弹 - clear 3x3 around selected cell
                        if (typeof newState.selectedRow === 'number' && newState.selectedRow >= 0 && typeof newState
                            .selectedCol === 'number' && newState.selectedCol >= 0) {
                            let sr = newState.selectedRow;
                            let sc = newState.selectedCol;
                            let newBoard = newState.board.map(function(row) { return [...row]; });
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    let rr = sr + dr;
                                    let cc = sc + dc;
                                    if (rr >= 0 && rr < 8 && cc >= 0 && cc < 8) {
                                        newBoard[rr][cc] = -1;
                                    }
                                }
                            }
                            newState.board = applyGravity({ board: newBoard }).board;
                            newState.board = fillBoard({ board: newState.board }).board;
                            newState.selectedRow = null;
                            newState.selectedCol = null;
                        }
                    }
                    return newState;
                }

                case 'ACTION_BAR': {
                    if (state.screen !== 'gameplay') return state;
                    if (action.index === 1) {
                        // Hint button
                        let hintCoord = getHint(state);
                        if (hintCoord && hintCoord.length === 4) {
                            return { ...state, hint: hintCoord };
                        }
                    }
                    return state;
                }

                default:
                    return state;
            }
        }

        /**
         * Updates entire DOM from state.
         * @param {object} state - Current game state
         */
        function render(state) {
            let screenId = state.screen;
            showScreen(screenId);

            /* ── Update numeric displays & dynamic lists ── */

        // ── MATCH-3 HELPER FUNCTIONS ──

        /**
         * Renders the 8x8 board into #game-board.
         * @param {object} state - Current game state
         */
        function renderBoard(state) {
            let boardEl = document.getElementById('game-board');
            if (!boardEl) return;
            boardEl.innerHTML = '';
            let board = state.board;
            let hintCells = {};
            if (state.hint && state.hint.length === 4) {
                hintCells[state.hint[0] + ',' + state.hint[1]] = true;
                hintCells[state.hint[2] + ',' + state.hint[3]] = true;
            }
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let gem = board[r][c];
                    let cell = document.createElement('div');
                    cell.className = 'gem-cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    if (gem >= 0 && gem <= 4) {
                        cell.style.backgroundColor = GEM_COLORS[gem];
                        cell.textContent = GEM_NAMES[gem];
                    } else {
                        cell.style.backgroundColor = 'transparent';
                        cell.textContent = '';
                    }
                    if (typeof state.selectedRow === 'number' && state.selectedRow >= 0 && state.selectedRow === r &&
                        state.selectedCol === c) {
                        cell.classList.add('selected');
                    }
                    if (hintCells[r + ',' + c]) {
                        cell.classList.add('hint-cell');
                    }
                    boardEl.appendChild(cell);
                }
            }
        }

        /**
         * Handles a click on a board cell.
         * @param {object} state - Current game state
         * @param {number} row - Row index of clicked cell
         * @param {number} col - Column index of clicked cell
         * @returns {object} New state after processing the click
         */
        function handleBoardClick(state, row, col) {
            let newState = { ...state, hint: null };
            let selRow = newState.selectedRow;
            let selCol = newState.selectedCol;

            if (selRow === null || selCol === null || typeof selRow !== 'number' || typeof selCol !== 'number') {
                newState.selectedRow = row;
                newState.selectedCol = col;
                return newState;
            }

            if (selRow === row && selCol === col) {
                newState.selectedRow = null;
                newState.selectedCol = null;
                return newState;
            }

            let rowDiff = Math.abs(selRow - row);
            let colDiff = Math.abs(selCol - col);
            let isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);

            if (isAdjacent) {
                let afterMove = applyMove(newState, selRow, selCol, row, col);
                afterMove.selectedRow = null;
                afterMove.selectedCol = null;
                afterMove.hint = null;
                // End game if moves exhausted, no valid moves remain, OR target score reached
                if (afterMove.moves <= 0 || checkGameOver(afterMove) || afterMove.score >= (afterMove.targetScore || 500)) {
                    afterMove.screen = 'game_result';
                    afterMove.phase = 'game_over';
                }
                return afterMove;
            }

            newState.selectedRow = row;
            newState.selectedCol = col;
            return newState;
        }

        /**
         * Swaps two pieces and processes resulting matches.
         * @param {object} state - Current game state
         * @param {number} fromRow - Source row
         * @param {number} fromCol - Source column
         * @param {number} toRow - Target row
         * @param {number} toCol - Target column
         * @returns {object} New state after the move
         */
        function applyMove(state, fromRow, fromCol, toRow, toCol) {
            let newBoard = state.board.map(function(row) { return [...row]; });
            let temp = newBoard[fromRow][fromCol];
            newBoard[fromRow][fromCol] = newBoard[toRow][toCol];
            newBoard[toRow][toCol] = temp;
            let tempState = { ...state, board: newBoard };
            let matches = findMatches(tempState);
            if (!matches || matches.length === 0) {
                // Invalid swap - return state with deselection but no move penalty
                return state;
            }
            let newMoves = state.moves - 1;
            let newScore = state.score;
            let cascadeMultiplier = 1;
            let currentState = tempState;
            while (matches && matches.length > 0) {
                let cascadePoints = 0;
                for (let g = 0; g < matches.length; g++) {
                    cascadePoints += matches[g].length * 10;
                }
                newScore += cascadePoints * cascadeMultiplier;
                currentState = removeMatches(currentState, matches);
                currentState = applyGravity(currentState);
                currentState = fillBoard(currentState);
                matches = findMatches(currentState);
                cascadeMultiplier++;
            }
            let finalState = {
                ...currentState,
                score: newScore,
                moves: newMoves,
                selectedRow: null,
                selectedCol: null
            };
            return finalState;
        }

        /**
         * Finds all horizontal and vertical matches of 3+ identical gems.
         * @param {object} state - Current game state
         * @returns {Array<Array<[number,number]>>} Array of match groups, each group is array of [row,col] pairs
         */
        function findMatches(state) {
            let board = state.board;
            let matches = [];
            // Horizontal matches
            for (let r = 0; r < 8; r++) {
                let c = 0;
                while (c < 8) {
                    if (board[r][c] === -1) {
                        c++;
                        continue;
                    }
                    let gem = board[r][c];
                    let start = c;
                    while (c < 8 && board[r][c] === gem) {
                        c++;
                    }
                    if (c - start >= 3) {
                        let group = [];
                        for (let i = start; i < c; i++) {
                            group.push([r, i]);
                        }
                        matches.push(group);
                    }
                }
            }
            // Vertical matches
            for (let c = 0; c < 8; c++) {
                let r = 0;
                while (r < 8) {
                    if (board[r][c] === -1) {
                        r++;
                        continue;
                    }
                    let gem = board[r][c];
                    let start = r;
                    while (r < 8 && board[r][c] === gem) {
                        r++;
                    }
                    if (r - start >= 3) {
                        let group = [];
                        for (let i = start; i < r; i++) {
                            group.push([i, c]);
                        }
                        matches.push(group);
                    }
                }
            }
            return matches;
        }

        /**
         * Removes matched gems from the board (sets to -1).
         * Does NOT increment score (score is handled by applyMove's cascade logic).
         * @param {object} state - Current game state
         * @param {Array<Array<[number,number]>>} matches - Match groups from findMatches
         * @returns {object} New state with matched cells cleared
         */
        function removeMatches(state, matches) {
            let newBoard = state.board.map(function(row) { return [...row]; });

            for (let g = 0; g < matches.length; g++) {
                let group = matches[g];
                for (let i = 0; i < group.length; i++) {
                    let r = group[i][0];
                    let c = group[i][1];
                    if (newBoard[r][c] !== -1) {
                        newBoard[r][c] = -1;
                    }
                }
            }

            return { ...state, board: newBoard };
        }

        /**
         * Applies gravity: gems fall down to fill empty cells (-1).
         * @param {object} state - Current game state
         * @returns {object} New state after gravity
         */
        function applyGravity(state) {
            let newBoard = state.board.map(function(row) { return [...row]; });
            let rows = newBoard.length;
            let cols = newBoard[0].length;

            for (let col = 0; col < cols; col++) {
                let gems = [];
                for (let row = rows - 1; row >= 0; row--) {
                    if (newBoard[row][col] !== -1) {
                        gems.push(newBoard[row][col]);
                    }
                }

                for (let row = rows - 1; row >= 0; row--) {
                    let gemIndex = rows - 1 - row;
                    if (gemIndex < gems.length) {
                        newBoard[row][col] = gems[gemIndex];
                    } else {
                        newBoard[row][col] = -1;
                    }
                }
            }

            return { ...state, board: newBoard };
        }

        /**
         * Fills all empty cells (-1) with random gems.
         * @param {object} state - Current game state
         * @returns {object} New state with board filled
         */
        function fillBoard(state) {
            let board = state.board.map(function(row) { return row.slice(); });
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[r].length; c++) {
                    if (board[r][c] === -1) {
                        board[r][c] = Math.floor(Math.random() * 5);
                    }
                }
            }
            return { ...state, board: board };
        }

        /**
         * Checks if swapping two adjacent cells is valid.
         * @param {object} state - Current game state
         * @param {number} r1 - Row of first cell
         * @param {number} c1 - Column of first cell
         * @param {number} r2 - Row of second cell
         * @param {number} c2 - Column of second cell
         * @returns {boolean} True if the swap is between adjacent cells
         */
        function isValidSwap(state, r1, c1, r2, c2) {
            let rowDiff = Math.abs(r1 - r2);
            let colDiff = Math.abs(c1 - c2);
            if (r1 < 0 || r1 >= 8 || c1 < 0 || c1 >= 8 || r2 < 0 || r2 >= 8 || c2 < 0 || c2 >= 8) {
                return false;
            }
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }

        /**
         * Checks if any valid moves remain on the board.
         * Skips empty cells (-1) during check.
         * @param {object} state - Current game state
         * @returns {boolean} True if no moves remain
         */
        function checkGameOver(state) {
            let board = state.board;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === -1) continue;
                    if (c < 7 && board[r][c + 1] !== -1) {
                        let newBoard = board.map(function(row) { return [...row]; });
                        let tmp = newBoard[r][c];
                        newBoard[r][c] = newBoard[r][c + 1];
                        newBoard[r][c + 1] = tmp;
                        if (findMatches({ board: newBoard }).length > 0) return false;
                    }
                    if (r < 7 && board[r + 1][c] !== -1) {
                        let newBoard = board.map(function(row) { return [...row]; });
                        let tmp = newBoard[r][c];
                        newBoard[r][c] = newBoard[r + 1][c];
                        newBoard[r + 1][c] = tmp;
                        if (findMatches({ board: newBoard }).length > 0) return false;
                    }
                }
            }
            return true;
        }

        /**
         * Finds a hint move (first available valid swap that yields a match).
         * @param {object} state - Current game state
         * @returns {Array<[number,number,number,number]>|null} [r1,c1,r2,c2] or null if none
         */
        function getHint(state) {
            let rows = state.board.length;
            let cols = state.board[0].length;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (state.board[r][c] === -1) continue;
                    let dirs = [
                        [-1, 0],
                        [0, 1],
                        [1, 0],
                        [0, -1]
                    ];
                    for (let d = 0; d < dirs.length; d++) {
                        let nr = r + dirs[d][0];
                        let nc = c + dirs[d][1];
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && state.board[nr][nc] !== -1 && isValidSwap(state, r, c, nr, nc)) {
                            let tempBoard = state.board.map(function(row) { return [...row]; });
                            let tempVal = tempBoard[r][c];
                            tempBoard[r][c] = tempBoard[nr][nc];
                            tempBoard[nr][nc] = tempVal;
                            let tempState = { ...state, board: tempBoard };
                            let matches = findMatches(tempState);
                            if (matches.length > 0) {
                                return [r, c, nr, nc];
                            }
                        }
                    }
                }
            }
            return null;
        }

        // ── CHESS-STYLE STUB FUNCTIONS (for architecture parity) ──

        /**
         * @param {object} state
         * @param {number} row
         * @param {number} col
         * @param {string} color
         * @returns {Array<[number,number]>}

        function getGeneralMoves(state, row, col, color) { return []; }

        /**

         * @param {number} col
         * @param {string} color
         * @returns {Array<[number,number]>}
         */
        function getHorseMoves(state, row, col, color) { return []; }

        /**
         * @param {object} state
         * @param {string} color
         * @returns {boolean}
         */
        function isInCheck(state, color) { return false; }

        /**
         * @param {object} state
         * @param {string} color
         * @returns {boolean}
         */
        function isCheckmate(state, color) { return false; }

        /**
         * @param {object} state
         * @returns {object} action
         */
        function getAIMove(state) {
            let hint = getHint(state);
            if (hint && hint.length === 4) {
                return { type: 'AI_MOVE', fromRow: hint[0], fromCol: hint[1], toRow: hint[2], toCol: hint[3] };
            }
            return { type: 'NO_MOVE' };
        }

        // ── BOOT ──
        document.addEventListener('DOMContentLoaded', startGame);
    
        function getPieceEmoji(pieceType) { const emojis = ['🍵','🫖','🧋','🍃','🪷','☕']; return emojis[pieceType - 1] || emojis[0]; }
    </script>
