    <style>
        :root {
            --cell-size: min(11vw, 44px);
            --board-cols: 8;
            --board-rows: 8
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 64px
        }
        .screen:not(.active) {
            display: none !important

        .screen.active {
            display: block !important
        }
        .board {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 100'><line x1='5' y1='5' x2='85' y2='5' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='15' x2='85' y2='15' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='25' x2='85' y2='25' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='35' x2='85' y2='35' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='45' x2='85' y2='45' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='55' x2='85' y2='55' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='65' x2='85' y2='65' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='75' x2='85' y2='75' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='85' x2='85' y2='85' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='95' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='5' y1='5' x2='5' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='15' y1='5' x2='15' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='25' y1='5' x2='25' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='35' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='45' y1='5' x2='45' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='55' y1='5' x2='55' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='65' y1='5' x2='65' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='75' y1='5' x2='75' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='85' y1='5' x2='85' y2='95' stroke='%238B4513' stroke-width='1'/><line x1='35' y1='5' x2='55' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='5' x2='35' y2='25' stroke='%238B4513' stroke-width='0.8'/><line x1='35' y1='75' x2='55' y2='95' stroke='%238B4513' stroke-width='0.8'/><line x1='55' y1='75' x2='35' y2='95' stroke='%238B4513' stroke-width='0.8'/></svg>") !important;
            background-size: 100% 100% !important;
            background-repeat: no-repeat !important;
            background-color: #E8D5A0 !important
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--board-cols), var(--cell-size));
            grid-template-rows: repeat(var(--board-rows), var(--cell-size));
            gap: 2px;
            justify-content: center;
            align-content: center;
            padding: 8px;
            margin: 0 auto
        }
        .cell {
            border-radius: 8px;
            width: var(--cell-size);
            height: var(--cell-size);
            cursor: pointer;
            transition: transform .12s;
            position: relative;
            border: none !important
        }
        .cell:active {
            transform: scale(.9)
        }
        .cell.selected {
            outline: 3px solid #fff;
            outline-offset: -2px;
            z-index: 2;
            transform: scale(1.06)
        }
        .cell.matched {
            animation: pop .3s ease-out forwards
        }
        @keyframes pop {
            0% {
                transform: scale(1)
            }
            50% {
                transform: scale(1.25);
                opacity: .6
            }
            100% {
                transform: scale(0);
                opacity: 0
            }
        }
        .gem-0 {
            background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b)
        }
        .gem-1 {
            background: radial-gradient(circle at 35% 35%, #feca57, #e67e22)
        }
        .gem-2 {

        }
        .gem-5 {
            background: radial-gradient(circle at 35% 35%, #dfe6e9, #636e72)

        #action-bar {
            z-index: 40;

            bottom: 0;

            min-width: 280px;

            box-shadow: 0 16px 48px rgba(0, 0, 0, .6);
            border: 1px solid #3a3a55
        }
    </style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <script>
        /* ============================================================
           MATCH-3 GAME ENGINE — Complete working implementation
           ============================================================ */

        const ROWS = 8;
        const COLS = 8;
        const GEM_TYPES = 5;
        const INITIAL_MOVES = 30;

        // Module-level dispatch reference so render functions can dispatch actions
        let _dispatch = null;

        /** @returns {object} Initial game state */
        function initState() {
            return {
                screen: 'home',
                board: null,
                selectedCell: null,
                score: 0,
                movesLeft: INITIAL_MOVES,
                level: 1,
                combo: 0,
                comboMessage: '',
                gameStatus: 'idle',
                gameResult: null,
                coins: 0,
                highScores: [],
                levelsUnlocked: 1,
                totalLevels: 20,
                unlockedLevel: 1,
                levelStars: {},
                stars: 0,
                targetScore: 500,
                sfxEnabled: true,
                musicEnabled: true,
                vibrateEnabled: true,
                previousScreen: null,
                lockInput: false,
                selectedRow: -1,
                selectedCol: -1,
                inventory: {},
                shopItems: {}
            };
        }

        /** @param {object} state @param {object} action @returns {object} New state */
        function handleAction(state, action) {
            let newState = cloneState(state);

            switch (action.type) {
                case 'GO_HOME': {
                    newState.screen = 'home';
                    newState.gameResult = null;
                    newState.previousScreen = null;
                    break;
                }

                case 'PLAY':
                case 'START_GAME': {
                    newState.screen = 'gameplay';
                    newState.board = createBoardNoMatches();
                    newState.score = 0;; if (window._kixUpdateScore) window._kixUpdateScore(newState.score);
                    newState.movesLeft = INITIAL_MOVES;
                    newState.level = state.level || 1;
                    newState.targetScore = 500 + (newState.level - 1) * 200;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.combo = 0;
                    newState.comboMessage = '';
                    newState.gameResult = null;
                    newState.stars = 0;
                    newState.previousScreen = null;
                    newState.lockInput = false;
                    break;
                }

                case 'GO_LEVEL_SELECT': {
                    newState.screen = 'level_select';
                    break;
                }

                case 'SELECT_LEVEL': {
                    let lvl = action.level;
                    newState.level = lvl;
                    newState.targetScore = 500 + (lvl - 1) * 200;
                    newState.screen = 'gameplay';
                    newState.board = createBoardNoMatches();
                    newState.score = 0;
                    newState.movesLeft = INITIAL_MOVES;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.combo = 0;
                    newState.comboMessage = '';
                    newState.gameResult = null;
                    newState.stars = 0;
                    newState.previousScreen = null;
                    newState.lockInput = false;
                    break;
                }

                case 'GO_SHOP': {
                    newState.screen = 'shop';
                    break;
                }

                case 'GO_SETTINGS': {
                    newState.screen = 'settings';
                    break;
                }

                case 'GO_HIGH_SCORES': {
                    newState.screen = 'high_scores';
                    break;
                }

                case 'PAUSE': {
                    newState.previousScreen = state.screen;
                    newState.screen = 'pause_menu';
                    break;
                }

                case 'RESUME': {
                    newState.screen = state.previousScreen || 'gameplay';
                    newState.previousScreen = null;
                    break;
                }

                case 'RESTART': {
                    newState.screen = 'gameplay';
                    newState.board = createBoardNoMatches();
                    newState.score = 0;
                    newState.movesLeft = INITIAL_MOVES;
                    newState.targetScore = 500 + (state.level - 1) * 200;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.combo = 0;
                    newState.comboMessage = '';
                    newState.gameResult = null;
                    newState.stars = 0;
                    newState.previousScreen = null;
                    newState.lockInput = false;
                    break;
                }

                case 'QUIT':
                case 'QUIT_GAMEPLAY': {
                    newState.screen = 'home';
                    newState.gameResult = null;
                    newState.previousScreen = null;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.lockInput = false;
                    break;
                }

                case 'NEXT_LEVEL': {
                    newState.level = state.level + 1;
                    newState.targetScore = 500 + (newState.level - 1) * 200;
                    newState.screen = 'gameplay';
                    newState.board = createBoardNoMatches();
                    newState.score = 0;
                    newState.movesLeft = INITIAL_MOVES;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.combo = 0;
                    newState.comboMessage = '';
                    newState.gameResult = null;
                    newState.stars = 0;
                    newState.previousScreen = null;
                    newState.lockInput = false;
                    break;
                }

                case 'REPLAY': {
                    newState.screen = 'gameplay';
                    newState.board = createBoardNoMatches();
                    newState.score = 0;
                    newState.movesLeft = INITIAL_MOVES;
                    newState.targetScore = 500 + (state.level - 1) * 200;
                    newState.selectedCell = null;
                    newState.selectedRow = -1;
                    newState.selectedCol = -1;
                    newState.combo = 0;
                    newState.comboMessage = '';
                    newState.gameResult = null;
                    newState.stars = 0;
                    newState.previousScreen = null;
                    newState.lockInput = false;
                    break;
                }

                case 'TOGGLE_SFX': {
                    newState.sfxEnabled = !state.sfxEnabled;
                    saveToStorage('sfx', newState.sfxEnabled);
                    break;
                }

                case 'TOGGLE_MUSIC': {
                    newState.musicEnabled = !state.musicEnabled;
                    saveToStorage('music', newState.musicEnabled);
                    break;
                }

                case 'TOGGLE_VIBRATE': {
                    newState.vibrateEnabled = !state.vibrateEnabled;
                    saveToStorage('vibrate', newState.vibrateEnabled);
                    break;
                }

                case 'BOARD_CLICK': {
                    if (state.screen !== 'gameplay' || state.gameResult || state.lockInput) break;

                    let row = action.row;
                    let col = action.col;
                    let selectedCell = state.selectedCell;
                    let board = state.board;
                    let movesLeft = state.movesLeft;
                    let score = state.score;
                    let combo = state.combo;

                    if (selectedCell === null) {
                        newState.selectedCell = { row: row, col: col };
                        newState.selectedRow = row;
                        newState.selectedCol = col;
                    } else if (selectedCell.row === row && selectedCell.col === col) {
                        newState.selectedCell = null;
                        newState.selectedRow = -1;
                        newState.selectedCol = -1;
                    } else if (isAdjacent(selectedCell.row, selectedCell.col, row, col)) {
                        let sr = selectedCell.row;
                        let sc = selectedCell.col;
                        let newBoard = board.map(function(r) { return r.slice(); });
                        let temp = newBoard[sr][sc];
                        newBoard[sr][sc] = newBoard[row][col];
                        newBoard[row][col] = temp;

                        let matches = findMatches(newBoard);
                        if (matches.length === 0) {
                            // Invalid swap — revert
                            newState.selectedCell = null;
                            newState.selectedRow = -1;
                            newState.selectedCol = -1;
                            newState.board = board;
                        } else {
                            newState.selectedCell = null;
                            newState.selectedRow = -1;
                            newState.selectedCol = -1;
                            newState.movesLeft = movesLeft - 1;

                            let cascadeResult = processCascade(newBoard);
                            newState.board = cascadeResult.board;
                            let totalRemoved = cascadeResult.totalRemoved;

                            let points = calculateScore(totalRemoved, combo + 1);
                            newState.score = score + points;
                            newState.combo = combo + 1;
                            if (newState.combo > 1) {
                                newState.comboMessage = '🔥 ' + newState.combo + 'x 连击!';
                            } else {
                                newState.comboMessage = '';
                            }

                            // Determine stars based on score vs target
                            if (newState.score >= newState.targetScore * 2) {
                                newState.stars = 3;
                            } else if (newState.score >= newState.targetScore * 1.3) {
                                newState.stars = 2;
                            } else if (newState.score >= newState.targetScore) {
                                newState.stars = 1;
                            } else {
                                newState.stars = 0;
                            }

                            if (isLevelComplete(newState)) {
                                newState.gameResult = 'win';
                                newState.screen = 'game_result';
                                // Update level stars
                                let levelStars = Object.assign({}, state.levelStars || {});
                                let currentStars = levelStars[state.level] || 0;
                                if (newState.stars > currentStars) {
                                    levelStars[state.level] = newState.stars;
                                }
                                newState.levelStars = levelStars;
                                // Unlock next level
                                if (state.level >= state.levelsUnlocked) {
                                    newState.levelsUnlocked = state.level + 1;
                                    newState.unlockedLevel = state.level + 1;
                                }
                                // Update high scores
                                let highScores = (state.highScores || []).slice();
                                highScores.push({ score: newState.score, level: state.level });
                                highScores.sort(function(a, b) { return b.score - a.score; });
                                highScores = highScores.slice(0, 10);
                                newState.highScores = highScores;
                                saveToStorage('highScores', highScores);
                                newState.coins = (state.coins || 0) + Math.floor(newState.score / 100);
                                saveToStorage('coins', newState.coins);
                                saveToStorage('levelStars', levelStars);
                                saveToStorage('levelsUnlocked', newState.levelsUnlocked);
                            } else if (newState.movesLeft <= 0) {
                                newState.gameResult = 'lose';
                                newState.screen = 'game_result';
                                newState.stars = 0;
                            } else if (!hasValidMoves(newState.board)) {
                                // Reshuffle if no valid moves
                                newState.board = createBoardNoMatches();
                                newState.combo = 0;
                                newState.comboMessage = '';
                            }
                        }
                    } else {
                        // Non-adjacent cell tapped — move selection
                        newState.selectedCell = { row: row, col: col };
                        newState.selectedRow = row;
                        newState.selectedCol = col;
                    }
                    break;
                }

                case 'BUY_ITEM': {
                    let itemId = action.itemId;
                    let itemCost = action.cost || 0;
                    let currentCoins = state.coins || 0;
                    if (currentCoins >= itemCost) {
                        newState.coins = currentCoins - itemCost;
                        saveToStorage('coins', newState.coins);
                        let inventory = Object.assign({}, state.inventory || {});
                        inventory[itemId] = (inventory[itemId] || 0) + 1;
                        newState.inventory = inventory;
                        saveToStorage('inventory', inventory);
                    }
                    break;
                }

                case 'GO_BACK': {
                    newState.screen = 'home';
                    newState.previousScreen = null;
                    break;
                }

                default:
                    break;
            }

            return newState;
        }

        /** @param {object} state Updates DOM fully from state */
        function render(state) {
            showScreen(state.screen);
            if (state.screen === 'home') {
                renderHome(state);
            } else if (state.screen === 'level_select') {
                renderLevelSelect(state);
            } else if (state.screen === 'gameplay') {
                let scoreEl = document.getElementById('hud-score');
                if (scoreEl) scoreEl.textContent = '⭐' + state.score;
                let movesEl = document.getElementById('hud-moves');
                if (movesEl) movesEl.textContent = '剩余:' + state.movesLeft;
                let levelEl = document.getElementById('hud-level');
                if (levelEl) levelEl.textContent = '第' + state.level + '关';
                let comboEl = document.getElementById('combo-display');
                if (comboEl) comboEl.textContent = state.comboMessage || '';
                renderBoard(state);
            } else if (state.screen === 'pause_menu') {
                // static overlay, nothing dynamic needed
            } else if (state.screen === 'settings') {
                renderSettings(state);
            } else if (state.screen === 'shop') {
                renderShop(state);
            } else if (state.screen === 'game_result') {
                renderGameResult(state);
            } else if (state.screen === 'high_scores') {
                renderHighScores(state);
            }
        }

        /** @param {string} screenId Base screen name (e.g. 'home', 'gameplay') */
        function showScreen(screenId) {
            let allScreens = document.querySelectorAll('.screen');
            for (let i = 0; i < allScreens.length; i++) {
                allScreens[i].classList.remove('active');
            }

            let targetEl = document.getElementById(targetId);
            if (targetEl) {
                targetEl.classList.add('active');
            }
        }

        function startGame() {

        /* ---- Board & Match Logic ---- */

        /** @returns {number[][]} New randomized board grid */
        function createBoard() {
            let board = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(randInt(0, GEM_TYPES - 1));
                }
                board.push(row);
            }
            return board;
        }

        /** @param {number[][]} board @returns {number[][]} Board with no initial matches */
        function createBoardNoMatches() {
            let board = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    let gem;
                    let attempts = 0;
                    do {
                        gem = randInt(0, GEM_TYPES - 1);
                        attempts++;
                        if (attempts > 50) {
                            // fallback: try all types in order
                            for (let t = 0; t < GEM_TYPES; t++) {
                                let ok = true;
                                if (c >= 2 && row[c - 1] === t && row[c - 2] === t) ok = false;
                                if (r >= 2 && board[r - 1][c] === t && board[r - 2][c] === t) ok = false;
                                if (ok) {
                                    gem = t;
                                    break;
                                }
                            }
                            break;
                        }
                        let valid = true;
                        if (c >= 2 && row[c - 1] === gem && row[c - 2] === gem) valid = false;
                        if (r >= 2 && board[r - 1][c] === gem && board[r - 2][c] === gem) valid = false;
                        if (valid) break;
                    } while (true);
                    row.push(gem);
                }
                board.push(row);
            }
            return board;
        }

        /** @param {object} state Renders the board DOM into #game-board */
        function renderBoard(state) {
            let boardEl = document.getElementById('game-board');
            if (!boardEl) return;
            boardEl.innerHTML = '';
            let board = state.board;
            if (!board) return;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell gem-' + board[r][c];
                    if (state.selectedCell && state.selectedCell.row === r && state.selectedCell.col === c) {
                        cell.classList.add('selected');
                    }
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', (function(row, col) {
                        return function() {
                            if (_dispatch) {
                                _dispatch({ type: 'BOARD_CLICK', row: row, col: col });
                            }
                        };
                    })(r, c));
                    boardEl.appendChild(cell);
                }
            }
        }

        /** @param {number} r1 @param {number} c1 @param {number} r2 @param {number} c2 @returns {boolean} */
        function isAdjacent(r1, c1, r2, c2) {
            return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
        }

        /** @param {number[][]} board @returns {Array<{row:number,col:number}>} All matched positions */
        function findMatches(board) {
            let matched = new Array(ROWS);
            for (let r = 0; r < ROWS; r++) {
                matched[r] = new Array(COLS).fill(false);
            }

            // Horizontal runs
            for (let r = 0; r < ROWS; r++) {
                let c = 0;
                while (c < COLS) {
                    let type = board[r][c];
                    let runEnd = c;
                    while (runEnd + 1 < COLS && board[r][runEnd + 1] === type) {
                        runEnd++;
                    }
                    let runLen = runEnd - c + 1;
                    if (runLen >= 3) {
                        for (let i = c; i <= runEnd; i++) {
                            matched[r][i] = true;
                        }
                    }
                    c = runEnd + 1;
                }
            }

            // Vertical runs
            for (let c = 0; c < COLS; c++) {
                let r = 0;
                while (r < ROWS) {
                    let type = board[r][c];
                    let runEnd = r;
                    while (runEnd + 1 < ROWS && board[runEnd + 1][c] === type) {
                        runEnd++;
                    }
                    let runLen = runEnd - r + 1;
                    if (runLen >= 3) {
                        for (let i = r; i <= runEnd; i++) {
                            matched[i][c] = true;
                        }
                    }
                    r = runEnd + 1;
                }
            }

            let result = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (matched[r][c]) {
                        result.push({ row: r, col: c });
                    }
                }
            }
            return result;
        }

        /** @param {number[][]} board @param {Array<{row:number,col:number}>} matches @returns {number[][]} New board with matches removed */
        function removeMatches(board, matches) {
            let newBoard = board.map(function(row) { return row.slice(); });
            for (let i = 0; i < matches.length; i++) {
                let pos = matches[i];
                newBoard[pos.row][pos.col] = -1;
            }
            return newBoard;
        }

        /** @param {number[][]} board @returns {number[][]} Board after gravity applied */
        function applyGravity(board) {
            let rows = board.length;
            let cols = board[0].length;
            let newBoard = [];
            for (let r = 0; r < rows; r++) {
                newBoard[r] = board[r].slice();
            }
            for (let c = 0; c < cols; c++) {
                let gems = [];
                for (let r = 0; r < rows; r++) {
                    if (newBoard[r][c] !== -1) {
                        gems.push(newBoard[r][c]);
                    }
                }
                for (let r = rows - 1; r >= 0; r--) {
                    if (gems.length > 0) {
                        newBoard[r][c] = gems.pop();
                    } else {
                        newBoard[r][c] = -1;
                    }
                }
            }
            return newBoard;
        }

        /** @param {number[][]} board @returns {number[][]} Board with empty cells filled */
        function fillEmpty(board) {
            let newBoard = [];
            for (let r = 0; r < board.length; r++) {
                let newRow = [];
                for (let c = 0; c < board[r].length; c++) {
                    if (board[r][c] === -1) {
                        newRow.push(randInt(0, GEM_TYPES - 1));
                    } else {
                        newRow.push(board[r][c]);
                    }
                }
                newBoard.push(newRow);
            }
            return newBoard;
        }

        /** @param {number[][]} board @returns {{board:number[][],totalRemoved:number}} Process cascade until stable */
        function processCascade(board) {
            let boardState = board.map(function(row) { return row.slice(); });
            let totalRemoved = 0;
            let matches = findMatches(boardState);
            while (matches.length > 0) {
                totalRemoved += matches.length;
                boardState = removeMatches(boardState, matches);
                boardState = applyGravity(boardState);
                boardState = fillEmpty(boardState);
                matches = findMatches(boardState);
            }
            return { board: boardState, totalRemoved: totalRemoved };
        }

        /** @param {number} matchCount @param {number} combo @returns {number} Score earned */
        function calculateScore(matchCount, combo) {
            let base = matchCount * 10;
            let multiplier = 1 + combo * 0.5;
            return Math.floor(base * multiplier);
        }

        /** @param {object} state @returns {boolean} Level objectives met? */
        function isLevelComplete(state) {
            return state.score >= state.targetScore;
        }

        /** @param {number[][]} board @returns {boolean} Any valid moves remain? */
        function hasValidMoves(board) {
            // Nested helper to detect any match of length >=3 on the current board
            function checkForMatch() {
                // rows
                for (let row = 0; row < ROWS; row++) {
                    let run = 1;
                    for (let col = 1; col < COLS; col++) {
                        if (board[row][col] === board[row][col - 1] && board[row][col] !== -1) {
                            run++;
                            if (run >= 3) return true;
                        } else {
                            run = 1;
                        }
                    }
                }
                // columns
                for (let col = 0; col < COLS; col++) {
                    let run = 1;
                    for (let row = 1; row < ROWS; row++) {
                        if (board[row][col] === board[row - 1][col] && board[row][col] !== -1) {
                            run++;
                            if (run >= 3) return true;
                        } else {
                            run = 1;
                        }
                    }
                }
                return false;
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    // Check swap with right neighbour
                    if (c + 1 < COLS) {
                        let tmp = board[r][c];
                        board[r][c] = board[r][c + 1];
                        board[r][c + 1] = tmp;

                        if (checkForMatch()) {
                            // restore and return
                            board[r][c + 1] = board[r][c];
                            board[r][c] = tmp;
                            return true;
                        }
                        // restore
                        board[r][c + 1] = board[r][c];
                        board[r][c] = tmp;
                    }

                    // Check swap with bottom neighbour
                    if (r + 1 < ROWS) {
                        let tmp = board[r][c];
                        board[r][c] = board[r + 1][c];
                        board[r + 1][c] = tmp;

                        if (checkForMatch()) {
                            board[r + 1][c] = board[r][c];
                            board[r][c] = tmp;
                            return true;
                        }
                        board[r + 1][c] = board[r][c];
                        board[r][c] = tmp;
                    }
                }
            }
            return false;
        }

        /* ---- Helpers ---- */

        /** @param {number} min @param {number} max @returns {number} Random integer inclusive */
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        /** @param {object} state @returns {object} Deep-cloned state (JSON roundtrip) */
        function cloneState(state) {
            return JSON.parse(JSON.stringify(state));
        }

        /** @param {string} key @param {*} value Persists to localStorage */
        function saveToStorage(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                // ignore storage errors
            }
        }

        /** @param {string} key @param {*} fallback @returns {*} Value from localStorage or fallback */
        function loadFromStorage(key, fallback) {
            let result = fallback;
            try {
                let stored = localStorage.getItem(key);
                if (stored !== null) {
                    result = JSON.parse(stored);
                }
            } catch (e) {
                // keep fallback
            }
            return result;
        }

        /* ============================================================ */
        /* DOMContentLoaded — only calls startGame, nothing else        */
