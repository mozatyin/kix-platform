<!doctype html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店铺经营 - Shop Manager</title>
    <script src="https://cdn.tailwindcss.com">        function getPieceEmoji(pieceType) { const emojis = ['⭐','💎','🔮','🌟','✨','💫']; return emojis[pieceType - 1] || emojis[0]; }
    </script>
    <style>
        .screen { display: none; }
        .screen.active { display: block; }
        .product-item {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .product-item.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .customer {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .customer:hover {
            transform: scale(1.1);
        }
        .shop-counter {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border-radius: 12px;
            min-height: 80px;
        }
        .patience-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        .patience-fill {
            height: 100%;
            transition: width 0.3s;
        }
    </style>
<style>.screen:not(.active){display:none!important}.screen.active{display:block!important}</style>

<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <script>
        let gameState = {};
        let gameLoop = null;
        let gameTurnCounter = 0;
        let maxGameTurns = 50;

        /**
         * @returns {object} Initial game state
         */
        function initState() { 
            return {
                screen: 'home',
                phase: 'setup',
                money: 100,
                day: 1,
                maxDays: 10,
                reputation: 50,
                customers: [],
                products: [
                    { id: 'coffee', name: '咖啡', price: 15, cost: 5, stock: 10, prepTime: 2 },
                    { id: 'sandwich', name: '三明治', price: 25, cost: 8, stock: 8, prepTime: 3 },
                    { id: 'cake', name: '蛋糕', price: 35, cost: 12, stock: 5, prepTime: 4 }
                ],
                upgrades: {
                    faster_service: { name: '快速服务', price: 200, owned: false, effect: 'service_speed' },
                    better_coffee: { name: '优质咖啡', price: 300, owned: false, effect: 'coffee_price' },
                    larger_storage: { name: '扩大储存', price: 400, owned: false, effect: 'max_stock' }
                },
                achievements: {
                    first_day: { name: '第一天', description: '完成第一天营业', unlocked: false },
                    big_earner: { name: '赚钱高手', description: '单日收入超过500元', unlocked: false },
                    customer_favorite: { name: '顾客最爱', description: '声誉达到80', unlocked: false }
                },
                dailyStats: {
                    revenue: 0,
                    customersServed: 0,
                    productsSold: 0,
                    expenses: 50
                },
                gameSettings: {
                    sound: true,
                    difficulty: 'normal'
                },
                selectedProduct: null,
                selectedCustomer: null,
                isPaused: false,
                gameEnded: false,
                finalScore: 0,
                customerIdCounter: 0,
                timeOfDay: 0,
                totalEarnings: 0,
                totalCustomersServed: 0
            }; 
        }

        /**
         * @param {object} state Current game state
         * @param {object} action Action object with type and other properties
         * @returns {object} New game state
         */
        function handleAction(state, action) { 
            switch (action.type) {
                case 'NAVIGATE_TO_SCREEN':
                    return { ...state, screen: action.screen };
                    
                case 'START_GAME':
                    let newGameState = initState();
                    newGameState.screen = 'game';
                    newGameState.phase = 'serving';
                    gameTurnCounter = 0;
                    return generateCustomers(newGameState);
                    
                case 'SHOW_ACHIEVEMENTS':
                    return { ...state, screen: 'achievements' };
                    
                case 'SHOW_LEADERBOARD':
                    return { ...state, screen: 'leaderboard' };
                    
                case 'SHOW_SETTINGS':
                    return { ...state, screen: 'settings' };
                    
                case 'PAUSE_GAME':
                    return { ...state, screen: 'pause-menu', isPaused: true };
                    
                case 'RESUME_GAME':
                    return { ...state, screen: 'game', isPaused: false };
                    
                case 'SHOW_UPGRADES':
                    return { ...state, screen: 'shop-upgrades' };
                    
                case 'BACK_TO_SHOP':
                    return { ...state, screen: 'game' };
                    
                case 'SELECT_CUSTOMER':
                    return { ...state, selectedCustomer: action.customerId };
                    
                case 'SELECT_PRODUCT':
                    return { ...state, selectedProduct: action.productId };
                    
                case 'SERVE_CUSTOMER':
                    return serveCustomer(state, action.customerId, action.productId);
                    
                case 'SERVE_SELECTED':
                    if (state.selectedCustomer && state.selectedProduct) {
                        let updatedState = serveCustomer(state, state.selectedCustomer, state.selectedProduct);
                        updatedState.selectedCustomer = null;
                        updatedState.selectedProduct = null;
                        return updatedState;
                    }
                    return state;
                    
                case 'PURCHASE_UPGRADE':
                    return purchaseUpgrade(state, action.upgradeId);
                    
                case 'ADVANCE_DAY':
                case 'NEXT_DAY':
                    let nextDayState = advanceDay(state);
                    nextDayState.screen = 'game';
                    nextDayState.phase = 'serving';
                    return generateCustomers(nextDayState);
                    
                case 'END_DAY':
                    return { ...state, screen: 'daily-report', phase: 'day_end' };
                    
                case 'RESTART_GAME':
                    let restartState = initState();
                    restartState.screen = 'game';
                    restartState.phase = 'serving';
                    gameTurnCounter = 0;
                    return generateCustomers(restartState);
                    
                case 'QUIT_GAME':
                case 'GO_HOME':
                    return { ...state, screen: 'home', isPaused: false };
                    
                case 'GENERATE_CUSTOMERS':
                    return generateCustomers(state);
                    
                case 'UPDATE_CUSTOMERS':
                    return updateCustomerPatience(state);
                    
                case 'RESTOCK':
                    return restockProducts(state);
                    
                default:
                    return state;
            } 
        }

        /**
         * @param {object} state Current game state
         * @returns {void}
         */
        function render(state) { 
            // Hide action buttons by default
            document.getElementById('action-buttons').style.display = 'none';
            
            // Show the appropriate screen
            showScreen(state.screen);
            
            // Update status displays if on game screen
            if (state.screen === 'game') {
                document.getElementById('money-display').textContent = `¥${state.money}`;
                document.getElementById('day-display').textContent = `第${state.day}天`;
                document.getElementById('phase-display').textContent = getPhaseText(state.phase);
                document.getElementById('action-buttons').style.display = 'block';
                renderShopFloor(state);
            } else if (state.screen === 'shop-upgrades') {
                renderUpgrades(state);
            } else if (state.screen === 'daily-report') {
                renderDailyReport(state);
            } else if (state.screen === 'game-result') {
                renderGameResult(state);
            } else if (state.screen === 'achievements') {
                renderAchievements(state);
            } else if (state.screen === 'settings') {
                renderSettings(state);
            } else if (state.screen === 'leaderboard') {
                renderLeaderboard(state);
            }
        }

        /**
         * @param {string} phase Game phase
         * @returns {string} Localized phase text
         */
        function getPhaseText(phase) {
            switch (phase) {
                case 'setup': return '准备中';
                case 'serving': return '营业中';
                case 'day_end': return '日终结算';
                case 'game_over': return '游戏结束';
                default: return '营业中';
            }
        }

        /**
         * @param {string} screenId Base screen ID (without '-screen' suffix)
         * @returns {void}
         */
        function showScreen(screenId) { 
            // Hide all screens first
            let screens = document.querySelectorAll('.screen');
            screens.forEach(screen => screen.classList.remove('active'));

            // Show the target screen
            let targetScreen = document.getElementById(screenId + '-screen');
            if (targetScreen) {
                targetScreen.classList.add('active');
            } 
        }

        /**
         * @returns {void}
         */
        function startGame() { 
            gameState = initState();
render(gameState);

            // Wire up all button event listeners
            document.getElementById('start-game-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'START_GAME' });
                render(gameState);
                startGameLoop();
            });

            document.getElementById('achievements-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'SHOW_ACHIEVEMENTS' });
                render(gameState);
            });

            document.getElementById('leaderboard-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'SHOW_LEADERBOARD' });
                render(gameState);
            });

            document.getElementById('settings-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'SHOW_SETTINGS' });
                render(gameState);
            });

            document.getElementById('pause-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'PAUSE_GAME' });
                render(gameState);
            });

            document.getElementById('back-to-shop-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'BACK_TO_SHOP' });
                render(gameState);
            });

            document.getElementById('next-day-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'NEXT_DAY' });
                render(gameState);
            });

            document.getElementById('restart-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'RESTART_GAME' });
                render(gameState);
                startGameLoop();
            });

            document.getElementById('home-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'GO_HOME' });
                render(gameState);
                stopGameLoop();
            });

            document.getElementById('achievements-back-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'GO_HOME' });
                render(gameState);
            });

            document.getElementById('settings-back-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'GO_HOME' });
                render(gameState);
            });

            document.getElementById('leaderboard-back-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'GO_HOME' });
                render(gameState);
            });

            document.getElementById('resume-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'RESUME_GAME' });
                render(gameState);
            });

            document.getElementById('upgrades-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'SHOW_UPGRADES' });
                render(gameState);
            });

            document.getElementById('quit-btn').addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'QUIT_GAME' });
                render(gameState);
                stopGameLoop();
            });

            render(gameState); 
        }

        /**
         * Starts the main game loop
         */
        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            
            gameLoop = setInterval(() => {
                if (gameState.screen === 'game' && !gameState.isPaused && !gameState.gameEnded) {
                    gameTurnCounter++;
                    
                    // Update customers
                    gameState = handleAction(gameState, { type: 'UPDATE_CUSTOMERS' });
                    
                    // Generate new customers occasionally
                    if (Math.random() < 0.3) {
                        gameState = handleAction(gameState, { type: 'GENERATE_CUSTOMERS' });
                    }
                    
                    // Check if day should end (either by time or turn limit)
                    if (gameState.timeOfDay >= 50 || gameTurnCounter >= maxGameTurns) {
                        gameState = handleAction(gameState, { type: 'END_DAY' });
                    }
                    
                    // Check if game should end
                    if (checkGameEnd(gameState) || gameTurnCounter >= maxGameTurns) {
                        gameState.screen = 'game-result';
                        gameState.phase = 'game_over';
                        gameState.gameEnded = true;
                        gameState.finalScore = calculateScore(gameState);
                        stopGameLoop();
                    }
                    
                    render(gameState);
                }
            }, 1000);
        }

        /**
         * Stops the main game loop
         */
        function stopGameLoop() {
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
        }

        /**
         * @param {object} state Current game state
         * @returns {void}
         */
        function renderShopFloor(state) { 
            let shopContent = document.getElementById('shop-floor-content');
            let content = '';

            // Render shop counter
            content += '<div class="shop-counter p-4 mb-4 text-white">';
            content += '<h3 class="text-lg font-bold mb-2">店铺柜台</h3>';
            content += '<div class="grid grid-cols-2 gap-4">';

            // Render products
            if (state.products && state.products.length > 0) {
                state.products.forEach(product => {
                    let isSelected = state.selectedProduct === product.id;
                    let productClass = `product-item p-3 bg-white bg-opacity-20 rounded-lg cursor-pointer ${isSelected ? 'selected border-yellow-400' : ''}`;
                    content += `<div class="${productClass}" onclick="selectProduct('${product.id}')">`;
                    content += `<div class="text-sm font-semibold">${product.name}</div>`;
                    content += `<div class="text-xs">¥${product.price}</div>`;
                    content += `<div class="text-xs">库存: ${product.stock || 0}</div>`;
                    content += `</div>`;
                });
            } else {
                content += '<div class="col-span-2 text-center text-sm opacity-75">暂无商品</div>';
            }

            content += '</div></div>';

            // Render customers area
            content += '<div class="bg-white rounded-lg p-4">';
            content += '<h3 class="text-lg font-bold mb-3">顾客区域</h3>';

            if (state.customers && state.customers.length > 0) {
                content += '<div class="grid grid-cols-3 gap-3">';
                state.customers.forEach(customer => {
                    let isSelected = state.selectedCustomer === customer.id;
                    let customerClass = `customer ${customer.mood === 'happy' ? 'bg-green-200' : customer.mood === 'angry' ? 'bg-red-200' : 'bg-yellow-200'}`;
                    if (isSelected) customerClass += ' ring-2 ring-blue-400';
                    
                    content += `<div class="text-center">`;
                    content += `<div class="${customerClass}" onclick="selectCustomer('${customer.id}')" data-customer-id="${customer.id}">`;
                    content += `<span class="text-lg">${customer.emoji || '👤'}</span>`;
                    content += `</div>`;
                    
                    if (customer.wantedProduct) {
                        content += `<div class="text-xs text-center mt-1">想要: ${getProductName(state, customer.wantedProduct)}</div>`;
                    }
                    
                    // Patience bar
                    let patiencePercent = Math.max(0, (customer.patience / customer.maxPatience) * 100);
                    let patienceColor = patiencePercent > 60 ? 'bg-green-400' : patiencePercent > 30 ? 'bg-yellow-400' : 'bg-red-400';
                    content += `<div class="patience-bar mt-1">`;
                    content += `<div class="patience-fill ${patienceColor}" style="width: ${patiencePercent}%"></div>`;
                    content += `</div>`;
                    content += `</div>`;
                });
                content += '</div>';
            } else {
                content += '<div class="text-center text-gray-500">暂无顾客</div>';
            }

            content += '</div>';

            shopContent.innerHTML = content;

            // Render action buttons
            let actionButtons = document.getElementById('action-buttons');
            if (actionButtons) {
                let buttonsContent = '';
                
                if (state.selectedCustomer && state.selectedProduct) {
                    buttonsContent += '<button onclick="serveSelected()" class="bg-green-600 text-white px-4 py-2 rounded-lg">服务顾客</button>';
                }
                
                buttonsContent += '<button onclick="restockAll()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">补货</button>';

        /**
         * @param {object} state Current game state
         * @returns {object} Updated state after customer generation
         */
        function generateCustomers(state) { 
            // Generate new customers based on time and shop reputation
            let newState = { ...state };
            
            if (!newState.customers) {
                newState.customers = [];
            }
            
            // Don't generate customers if game is paused or not on game screen
            if (newState.screen !== 'game' || newState.isPaused) {
                return newState;
            }
            
            // Generate customer if random check passes and not too many customers
            if (Math.random() < 0.4 && newState.customers.length < 6) {
                let customerEmojis = ['😊', '🤔', '😄', '🙂', '😐', '👨', '👩', '👴', '👵'];
                let emoji = customerEmojis[Math.floor(Math.random() * customerEmojis.length)];
                
                let wantedProduct = newState.products[Math.floor(Math.random() * newState.products.length)].id;
                
                let customer = {
                    id: 'customer_' + newState.customerIdCounter++,
                    emoji: emoji,
                    wantedProduct: wantedProduct,
                    patience: 100,
                    maxPatience: 100,
                    mood: 'neutral'
                };
                
                newState.customers.push(customer);
            }
            
            return newState; 
        }

        /**
         * @param {object} state Current game state
         * @returns {object} Updated state after patience update
         */
        function updateCustomerPatience(state) {
            let newState = { ...state };
            
            // Decrease patience for existing customers
            for (let i = newState.customers.length - 1; i >= 0; i--) {
                newState.customers[i].patience -= 5;
                
                // Update mood based on patience
                if (newState.customers[i].patience > 60) {
                    newState.customers[i].mood = 'happy';
                } else if (newState.customers[i].patience > 30) {
                    newState.customers[i].mood = 'neutral';
                } else {
                    newState.customers[i].mood = 'angry';
                }
                
                // Remove customers who run out of patience
                if (newState.customers[i].patience <= 0) {
                    newState.customers.splice(i, 1);
                    // Lose some reputation for unsatisfied customers
                    newState.reputation = Math.max(0, newState.reputation - 5);
                }
            }
            
            // Advance time
            newState.timeOfDay = (newState.timeOfDay || 0) + 1;
            
            return newState;
        }

        /**
         * @param {object} state Current game state
         * @param {string} customerId Customer ID
         * @param {string} productId Product ID
         * @returns {object} Updated state after serving customer
         */
        function serveCustomer(state, customerId, productId) { 
            // Find the customer and product
            let customer = state.customers.find(c => c.id === customerId);
            let product = state.products.find(p => p.id === productId);
            
            if (!customer || !product) {
                return state;
            }
            
            // Check if we have enough stock
            if (product.stock <= 0) {
                return state;
            }
            
            let newState = { ...state };
            
            // Calculate success and earnings
            let isCorrectOrder = customer.wantedProduct === productId;
            let earnings = 0;
            
            if (isCorrectOrder) {
                earnings = product.price;
                newState.reputation = Math.min(100, newState.reputation + 2);
                
                // Bonus for fast service
                if (customer.patience > 70) {
                    earnings = Math.floor(earnings * 1.2);
                }
            } else {
                // Wrong product - customer unhappy
                newState.reputation = Math.max(0, newState.reputation - 5);
            }
            
            // Remove customer and update product stock
            newState.customers = newState.customers.filter(c => c.id !== customerId);
            newState.products = newState.products.map(p => {
                if (p.id === productId) {
                    return { ...p, stock: p.stock - 1 };
                }
                return p;
            });
            
            // Update money and stats
            newState.money += earnings;
            newState.dailyStats.revenue += earnings;
            newState.dailyStats.customersServed += 1;
            newState.totalEarnings = (newState.totalEarnings || 0) + earnings;
            newState.totalCustomersServed = (newState.totalCustomersServed || 0) + 1;
            
            return newState; 
        }

        /**
         * @param {object} state Current game state
         * @param {string} upgradeId Upgrade ID
         * @returns {object} Updated state after purchasing upgrade
         */
        function purchaseUpgrade(state, upgradeId) { 
            let upgradeCosts = {
                'faster_service': 150,
                'better_products': 200,
                'customer_patience': 120
            };
            
            let cost = upgradeCosts[upgradeId];
            if (!cost || state.money < cost) {
                return state;
            }
            
            let newState = { ...state };
            newState.money -= cost;
            
            if (!newState.upgrades[upgradeId]) {
                newState.upgrades[upgradeId] = {};
            }
            newState.upgrades[upgradeId].owned = true;
            
            return newState; 
        }

        /**
         * @param {object} state Current game state
         * @returns {object} Updated state for next day
         */
        function advanceDay(state) { 
            let newState = { ...state };

            // Calculate daily profit
            let dailyRevenue = newState.dailyStats.revenue;
            let dailyExpenses = newState.dailyStats.expenses || 50;
            let dailyProfit = dailyRevenue - dailyExpenses;

            // Advance to next day
            newState.day += 1;
            newState.timeOfDay = 0;

            // Reset daily statistics
            newState.dailyStats = {
                revenue: 0,
                expenses: 50,
                customersServed: 0,
                productsSold: 0
            };

            // Clear customers for new day
            newState.customers = [];
            newState.selectedCustomer = null;
            newState.selectedProduct = null;

            return newState; 
        }

        /**
         * @param {object} state Current game state
         * @returns {object} Updated state after restocking
         */
        function restockProducts(state) {
            let newState = { ...state };
            let restockCost = 30;
            
            if (newState.money >= restockCost) {
                newState.money -= restockCost;
                newState.products = newState.products.map(p => ({
                    ...p,
                    stock: Math.min(20, p.stock + 10)
                }));
            }
            
            return newState;
        }

        /**
         * @param {object} state Current game state
         * @returns {boolean} True if game should end
         */
        function checkGameEnd(state) { 
            // Check if the game should end based on various conditions
            if (state.day >= state.maxDays) {
                // Game ends after max days
                return true;
            }

            if (state.money < -100) {
                // Game ends if money goes too negative (bankruptcy)
                return true;
            }

            if (gameTurnCounter >= maxGameTurns) {
                // Game ends after max turns to prevent infinite loops
                return true;
            }

            return false; 
        }

        /**
         * @param {object} state Current game state
         * @returns {number} Final score
         */
        function calculateScore(state) { 
            // Base score from total money earned
            let baseScore = state.money + (state.totalEarnings || 0);

            // Bonus for days survived
            let dayBonus = state.day * 100;

            // Bonus for customer satisfaction
            let satisfactionBonus = Math.floor((state.totalCustomersServed || 0) * 10);

            // Final score calculation
            let finalScore = baseScore + dayBonus + satisfactionBonus;

            return Math.max(0, Math.floor(finalScore)); 
        }
