<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    /**
     * @param {object} state Current game state
     * @param {object} action Action to handle
     * @returns {object} New game state
     */
    function handleAction(state, action) { // Create a deep copy of the state to avoid mutations
let newState = JSON.parse(JSON.stringify(state));

switch (action.type) {
  case 'START_DAY':
    newState.screen = 'shop_floor';
    newState.gameActive = true;
    newState.dayStartTime = Date.now();
    newState.currentDay++;
    newState.dayTime = 0;
    newState.customers = [];
    newState.completedOrders = [];
    newState.dailyEarnings = 0;
    break;

  case 'GO_HOME':
    newState.screen = 'home';
    newState.gameActive = false;
    break;

  case 'SHOW_UPGRADES':
    newState.screen = 'upgrade_menu';
    break;

  case 'SHOW_MENU':
    newState.screen = 'menu_customize';
    break;

  case 'SHOW_TUTORIAL':
    newState.screen = 'tutorial';
    break;

  case 'SHOW_SETTINGS':
    newState.screen = 'settings';
    break;

  case 'SHOW_LEADERBOARD':
    newState.screen = 'leaderboard';
    break;

  case 'CLOSE_SCREEN':
    newState.screen = 'home';
    break;

  case 'START_DRINK':
    newState.screen = 'drink_making';
    newState.currentOrder = action.order;
    newState.currentDrink = {
      ingredients: [],
      temperature: 'medium',
      size: 'medium',
      complete: false
    };
    break;

  case 'ADD_INGREDIENT':
    if (addIngredient(newState, action.ingredient)) {
      // Ingredient was successfully added
    }
    break;

  case 'CHANGE_TEMPERATURE':
    if (newState.currentDrink) {
      newState.currentDrink.temperature = action.temperature;
    }
    break;

  case 'CHANGE_SIZE':
    if (newState.currentDrink) {
      newState.currentDrink.size = action.size;
    }
    break;

  case 'FINISH_DRINK':
    if (newState.currentDrink) {
      let completedDrink = finishDrink(newState);
      if (completedDrink && newState.currentOrder) {
        let accuracy = calculateAccuracy(newState.currentOrder, completedDrink);
        let earnings = Math.floor(newState.currentOrder.basePrice * accuracy);
        
        newState.money += earnings;
        newState.dailyEarnings += earnings;
        newState.totalEarnings += earnings;
        
        newState.completedOrders.push({
          order: newState.currentOrder,
          drink: completedDrink,
          accuracy: accuracy,
          earnings: earnings
        });

        // Remove served customer from queue
        if (newState.customers.length > 0) {
          newState.customers.shift();
        }
      }
      
      newState.currentOrder = null;
      newState.currentDrink = null;
      newState.screen = 'shop_floor';
    }
    break;

  case 'PURCHASE_UPGRADE':
    purchaseUpgrade(newState, action.upgradeId);
    break;

  case 'TOGGLE_MENU_ITEM':
    if (newState.availableItems && newState.availableItems[action.itemId]) {
      newState.availableItems[action.itemId].enabled = !newState.availableItems[action.itemId].enabled;
    }
    break;

  case 'UPDATE_TIME':
    if (newState.gameActive) {
      updateGameTime(newState, action.deltaTime);
      
      // Check if day is complete
      if (isDayComplete(newState)) {
        newState.gameActive = false;
        newState.screen = 'daily_summary';
        newState.dayStats = calculateDayStats(newState);
      }
    }
    break;

  case 'SPAWN_CUSTOMER':
    if (newState.gameActive && newState.customers.length < newState.maxCustomers) {
      let customerTypes = ['casual', 'business', 'student', 'tourist'];
      let randomType = customerTypes[Math.floor(Math.random() * customerTypes.length)];
      
      let newCustomer = {
        id: Date.now() + Math.random(),
        type: randomType,
        patience: 30000 + Math.random() * 20000, // 30-50 seconds
        arrivalTime: newState.dayTime,
        order: null
      };
      
      newCustomer.order = generateOrder(newCustomer, newCustomer.patience);
      newState.customers.push(newCustomer);
    }
    break;

  case 'END_DAY':
    newState.screen = 'daily_summary';
    newState.gameActive = false;
    newState.dayStats = calculateDayStats(newState);
    break;

  case 'NEXT_DAY':
    // Reset daily stats but keep progress
    newState.screen = 'home';
    newState.customers = [];
    newState.completedOrders = [];
    newState.dailyEarnings = 0;
    newState.dayTime = 0;
    break;

  case 'PAUSE_GAME':
    newState.paused = !newState.paused;
    break;

  case 'PLAY_AGAIN':
    return initState();

  case 'MAIN_MENU':
    newState.screen = 'home';
    newState.gameActive = false;
    break;

  default:
    // Unknown action, return state unchanged
    break;
}

return newState; }

    /**
     * @param {object} state Game state to render

    function render(state) { // Update home screen stats
  if (state.screen === 'home') {
    let homeStats = document.getElementById('home-stats');
    homeStats.innerHTML = `
      <div class="text-lg">
        <div>💰 Money: $${state.money}</div>
        <div>📅 Day: ${state.day}</div>
        <div>⭐ Reputation: ${state.reputation}/100</div>
      </div>
    `;
  }

  // Show the current screen
  showScreen(state.screen);

  // Render specific screen content
  if (state.screen === 'shop_floor') {
    renderShopFloor(state);
  } else if (state.screen === 'drink_making') {
    renderDrinkMaking(state);
  } else if (state.screen === 'upgrade_menu') {
    renderUpgradeMenu(state);
  } else if (state.screen === 'menu_customize') {
    renderMenuCustomize(state);
  } else if (state.screen === 'daily_summary') {
    renderDailySummary(state);
  } else if (state.screen === 'game_result') {
    let resultContent = document.getElementById('result-content');
    let finalStats = document.getElementById('final-stats');
    
    if (state.gameOver) {
      resultContent.innerHTML = `
        <h2 class="text-3xl font-bold mb-4">Game Over!</h2>

    } else {

    finalStats.innerHTML = `

        <div>Final Money: $${state.money}</div>
        <div>Days Completed: ${state.day}</div>
        <div>Final Reputation: ${state.reputation}/100</div>
        <div>Total Customers Served: ${state.totalCustomersServed || 0}</div>

        </div>
        <div class="bg-white p-4 rounded-lg">
          <h3 class="font-bold mb-2">⬆️ Upgrades</h3>

          <h3 class="font-bold mb-2">⭐ Reputation</h3>
          <p>Keep customers happy to maintain your reputation. Unhappy customers will hurt your business!</p>
        </div>
      </div>
    `;
  } else if (state.screen === 'settings') {
    let settingsOptions = document.getElementById('settings-options');
    settingsOptions.innerHTML = `
      <div class="space-y-4">
        <div class="bg-white p-4 rounded-lg">
          <label class="flex items-center justify-between">
            <span>Sound Effects</span>
            <input type="checkbox" ${state.settings?.soundEnabled !== false ? 'checked' : ''}>
          </label>
        </div>
        <div class="bg-white p-4 rounded-lg">
          <label class="flex items-center justify-between">
            <span>Music</span>
            <input type="checkbox" ${state.settings?.musicEnabled !== false ? 'checked' : ''}>
          </label>
        </div>
        <div class="bg-white p-4 rounded-lg">
          <label class="flex items-center justify-between">
            <span>Difficulty</span>
            <select>
              <option value="easy" ${state.settings?.difficulty === 'easy' ? 'selected' : ''}>Easy</option>
              <option value="normal" ${state.settings?.difficulty !== 'easy' && state.settings?.difficulty !== 'hard' ? 'selected' : ''}>Normal</option>
              <option value="hard" ${state.settings?.difficulty === 'hard' ? 'selected' : ''}>Hard</option>
            </select>
          </label>
        </div>
      </div>
    `;
  } else if (state.screen === 'leaderboard') {
    let leaderboardList = document.getElementById('leaderboard-list');
    let scores = state.leaderboard || [];
    
    if (scores.length === 0) {
      leaderboardList.innerHTML = '<div class="text-center text-gray-500">No scores yet!</div>';
    } else {
      leaderboardList.innerHTML = scores.map((score, index) => `
        <div class="bg-white p-3 rounded-lg flex justify-between">
          <span>#${index + 1}</span>
          <span>Day ${score.day}</span>
          <span>$${score.money}</span>
        </div>
      `).join('');
    }
  } }

    /**
     * @param {string} screenId Base screen ID (without -screen suffix)
     */
    function showScreen(screenId) { // Hide all screens
document.querySelectorAll('.screen').forEach(screen => {
  screen.classList.remove('active');
});

// Show the target screen
let targetScreen = document.getElementById(screenId + '-screen');
if (targetScreen) {
  targetScreen.classList.add('active');
} }

    /**
     * @param {object} state Game state
     */
    function renderShopFloor(state) { let shopHeader = document.getElementById('shop-header');
let customerQueue = document.getElementById('customer-queue');
let coffeeStations = document.getElementById('coffee-stations');

// Render header with day info, time, and money
shopHeader.innerHTML = `
  <div class="flex items-center gap-4">
    <h2 class="text-xl font-bold">Day ${state.day}</h2>
    <div class="text-lg">⏰ ${Math.ceil(state.dayTimeRemaining / 1000)}s</div>
    <div class="text-lg text-green-600">💰 $${state.money}</div>
  </div>
  <button id="end-day-btn" class="px-4 py-2 bg-red-600 text-white rounded">End Day</button>
`;

    /**
     * @param {object} customer Customer object
     * @param {number} timeRemaining Time left for order
     * @returns {object} Generated order
     */
    function generateOrder(customer, timeRemaining) { // Generate different drink types based on customer preferences and time of day
let drinkTypes = ['espresso', 'latte', 'cappuccino', 'americano', 'mocha', 'macchiato'];
let milkTypes = ['whole', 'skim', '2%', 'oat', 'almond', 'soy'];
let sizes = ['small', 'medium', 'large'];
let extras = ['extra_shot', 'decaf', 'extra_hot', 'extra_foam', 'whipped_cream', 'vanilla', 'caramel', 'cinnamon'];

// Filter available options based on unlocked menu items
let availableDrinks = drinkTypes.filter(drink => 
  !state.unlockedItems || state.unlockedItems.includes(drink)
);
let availableMilk = milkTypes.filter(milk => 
  !state.unlockedItems || state.unlockedItems.includes(milk)
);
let availableExtras = extras.filter(extra => 
  !state.unlockedItems || state.unlockedItems.includes(extra)
);

// Use defaults if nothing is unlocked yet
if (availableDrinks.length === 0) availableDrinks = ['espresso', 'latte', 'cappuccino'];
if (availableMilk.length === 0) availableMilk = ['whole', 'skim'];

// Customer preferences affect drink selection
let drinkType = availableDrinks[Math.floor(Math.random() * availableDrinks.length)];
let size = sizes[Math.floor(Math.random() * sizes.length)];
let milk = null;

// Only add milk for drinks that need it
if (['latte', 'cappuccino', 'mocha', 'macchiato'].includes(drinkType)) {
  milk = availableMilk[Math.floor(Math.random() * availableMilk.length)];
}

// Generate extras based on customer type and time pressure
let orderExtras = [];
let maxExtras = customer.patience > 0.7 ? 2 : customer.patience > 0.4 ? 1 : 0;

for (let i = 0; i < maxExtras && availableExtras.length > 0; i++) {
  if (Math.random() < 0.3) { // 30% chance per extra slot
    let extra = availableExtras[Math.floor(Math.random() * availableExtras.length)];
    if (!orderExtras.includes(extra)) {
      orderExtras.push(extra);
    }
  }
}

// Calculate base price and tip potential
let basePrice = size === 'small' ? 3 : size === 'medium' ? 4 : 5;
basePrice += orderExtras.length * 0.5;

let tipMultiplier = customer.patience * (timeRemaining / 60000); // Convert ms to minutes

return {
  id: Date.now() + Math.random(),
  customerId: customer.id,
  drinkType: drinkType,
  size: size,
  milk: milk,
  extras: orderExtras,
  basePrice: Math.round(basePrice * 100) / 100,
  tipMultiplier: Math.round(tipMultiplier * 100) / 100,
  timeOrdered: Date.now(),
  timeLimit: Math.max(30000, timeRemaining * customer.patience) // At least 30 seconds
}; }

    /**
     * @param {object} order Customer order
     * @param {object} drink Made drink
     * @returns {number} Accuracy score 0-1
     */
    function calculateAccuracy(order, drink) { let totalPoints = 0;
let maxPoints = 0;

// Check each aspect of the order against the drink
if (order.type && drink.type) {
  if (order.type === drink.type) {
    totalPoints += 3;
  }
  maxPoints += 3;
}

if (order.size && drink.size) {
  if (order.size === drink.size) {
    totalPoints += 2;
  }
  maxPoints += 2;
}

if (order.milk && drink.milk) {
  if (order.milk === drink.milk) {
    totalPoints += 2;
  }
  maxPoints += 2;
}

if (order.extras && drink.extras) {
  let extraMatches = 0;
  let totalExtras = Math.max(order.extras.length, drink.extras.length);
  
  for (let extra of order.extras) {
    if (drink.extras.includes(extra)) {
      extraMatches++;
    }
  }
  
  if (totalExtras > 0) {
    totalPoints += (extraMatches / totalExtras) * 2;
    maxPoints += 2;
  }
}

if (order.temperature && drink.temperature) {
  if (order.temperature === drink.temperature) {
    totalPoints += 1;
  }
  maxPoints += 1;
}

// Return accuracy as a percentage (0-1)
return maxPoints > 0 ? totalPoints / maxPoints : 1; }

    /**
     * @param {object} state Game state
     * @param {string} ingredient Ingredient to add
     * @returns {boolean} Whether ingredient was added
     */
    function addIngredient(state, ingredient) { if (!state.currentDrink || !state.currentDrink.ingredients) {
    return false;
  }
  
  // Check if we have this ingredient available
  let availableIngredients = state.ingredients || {};
  if (!availableIngredients[ingredient] || availableIngredients[ingredient] <= 0) {
    return false;
  }
  
  // Check if drink already has maximum ingredients
  let maxIngredients = state.upgrades?.cupSize || 5;
  if (state.currentDrink.ingredients.length >= maxIngredients) {
    return false;
  }
  
  // Add ingredient to current drink
  state.currentDrink.ingredients.push(ingredient);
  
  // Reduce available ingredient count
  state.ingredients[ingredient]--;
  
  return true; }

    /**
     * @param {object} state Game state
     * @returns {object} Completed drink
     */
    function finishDrink(state) { // Get the current drink being made
    let currentDrink = state.currentDrink || { ingredients: [], type: '', temperature: 'hot' };
    
    // Determine the drink type based on ingredients
    let drinkType = 'custom';
    let ingredients = currentDrink.ingredients;
    
    // Simple drink type detection based on ingredients
    if (ingredients.includes('espresso')) {
        if (ingredients.includes('milk')) {
            if (ingredients.includes('foam')) {
                drinkType = 'cappuccino';
            } else {
                drinkType = 'latte';
            }
        } else {
            drinkType = 'espresso';
        }
    } else if (ingredients.includes('coffee')) {
        if (ingredients.includes('milk')) {
            drinkType = 'coffee_with_milk';
        } else {
            drinkType = 'black_coffee';
        }
    } else if (ingredients.includes('tea')) {
        drinkType = 'tea';
    }
    
    // Create the finished drink object
    let finishedDrink = {
        type: drinkType,
        ingredients: [...ingredients],
        temperature: currentDrink.temperature || 'hot',
        quality: Math.min(1.0, ingredients.length * 0.2), // Simple quality calculation
        timeToMake: Date.now() - (state.drinkStartTime || Date.now())
    };
    
    // Clear the current drink from state
    state.currentDrink = null;
    state.drinkStartTime = null;
    
    // If there's a current customer, serve them the drink
    if (state.currentCustomer) {
        let accuracy = calculateAccuracy(state.currentCustomer.order, finishedDrink);
        let payment = Math.floor(state.currentCustomer.order.price * accuracy);
        
        // Add to earnings
        state.money += payment;
        state.dailyStats.earnings += payment;
        state.dailyStats.drinksMade++;
        
        // Add to completed orders
        if (!state.completedOrders) {
            state.completedOrders = [];
        }
        state.completedOrders.push({
            customer: state.currentCustomer,
            drink: finishedDrink,
            accuracy: accuracy,
            payment: payment
        });
        
        // Clear current customer
        state.currentCustomer = null;
    }
    
    return finishedDrink; }

    /**
     * @param {object} state Game state
     * @param {string} upgradeId Upgrade to purchase
     * @returns {boolean} Whether upgrade was successful
     */
    function purchaseUpgrade(state, upgradeId) { if (!state.upgrades || !upgradeId) {
    return false;
  }
  
  let upgrade = state.upgrades.find(u => u.id === upgradeId);
  if (!upgrade) {
    return false;
  }
  
  // Check if already purchased
  if (upgrade.purchased) {
    return false;
  }
  
  // Check if player has enough money
  if (state.money < upgrade.cost) {
    return false;
  }
  
  // Deduct cost and mark as purchased
  state.money -= upgrade.cost;
  upgrade.purchased = true;
  
  // Apply upgrade effects
  if (upgrade.type === 'speed') {
    state.drinkMakeSpeed = (state.drinkMakeSpeed || 1) * upgrade.multiplier;
  } else if (upgrade.type === 'capacity') {
    state.maxCustomers = (state.maxCustomers || 4) + upgrade.bonus;
  } else if (upgrade.type === 'profit') {
    state.profitMultiplier = (state.profitMultiplier || 1) * upgrade.multiplier;
  } else if (upgrade.type === 'patience') {
    state.customerPatience = (state.customerPatience || 30000) * upgrade.multiplier;
  } else if (upgrade.type === 'recipe') {
    if (!state.unlockedRecipes) {
      state.unlockedRecipes = [];
    }
    state.unlockedRecipes.push(upgrade.recipeId);
  } else if (upgrade.type === 'ingredient') {
    if (!state.unlockedIngredients) {
      state.unlockedIngredients = [];
    }
    state.unlockedIngredients.push(upgrade.ingredientId);
  }
  
  return true; }

    /**
     * @param {object} state Game state
     * @param {number} deltaTime Time elapsed in ms
     */
    function updateGameTime(state, deltaTime) { if (state.gamePhase !== 'playing') return {};

state.timeElapsed += deltaTime;
state.timeRemaining = Math.max(0, state.dayDuration - state.timeElapsed);

// Update customer patience
state.customers.forEach(customer => {
  if (customer.patience > 0) {
    customer.patience = Math.max(0, customer.patience - deltaTime);
    if (customer.patience === 0 && customer.status === 'waiting') {
      customer.status = 'left';
      state.customersLost++;
    }
  }
});

// Remove customers who left
state.customers = state.customers.filter(customer => customer.status !== 'left');

// Spawn new customers
if (state.customers.length < state.maxCustomers && Math.random() < 0.3) {
  let customerTypes = ['regular', 'businessman', 'student', 'tourist'];
  let customerType = customerTypes[Math.floor(Math.random() * customerTypes.length)];
  
  let newCustomer = {
    id: Date.now() + Math.random(),
    type: customerType,
    patience: 30000 + Math.random() * 20000, // 30-50 seconds
    maxPatience: 30000 + Math.random() * 20000,
    status: 'waiting',
    order: null
  };
  
  // Generate order for new customer
  newCustomer.order = generateOrder(newCustomer, state.timeRemaining);
  state.customers.push(newCustomer);
}

// Update coffee stations
state.coffeeStations.forEach(station => {
  if (station.brewing && station.brewTimeRemaining > 0) {
    station.brewTimeRemaining = Math.max(0, station.brewTimeRemaining - deltaTime);
    if (station.brewTimeRemaining === 0) {
      station.brewing = false;
      station.ready = true;
    }
  }
}); }

    /**
     * @param {object} state Game state
     * @returns {boolean} Whether day is complete
     */
    function isDayComplete(state) { // Check if the workday time limit has been reached
if (state.timeRemaining <= 0) {
  return true;
}

// Check if all customers have been served (no more in queue or waiting)
let hasActiveCustomers = false;

// Check queue for waiting customers
if (state.customerQueue && state.customerQueue.length > 0) {
  hasActiveCustomers = true;
}

// Check coffee stations for customers being served
if (state.coffeeStations) {
  for (let station of state.coffeeStations) {
    if (station.customer) {
      hasActiveCustomers = true;
      break;
    }
  }
}

// Day is complete if time is up OR no customers remain and customer spawning has stopped
let customerSpawningComplete = state.customersServed >= (state.targetCustomers || 20);

return !hasActiveCustomers && customerSpawningComplete; }

    /**
     * @param {object} state Game state
     * @returns {object} Daily performance stats
     */
    function calculateDayStats(state) { // Calculate total orders served and failed
let totalOrders = 0;
let completedOrders = 0;
let failedOrders = 0;

if (state.orderHistory) {
  totalOrders = state.orderHistory.length;
  completedOrders = state.orderHistory.filter(order => order.completed).length;
  failedOrders = state.orderHistory.filter(order => order.failed || order.timeExpired).length;
}

// Calculate accuracy stats
let totalAccuracy = 0;
let accuracyCount = 0;
if (state.orderHistory) {
  for (let order of state.orderHistory) {
    if (order.completed && order.accuracy !== undefined) {
      totalAccuracy += order.accuracy;
      accuracyCount++;
    }
  }
}
let averageAccuracy = accuracyCount > 0 ? totalAccuracy / accuracyCount : 0;

// Calculate revenue and tips
let totalRevenue = state.money - (state.startingMoney || 50);
let totalTips = 0;
if (state.orderHistory) {
  totalTips = state.orderHistory.reduce((sum, order) => {
    return sum + (order.tip || 0);
  }, 0);
}

// Calculate time stats
let dayDuration = state.dayTimeLimit || 300; // 5 minutes default
let timeUsed = dayDuration - (state.timeRemaining || 0);
let efficiency = dayDuration > 0 ? timeUsed / dayDuration : 0;

// Calculate customer satisfaction
let happyCustomers = 0;
let totalCustomerRatings = 0;
let ratingCount = 0;

if (state.orderHistory) {
  for (let order of state.orderHistory) {
    if (order.completed) {
      if (order.accuracy >= 0.8) {
        happyCustomers++;
      }
      if (order.customerRating !== undefined) {
        totalCustomerRatings += order.customerRating;
        ratingCount++;
      }
    }
  }
}

let averageRating = ratingCount > 0 ? totalCustomerRatings / ratingCount : 0;
let satisfactionRate = totalOrders > 0 ? happyCustomers / totalOrders : 0;

// Calculate performance grade
let grade = 'F';
let score = 0;

if (completedOrders > 0) {
  score = (completedOrders / Math.max(totalOrders, 1)) * 0.4 +
          averageAccuracy * 0.3 +
          satisfactionRate * 0.2 +
          efficiency * 0.1;
  
  if (score >= 0.9) grade = 'A+';
  else if (score >= 0.8) grade = 'A';
  else if (score >= 0.7) grade = 'B';
  else if (score >= 0.6) grade = 'C';
  else if (score >= 0.5) grade = 'D';
}

return {
  totalOrders,
  completedOrders,
  failedOrders,
  averageAccuracy: Math.round(averageAccuracy * 100) / 100,
  totalRevenue,
  totalTips,
  timeUsed: Math.round(timeUsed),
  dayDuration,
  efficiency: Math.round(efficiency * 100) / 100,
  happyCustomers,
  satisfactionRate: Math.round(satisfactionRate * 100) / 100,
  averageRating: Math.round(averageRating * 100) / 100,
  grade,
  score: Math.round(score * 100) / 100
}; }

    /**
     * Initializes game state and wires all event listeners
     */
    function startGame() { gameState = initState();
    render(gameState);

    // Home screen buttons
    document.getElementById('start-day-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'start_day' });
        render(gameState);
    });

    document.getElementById('upgrades-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'show_upgrades' });
        render(gameState);
    });

    document.getElementById('tutorial-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'show_tutorial' });
        render(gameState);
    });

    // Navigation buttons
    document.getElementById('home-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'go_home' });
        render(gameState);
    });

    document.getElementById('menu-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'show_menu' });
        render(gameState);
    });

    document.getElementById('settings-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'show_settings' });
        render(gameState);
    });

    document.getElementById('pause-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'toggle_pause' });
        render(gameState);
    });

    // Close buttons
    document.getElementById('tutorial-close-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'go_home' });
        render(gameState);
    });

    document.getElementById('settings-close-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'go_home' });
        render(gameState);
    });

    document.getElementById('leaderboard-close-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'go_home' });
        render(gameState);
    });

    // Game result screen buttons
    document.getElementById('play-again-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'restart_game' });
        render(gameState);
    });

    document.getElementById('main-menu-btn').addEventListener('click', () => {
        gameState = handleAction(gameState, { type: 'go_home' });
        render(gameState);
    });

    // Game timer for real-time updates
    let lastTime = 0;
    function gameLoop(currentTime) {
        if (lastTime === 0) lastTime = currentTime;
        let deltaTime = currentTime - lastTime;
        lastTime = currentTime;

        if (gameState.screen === 'shop_floor' && !gameState.paused) {
            updateGameTime(gameState, deltaTime);
            render(gameState);
            
            if (isDayComplete(gameState)) {
                gameState = handleAction(gameState, { type: 'end_day' });
                render(gameState);
            }
        }
        
        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop); }

    document.addEventListener('DOMContentLoaded', startGame);
          function getPieceEmoji(pieceType) { const emojis = ['☕','🫘','🧋','🍵','🥤','☕']; return emojis[pieceType - 1] || emojis[0]; }
