<script>
// KiX Platform Score Bridge — DO NOT REMOVE
(function(){
  var _kixFinalScore = 0;
  var _kixReported = false;
  window._kixSetScore = function(s) { _kixFinalScore = Math.round(s); };
  window._kixUpdateScore = function(s) {
    _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_score_update', score:_kixFinalScore}, '*'); } catch(e){}
  };
  window._kixEndGame = function(s) {
    if (_kixReported) return;
    _kixReported = true;
    if (s !== undefined) _kixFinalScore = Math.round(s);
    try { window.parent.postMessage({type:'kix_game_end', score:_kixFinalScore}, '*'); } catch(e){}
  };
  // Safety net: if game doesn't call _kixEndGame, report on unload
  window.addEventListener('beforeunload', function() {
    if (!_kixReported && _kixFinalScore > 0) window._kixEndGame();
  });
})();
</script>

    <script>
        let gameState = {};

        /** @returns {object} */
        function initState() { return {
    screen: 'home',
    board: [],
    selectedCell: null,
    selectedPiece: null,
    score: 0,
    moves: 30,
    currentLevel: 1,
    gameActive: false,
    gameOver: false,
    won: false,
    coins: 100,
    highScores: [],
    settings: {
        soundEnabled: true,
        musicEnabled: true,
        difficulty: 'normal'
    },
    boardSize: 8,
    pieceTypes: 6,
    targetScore: 1000,
    levelConfig: {
        targetScore: 1000,
        maxMoves: 30,
        moves: 30
    },
    animations: []

        /** @param {object} state @param {object} action @returns {object} */
        function handleAction(state, action) { let newState = { ...state };

switch (action.type) {
    case 'navigate':
        newState.screen = action.screen;
        break;

    case 'start_game':
        startLevel(newState, 1);
        newState.screen = 'gameplay';
        newState.gameActive = true;
        newState.gameOver = false;
        break;

    case 'show_levels':
        newState.screen = 'level_select';
        break;

    case 'select_level':
        startLevel(newState, action.level);
        newState.screen = 'gameplay';
        newState.gameActive = true;
        newState.gameOver = false;
        break;

    case 'pause_game':
        newState.screen = 'pause_menu';
        break;

    case 'resume_game':
        newState.screen = 'gameplay';
        break;

    case 'restart_level':
        if (newState.currentLevel) {
            startLevel(newState, newState.currentLevel);
            newState.screen = 'gameplay';
            newState.gameActive = true;
            newState.gameOver = false;
        }
        break;

    case 'quit_game':
    case 'quit_to_menu':
        newState.screen = 'home';
        newState.gameActive = false;
        break;

    case 'cell_click':
        if (newState.screen === 'gameplay' && !newState.gameOver) {
            handleCellClickAction(newState, action.row, action.col);
        }
        break;

    case 'next_level':
        let nextLevel = newState.currentLevel + 1;
        if (nextLevel <= 20) {
            startLevel(newState, nextLevel);
            newState.screen = 'gameplay';
            newState.gameActive = true;
            newState.gameOver = false;
        } else {
            newState.screen = 'home';
        }
        break;

    case 'retry_level':
        if (newState.currentLevel) {
            startLevel(newState, newState.currentLevel);
            newState.screen = 'gameplay';
            newState.gameActive = true;
            newState.gameOver = false;
        }
        break;

    case 'go_home':
        newState.screen = 'home';
        newState.gameActive = false;
        break;

    case 'show_shop':
        newState.screen = 'shop';
        break;

    case 'show_scores':
        newState.screen = 'high_scores';
        break;

    case 'show_settings':
        newState.screen = 'settings';
        break;

    case 'back':
    case 'go_back':
        if (newState.screen === 'level_select' || newState.screen === 'shop' || 
            newState.screen === 'high_scores' || newState.screen === 'settings') {
            newState.screen = 'home';
        } else if (newState.screen === 'pause_menu') {
            newState.screen = 'gameplay';
        } else if (newState.screen === 'game_result') {
            newState.screen = 'home';
        }
        break;

    case 'GAME_OVER':
        newState.gameOver = true;
        newState.won = false;
        newState.screen = 'game_result';
        break;

    case 'LEVEL_COMPLETE':
        newState.gameOver = true;
        newState.won = true;
        newState.screen = 'game_result';
        break;

    default:
        // No action taken for unknown action types
        break;
}

return newState; }

        /** @param {object} state @param {number} row @param {number} col */
        function handleCellClickAction(state, row, col) {
            // Get current cell value
            let currentPiece = state.board[row][col];
            if (currentPiece === 0 || currentPiece === null) return;
            
            // If no piece is selected, select this piece
            if (!state.selectedPiece) {
                state.selectedPiece = { row, col };
                return;
            }
            
            // If clicking the same piece, deselect it
            if (state.selectedPiece.row === row && state.selectedPiece.col === col) {
                state.selectedPiece = null;
                return;
            }
            
            // Check if pieces are adjacent
            let rowDiff = Math.abs(state.selectedPiece.row - row);
            let colDiff = Math.abs(state.selectedPiece.col - col);
            let isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            
            if (!isAdjacent) {
                // Not adjacent, select this piece instead
                state.selectedPiece = { row, col };
                return;
            }
            
            // Try to swap pieces
            if (isValidSwap(state, state.selectedPiece.row, state.selectedPiece.col, row, col)) {
                // Valid swap - perform it
                state = swapPieces(state, state.selectedPiece.row, state.selectedPiece.col, row, col);
                state.selectedPiece = null;
                state.moves--;
                
                // Process matches
                let matches = findMatches(state);
                while (matches.length > 0) {
                    state = removeMatches(state, matches);
                    state = dropPieces(state);
                    state = fillEmpty(state);
                    matches = findMatches(state);
                }
                
                // Check for game over conditions
                if (isLevelComplete(state)) {
                    state.gameOver = true;
                    state.won = true;
                } else if (isGameOver(state)) {
                    state.gameOver = true;
                    state.won = false;
                }
            } else {
                // Invalid swap - just deselect
                state.selectedPiece = null;
            }
        }

        /** @param {object} state */

// Update score display
let scoreElement = document.getElementById('score');
if (scoreElement) {
    scoreElement.textContent = state.score || 0;
}

// Update moves display
let movesElement = document.getElementById('moves');
if (movesElement) {
    movesElement.textContent = state.moves || 0;
}

// Render game board if on gameplay screen
if (state.screen === 'gameplay') {
    renderBoard(state);
}

// Render level select grid
if (state.screen === 'level_select') {
    let levelGrid = document.getElementById('level-grid');
    if (levelGrid) {
        levelGrid.innerHTML = '';
        for (let i = 1; i <= 20; i++) {
            let levelBtn = document.createElement('button');

            levelGrid.appendChild(levelBtn);

}

// Render game result screen
if (state.screen === 'game_result') {

    if (resultTitle && resultStats) {
        if (state.won) {

        } else {
            resultTitle.textContent = 'Game Over';
            resultTitle.className = 'text-3xl font-bold mb-4 text-red-400';

        resultStats.innerHTML = `
            <div class="text-xl">Final Score: ${state.score || 0}</div>

    }
    
    // Show/hide next level button based on win state
    let nextLevelBtn = document.getElementById('next-level-btn');
    if (nextLevelBtn) {
        nextLevelBtn.style.display = state.won ? 'block' : 'none';
    }
}

// Render high scores
if (state.screen === 'high_scores') {
    let scoresList = document.getElementById('scores-list');
    if (scoresList) {
        scoresList.innerHTML = '';
        let scores = state.highScores || [];
        if (scores.length === 0) {
            scoresList.innerHTML = '<div class="text-center text-gray-400">No scores yet</div>';
        } else {
            scores.forEach((score, index) => {

                scoreItem.innerHTML = `
                    <span>#${index + 1}</span>
                    <span>Level ${score.level || 1}</span>
                    <span>${score.score || 0}</span>
                `;
                scoresList.appendChild(scoreItem);
            });
        }
    }
}

// Render shop
if (state.screen === 'shop') {
    let shopItems = document.getElementById('shop-items');
    if (shopItems) {
        shopItems.innerHTML = `
            <div class="bg-gray-700 p-4 rounded">
                <h3 class="font-bold mb-2">Extra Moves</h3>
                <p class="text-sm text-gray-300 mb-2">Get 5 extra moves for tough levels</p>
                <button class="bg-green-600 px-4 py-2 rounded font-bold">Buy - 100 coins</button>
            </div>
            <div class="bg-gray-700 p-4 rounded">
                <h3 class="font-bold mb-2">Hint System</h3>
                <p class="text-sm text-gray-300 mb-2">Show possible moves when stuck</p>
                <button class="bg-green-600 px-4 py-2 rounded font-bold">Buy - 200 coins</button>
            </div>
        `;
    }
}

// Render settings
if (state.screen === 'settings') {
    let settingsContent = document.getElementById('settings-content');
    if (settingsContent) {
        settingsContent.innerHTML = `
            <div class="bg-gray-700 p-4 rounded">
                <h3 class="font-bold mb-2">Sound Effects</h3>
                <button class="bg-blue-600 px-4 py-2 rounded font-bold">On</button>
            </div>
            <div class="bg-gray-700 p-4 rounded">
                <h3 class="font-bold mb-2">Music</h3>
                <button class="bg-blue-600 px-4 py-2 rounded font-bold">On</button>
            </div>
            <div class="bg-gray-700 p-4 rounded">
                <h3 class="font-bold mb-2">Difficulty</h3>
                <button class="bg-blue-600 px-4 py-2 rounded font-bold">Normal</button>
            </div>
        `;
    }
} }

        /** @param {string} screenId */
        function showScreen(screenId) { let screens = document.querySelectorAll('.screen');
screens.forEach(screen => screen.classList.remove('active'));

let targetScreen = document.getElementById(screenId + '-screen');
if (targetScreen) {
    targetScreen.classList.add('active');
} }

        /** @param {object} state @returns {Array<Array<number>>} */
        function generateBoard(state) { // Generate a new 8x8 board with random pieces
let board = [];
for (let row = 0; row < 8; row++) {
    board[row] = [];
    for (let col = 0; col < 8; col++) {
        // Generate random piece type (0-5 for different colors, indexed from 0)
        let pieceType;
        let attempts = 0;
        do {
            pieceType = Math.floor(Math.random() * 6);
            attempts++;
        } while (attempts < 10 && (
            // Avoid horizontal matches of 3
            (col >= 2 && board[row][col-1] === pieceType && board[row][col-2] === pieceType) ||
            // Avoid vertical matches of 3
            (row >= 2 && board[row-1] && board[row-1][col] === pieceType && 
             board[row-2] && board[row-2][col] === pieceType)
        ));
        
        board[row][col] = pieceType;
    }
}
return board; }

        /** @param {object} state */
        function renderBoard(state) { let boardEl = document.getElementById('game-board');
    if (!boardEl) return;
    
    boardEl.innerHTML = '';
    
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            let cell = document.createElement('div');
            cell.className = 'board-cell';
            
            let piece = document.createElement('div');
            piece.className = 'game-piece';
            
            let pieceType = state.board[row][col];
            let pieceColors = ['piece-red', 'piece-blue', 'piece-green', 'piece-yellow', 'piece-purple', 'piece-orange'];
            
            if (pieceType >= 0 && pieceType < pieceColors.length) {
                piece.classList.add(pieceColors[pieceType]);
                piece.textContent = pieceType + 1;
            }
            
            if (state.selectedPiece && state.selectedPiece.row === row && state.selectedPiece.col === col) {
                piece.classList.add('selected');
            }
            
            piece.addEventListener('click', () => {
                gameState = handleAction(gameState, { type: 'cell_click', row: row, col: col });
                render(gameState);
                
                // Check for game over conditions after render
                if (gameState.gameOver) {
                    if (gameState.won) {
                        gameState = handleAction(gameState, { type: 'LEVEL_COMPLETE' });
                    } else {
                        gameState = handleAction(gameState, { type: 'GAME_OVER' });
                    }
                    render(gameState);
                }
            });
            
            cell.appendChild(piece);
            boardEl.appendChild(cell);
        }
    } }

        /** @param {object} state @param {number} row @param {number} col */
        function handleCellClick(state, row, col) { // Get current cell value
    let currentPiece = state.board[row][col];
    if (currentPiece === 0) return {}; // Can't click empty cells
    
    // If no piece is selected, select this piece
    if (!state.selectedPiece) {
        let newState = { ...state };
        newState.selectedPiece = { row, col };
        gameState = newState;
        render(gameState);
        return {};
    }
    
    // If clicking the same piece, deselect it
    if (state.selectedPiece.row === row && state.selectedPiece.col === col) {
        let newState = { ...state };
        newState.selectedPiece = null;
        gameState = newState;
        render(gameState);
        return {};
    }
    
    // Check if pieces are adjacent
    let rowDiff = Math.abs(state.selectedPiece.row - row);
    let colDiff = Math.abs(state.selectedPiece.col - col);
    let isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
    
    if (!isAdjacent) {
        // Not adjacent, select this piece instead
        let newState = { ...state };
        newState.selectedPiece = { row, col };
        gameState = newState;
        render(gameState);
        return {};
    }
    
    // Try to swap pieces
    if (isValidSwap(state, state.selectedPiece.row, state.selectedPiece.col, row, col)) {
        // Valid swap - perform it
        let newState = swapPieces(state, state.selectedPiece.row, state.selectedPiece.col, row, col);
        newState.selectedPiece = null;
        newState.moves--;
        
        // Process matches
        let matches = findMatches(newState);
        if (matches.length > 0) {
            newState = removeMatches(newState, matches);
            newState = dropPieces(newState);
            newState = fillEmpty(newState);
            
            // Keep processing cascading matches
            while (true) {
                let cascadeMatches = findMatches(newState);
                if (cascadeMatches.length === 0) break;
                newState = removeMatches(newState, cascadeMatches);
                newState = dropPieces(newState);
                newState = fillEmpty(newState);
            }
        }
        
        gameState = newState;
        render(gameState);
        
        // Check for game over conditions
        if (isGameOver(gameState)) {
            gameState = handleAction(gameState, { type: 'GAME_OVER' });
            render(gameState);
        } else if (isLevelComplete(gameState)) {
            gameState = handleAction(gameState, { type: 'LEVEL_COMPLETE' });
            render(gameState);
        }
    } else {
        // Invalid swap - just deselect
        let newState = { ...state };
        newState.selectedPiece = null;
        gameState = newState;
        render(gameState);
    } }

        /** @param {object} state @returns {Array<Array<[number,number]>>} */
        function findMatches(state) { let matches = [];
let visited = new Set();

// Check horizontal matches
for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
        if (state.board[row][col] === 0 || state.board[row][col] === null) continue;
        
        let currentType = state.board[row][col];
        let matchGroup = [];
        let startCol = col;
        
        // Count consecutive pieces of same type horizontally
        while (col < 8 && state.board[row][col] === currentType) {
            matchGroup.push([row, col]);
            col++;
        }
        
        // If we found 3 or more in a row, add to matches
        if (matchGroup.length >= 3) {
            matches.push(matchGroup);
        }
        
        // Reset col to continue from where we left off
        col = startCol;
    }
}

// Check vertical matches
for (let col = 0; col < 8; col++) {
    for (let row = 0; row < 8; row++) {
        if (state.board[row][col] === 0 || state.board[row][col] === null) continue;
        
        let currentType = state.board[row][col];
        let matchGroup = [];
        let startRow = row;
        
        // Count consecutive pieces of same type vertically
        while (row < 8 && state.board[row][col] === currentType) {
            matchGroup.push([row, col]);
            row++;
        }
        
        // If we found 3 or more in a column, add to matches
        if (matchGroup.length >= 3) {
            matches.push(matchGroup);
        }
        
        // Reset row to continue from where we left off
        row = startRow;
    }
}

return matches; }

        /** @param {object} state @param {Array<Array<[number,number]>>} matches @returns {object} */
        function removeMatches(state, matches) { let newState = JSON.parse(JSON.stringify(state));
    let totalScore = 0;
    
    for (let matchGroup of matches) {
        for (let [row, col] of matchGroup) {
            if (newState.board[row] && newState.board[row][col] !== null) {
                // Award points based on piece type
                let pieceType = newState.board[row][col];
                let points = 10; // Base points per piece
                
                // Bonus points for larger matches
                if (matchGroup.length >= 4) {
                    points *= 2;
                }
                if (matchGroup.length >= 5) {
                    points *= 2;
                }
                
                totalScore += points;
                
                // Remove the piece from the board
                newState.board[row][col] = null;
            }
        }
    }
    
    // Add to total score
    newState.score += totalScore;; if (window._kixUpdateScore) window._kixUpdateScore(newState.score);
    
    return newState; }

        /** @param {object} state @returns {object} */
        function dropPieces(state) { let newBoard = state.board.map(row => [...row]);
    let changed = false;

    // Process each column from bottom to top
    for (let col = 0; col < newBoard[0].length; col++) {
        // Collect non-empty pieces from bottom to top
        let pieces = [];
        for (let row = newBoard.length - 1; row >= 0; row--) {
            if (newBoard[row][col] !== 0 && newBoard[row][col] !== null) {
                pieces.push(newBoard[row][col]);
            }
        }

        // Clear the column
        for (let row = 0; row < newBoard.length; row++) {
            newBoard[row][col] = 0;
        }

        // Place pieces at the bottom
        for (let i = 0; i < pieces.length; i++) {
            let targetRow = newBoard.length - 1 - i;
            newBoard[targetRow][col] = pieces[i];
        }
    }

    // Check if any pieces actually moved by comparing with original
    for (let row = 0; row < state.board.length; row++) {
        for (let col = 0; col < state.board[row].length; col++) {
            if (state.board[row][col] !== newBoard[row][col]) {
                changed = true;
                break;
            }
        }
        if (changed) break;
    }

    return {
        ...state,
        board: newBoard
    }; }

        /** @param {object} state @returns {object} */
        function fillEmpty(state) { let newState = { ...state };
    let board = newState.board.map(row => [...row]);
    let changed = false;

    // Fill empty cells (0 or null) with new random pieces from the top
    for (let col = 0; col < board[0].length; col++) {
        for (let row = 0; row < board.length; row++) {
            if (board[row][col] === 0 || board[row][col] === null) {
                board[row][col] = Math.floor(Math.random() * 6);
                changed = true;
            }
        }
    }

    newState.board = board;
    return newState; }

        /** @param {object} state @param {number} row1 @param {number} col1 @param {number} row2 @param {number} col2 @returns {boolean} */
        function isValidSwap(state, row1, col1, row2, col2) { // Check if two positions are adjacent (horizontally or vertically)
let rowDiff = Math.abs(row1 - row2);
let colDiff = Math.abs(col1 - col2);
let isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);

if (!isAdjacent) {
    return false;
}

// Create a temporary state with swapped pieces
let tempState = JSON.parse(JSON.stringify(state));
let temp = tempState.board[row1][col1];
tempState.board[row1][col1] = tempState.board[row2][col2];
tempState.board[row2][col2] = temp;

// Check if the swap creates any matches
let matches = findMatches(tempState);
return matches.length > 0; }

        /** @param {object} state @param {number} row1 @param {number} col1 @param {number} row2 @param {number} col2 @returns {object} */
        function swapPieces(state, row1, col1, row2, col2) { let newBoard = state.board.map(row => [...row]);
    
    // Swap the pieces
    let temp = newBoard[row1][col1];
    newBoard[row1][col1] = newBoard[row2][col2];
    newBoard[row2][col2] = temp;
    
    return {
        ...state,
        board: newBoard
    }; }

        /** @param {object} state @returns {boolean} */
        function hasValidMoves(state) { // Check if there are any valid moves available on the board
    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            // Check horizontal swap (right)
            if (col < 7) {
                if (isValidSwap(state, row, col, row, col + 1)) {
                    return true;
                }
            }
            
            // Check vertical swap (down)
            if (row < 7) {
                if (isValidSwap(state, row, col, row + 1, col)) {
                    return true;
                }
            }
        }
    }
    
    return false; }

        /** @param {object} state @returns {boolean} */
        function isGameOver(state) { return state.moves <= 0 && !isLevelComplete(state); }

        /** @param {object} state @returns {boolean} */
        function isLevelComplete(state) { // Check if the level is complete based on the current level's objectives
if (!state.levelConfig) {
    return state.score >= 1000; // Default target
}

let config = state.levelConfig;

// Check score objective
if (config.targetScore && state.score >= config.targetScore) {
    return true;
}

// Default to false if target not reached
return false; }

        /** @param {object} state @param {number} level */
        function startLevel(state, level) { state.currentLevel = level;
    
    let levelConfig = getLevelConfig(level);
    state.levelConfig = levelConfig;
    state.targetScore = levelConfig.targetScore;
    state.moves = levelConfig.moves;
    state.score = 0;
    state.selectedCell = null;
    state.selectedPiece = null;
    state.board = generateBoard(state);
    state.gameActive = true;
    state.gameOver = false;
    state.won = false;
    
    // Keep generating new boards until we get one without initial matches
    while (findMatches(state).length > 0) {
        state.board = generateBoard(state);
    } }

        /** @param {number} level @returns {object} */
        function getLevelConfig(level) { return {
        moves: Math.max(20, 35 - level),
        targetScore: level * 1000 + 500,
        boardSize: 8,
        pieceTypes: Math.min(6, 4 + Math.floor(level / 3)),
        timeLimit: level > 10 ? Math.max(60, 180 - level * 5) : null,
        specialObjectives: level > 5 ? {
            collectSpecial: Math.floor(level / 5) * 2
        } : null
    }; }
