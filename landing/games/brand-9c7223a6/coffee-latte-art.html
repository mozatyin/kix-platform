<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game</title>
    <style>
        @layer reset, engine, foundation, board-template, game;
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --bg: #1a1a2e;
            --text: #ffffff;
            --cell-bg: color-mix(in srgb, #1a1a2e 70%, white 30%);
        }
        @layer engine {
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            flex: 1;
            width: 100%;
            gap: 12px;
        }
        .screen.active {
            display: flex;
        }
        h1, h2 {
            text-align: center;
            margin: 16px 0;
        }
        .menu-btn {
            background: linear-gradient(145deg, var(--accent), color-mix(in srgb, var(--accent) 80%, black));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: transform 0.1s, opacity 0.1s;
        }
        .menu-btn:active { transform: scale(0.97); opacity: 0.9; }
        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        .board-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            overflow: hidden;
        }
        #game_board, [id$="_board"].screen {
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
            justify-content: space-between;
            gap: 4px;
            padding: 4px 0;
        }
        #game_board .board-container, [id$="_board"].screen .board-container {
            flex: 1 1 0;
            min-height: 0;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-grid > .players-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .game-grid > .players-container > div:not(.player-piece):not(.player-token) {
            display: none !important;
        }
        [data-role="action_buttons"] {
            flex-shrink: 0;
            padding: 10px 8px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        }
        /* __GAME_CSS_START__ */
@layer game {
  @scope (#game_board) {
:root {
  --coffee-dark: #3b1f0a;
  --coffee-mid: #6f3d1b;
  --coffee-light: #c8843a;
  --coffee-cream: #f5e6c8;
  --coffee-foam: #fdf6e3;
  --coffee-accent: #d4a056;
  --coffee-highlight: #ffe0a0;
  --coffee-shadow: rgba(59, 31, 10, 0.4);
}

.cell {
  background: var(--coffee-cream);
  border: 1px solid var(--coffee-light);
  border-radius: 4px;
  transition: background 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}

.cell:hover {
  background: var(--coffee-highlight);
  box-shadow: inset 0 0 6px var(--coffee-shadow);
}

.cell.selected {
  background: var(--coffee-accent);
  box-shadow: 0 0 0 3px var(--coffee-dark), inset 0 0 8px var(--coffee-shadow);
}

.cell.highlighted {
  background: var(--coffee-foam);
  box-shadow: 0 0 0 2px var(--coffee-light);
}

.piece {
  width: 80%;
  height: 80%;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 1.2em;
  font-weight: bold;
  box-shadow: 0 3px 8px var(--coffee-shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  cursor: pointer;
  position: relative;
}

.piece:hover {
  transform: scale(1.08);
  box-shadow: 0 5px 14px var(--coffee-shadow);
}

.piece.selected {
  transform: scale(1.12);
  box-shadow: 0 0 0 3px var(--coffee-foam), 0 5px 16px var(--coffee-shadow);
  animation: pulse-piece 1s ease-in-out infinite alternate;
}

.piece.red {
  background: radial-gradient(circle at 35% 35%, #c8843a, #6f3d1b);
  color: var(--coffee-foam);
  border: 2px solid var(--coffee-dark);
}

.piece.black {
  background: radial-gradient(circle at 35% 35%, #5a3010, #1e0e04);
  color: var(--coffee-cream);
  border: 2px solid var(--coffee-accent);
}

.piece.white {
  background: radial-gradient(circle at 35% 35%, #fdf6e3, #e8d5b0);
  color: var(--coffee-dark);
  border: 2px solid var(--coffee-mid);
}

.piece.blue {
  background: radial-gradient(circle at 35% 35%, #a0c8d4, #3a6f7a);
  color: var(--coffee-foam);
  border: 2px solid #2a4f58;
}

@keyframes pulse-piece {
  from { box-shadow: 0 0 0 3px var(--coffee-foam), 0 5px 16px var(--coffee-shadow); }
  to   { box-shadow: 0 0 0 5px var(--coffee-accent), 0 6px 20px var(--coffee-shadow); }
}

@keyframes place-token {
  0%   { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  80%  { transform: scale(1.1) rotate(3deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.piece.placed {
  animation: place-token 0.3s ease-out forwards;
}

#game_grid {
  background: radial-gradient(ellipse at center, #d4a056 0%, #8b5e2a 60%, #3b1f0a 100%);
  border-radius: 8px;
  padding: 6px;
  box-shadow: 0 6px 24px var(--coffee-shadow);
}
  }
}
/* __GAME_CSS_END__ */

    var _validScreens = {};
    function showScreen(id) {
        if (!_validScreens[id]) { console.warn('[engine] unknown screen: ' + id); return; }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
        if (id === 'game_board' && typeof gameState === 'undefined') {
            startGame();
        }
    }

    // ═══ STATE VARIABLES ═══
    let gameState;
    let myPlayerIndex = 0;

    // ═══ GAME LIFECYCLE (deterministic -- before LLM modules for truncation safety) ═══
    function startGame(mode) {
        if (mode) gameMode = mode;
        if (typeof gameMode !== 'undefined' && gameMode === 'online') {
            showScreen('multiplayer_ui');
            return;
        }
        gameState = (typeof initState === 'function') ? initState() : {phase:'playing'};
        if (gameState.phase === 'home' || gameState.phase === 'menu') gameState.phase = 'playing';
        window.appState = gameState;
        showScreen('game_board');
        render(gameState);

        _bindBoardClicks();
        if (gameState.currentPlayer !== undefined && gameState.currentPlayer !== myPlayerIndex) {
            if (typeof makeAIMoves === 'function') setTimeout(makeAIMoves, 500);
            else if (typeof makeAIMove === 'function') setTimeout(makeAIMove, 500);
        }
    }

    function _bindBoardClicks() {
        var bc = document.getElementById('board_container');
        if (!bc || bc._clickBound) return;
        bc._clickBound = true;

        bc.addEventListener('click', function(e) {
            if (!gameState || gameState.gameOver) return;
            var el;
            el = e.target.closest('[data-row][data-col]');
            if (el) { onPlayerInput({type: 'cell_click', row: +el.dataset.row, col: +el.dataset.col}); return; }
            el = e.target.closest('[data-position]');
            if (el) { onPlayerInput({type: 'position_click', position: +el.dataset.position}); return; }
            el = e.target.closest('[data-card-index]') || e.target.closest('[data-index]');
            if (el) { onPlayerInput({type: 'card_click', cardIndex: +(el.dataset.cardIndex || el.dataset.index)}); return; }
            el = e.target.closest('[data-pit]');
            if (el) { onPlayerInput({type: 'pit_click', pit: +el.dataset.pit}); return; }
            el = e.target.closest('[data-point]');
            if (el) { onPlayerInput({type: 'point_click', point: +el.dataset.point}); return; }
            el = e.target.closest('[data-dir]');
            if (el) { onPlayerInput({type: 'line_click', row: +el.dataset.r, col: +el.dataset.c, direction: el.dataset.dir}); return; }
            el = e.target.closest('[data-action]');
            if (el) { try { onPlayerInput(JSON.parse(el.dataset.action)); } catch(x) {} return; }
        });
    }

    function showResult(winner) {

        const resultScreen = document.getElementById('game_result')
            || document.querySelector('.screen.active');
        const msg = (resultScreen && resultScreen.querySelector('[data-role="result_message"]'))
            || document.getElementById('result_message');
        const details = (resultScreen && resultScreen.querySelector('[data-role="result_details"]'))
            || document.getElementById('result_details');
        if (msg) {
            if (winner === -1 || winner === 'draw') msg.textContent = "It's a Draw!";
            else if (winner === myPlayerIndex || winner === 'win') msg.textContent = '🎉 You Win!';
            else if (winner === 'lose') msg.textContent = 'You Lose';
            else msg.textContent = 'Game Over';
        }
        if (details && gameState) {
            var parts = [];
            if (gameState.moveCount !== undefined) parts.push('Moves: ' + gameState.moveCount);
            if (gameState.startTime > 0) {
                var dur = Math.floor((Date.now() - gameState.startTime) / 1000);
                parts.push('Duration: ' + Math.floor(dur / 60) + 'm ' + (dur % 60) + 's');
            }

        showScreen('game_result');

    // ═══ INPUT HANDLER (deterministic skeleton) ═══
    function onPlayerInput(action) {

        if (action && action.type === 'new_game') { startGame(gameMode || 'ai'); return; }
        if (!gameState || gameState.gameOver) return;
        const result = handleAction(gameState, 0, action);
        if (result && result.valid) {
            gameState = result.state;
            window.appState = gameState;
            render(gameState);
            if (result.winner !== null && result.winner !== undefined) showResult(result.winner);
            else if (result.navigateTo) showScreen(result.navigateTo);
        }
    }
