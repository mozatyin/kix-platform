name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE_NAME: kix-platform
  REGISTRY: ghcr.io   # TODO: switch to AWS ECR if needed
  # TODO: configure ${AWS_REGION}, ${ECR_REPOSITORY}, ${SLACK_WEBHOOK_URL}

jobs:
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        run: |
          TAG="staging-${GITHUB_SHA::8}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.kix.example.com   # TODO: configure real URL
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure cloud credentials (placeholder)
        run: |
          echo "TODO: configure \${AWS_ACCESS_KEY_ID} / \${AWS_SECRET_ACCESS_KEY} or OIDC role"
          echo "TODO: aws-actions/configure-aws-credentials@v4 once secrets are set"
      - name: Apply k8s manifests (placeholder)
        run: |
          echo "kubectl apply -f deployment/k8s/ --namespace=staging"
          echo "kubectl set image deployment/kix-api kix-api=${{ needs.build-and-push.outputs.image_tag }} -n staging"
          # TODO: configure ${KUBECONFIG_STAGING}
      - name: Wait for rollout
        run: |
          echo "kubectl rollout status deployment/kix-api -n staging --timeout=5m"

  smoke-tests:
    name: Staging smoke tests
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run smoke tests
        env:
          STAGING_BASE_URL: https://staging.kix.example.com
        run: |
          python scripts/smoke_voucher_reserve_claim.py || exit 1
          python scripts/stripe_smoke_test.py || exit 1

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy, smoke-tests]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "Staging deploy ${{ needs.smoke-tests.result == 'success' && 'OK' || 'FAILED' }} — ${{ github.sha }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Staging Deploy*: `${{ github.sha }}`\nBuild: ${{ needs.build-and-push.result }}\nDeploy: ${{ needs.deploy.result }}\nSmoke: ${{ needs.smoke-tests.result }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}   # TODO: configure ${SLACK_WEBHOOK_URL}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
