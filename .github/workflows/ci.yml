name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint (ruff + black + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy
      - name: Ruff
        run: ruff check app/ scripts/ tests/ --output-format=github
      - name: Black
        run: black --check app/ scripts/ tests/
      - name: Mypy
        run: mypy app/ --ignore-missing-imports || true   # TODO: tighten once typed

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kix
          POSTGRES_PASSWORD: kix
          POSTGRES_DB: kix_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kix:kix@localhost:5432/kix_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      - name: Pytest
        run: pytest -n auto --cov=app --cov-report=xml --cov-report=term --maxfail=10
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security-scan:
    name: Security (bandit + safety + trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      - name: Bandit
        run: bandit -r app/ -ll -f txt
      - name: Safety
        run: safety check -r requirements.txt --full-report || true   # TODO: harden
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  secrets-scan:
    name: Secrets (gitleaks + trufflehog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO: configure ${GITLEAKS_LICENSE} for org use
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  i18n-lint:
    name: i18n Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run i18n_lint.py
        run: python scripts/i18n_lint.py

  bible-check:
    name: Bible drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true   # advisory until D2 lands
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run bible_check (if present)
        run: |
          if [ -f scripts/bible_check.py ]; then
            python scripts/bible_check.py
          else
            echo "scripts/bible_check.py not yet present — skipping (D2 will add)."
          fi

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan, secrets-scan, i18n-lint, bible-check]
    if: always()
    steps:
      - name: PR annotation
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const jobs = ${{ toJSON(needs) }};
            const lines = Object.entries(jobs).map(([k, v]) => `- **${k}**: ${v.result}`);
            const body = `### CI Summary\n${lines.join('\n')}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
