upstream go_service {
    server 127.0.0.1:8080;
}

upstream python_service {
    server 127.0.0.1:8000;
}

upstream centrifugo {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name play.kix.app;

    # ─── CORS ───────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin = "https://play.kix.app") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Brand-ID, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ─── Common proxy headers ───────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ─── Go service routes (currently proxied to Python) ────
    # Auth endpoints
    location /api/v1/auth/ {
        proxy_pass http://python_service;
    }

    # Game endpoints
    location /api/v1/game/ {
        proxy_pass http://python_service;
    }

    # Energy endpoints
    location /api/v1/energy/ {
        proxy_pass http://python_service;
    }

    # Leaderboard endpoints
    location /api/v1/leaderboard/ {
        proxy_pass http://python_service;
    }

    # Streak endpoints
    location /api/v1/streak/ {
        proxy_pass http://python_service;
    }

    # ─── Python service routes ──────────────────────────────
    location /api/v1/brands/ {
        proxy_pass http://python_service;
    }

    location /api/v1/users/ {
        proxy_pass http://python_service;
    }

    location /api/v1/analytics/ {
        proxy_pass http://python_service;
    }

    location /api/v1/portal/ {
        proxy_pass http://python_service;
    }

    # ─── Internal endpoints (restricted) ────────────────────
    location /internal/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://python_service;
    }

    # ─── Health checks ──────────────────────────────────────
    location /health {
        proxy_pass http://python_service;
    }

    location /ready {
        proxy_pass http://python_service;
    }

    # ─── WebSocket (Centrifugo) ─────────────────────────────
    location /ws {
        proxy_pass http://centrifugo;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Default: 404 ──────────────────────────────────────
    location / {
        return 404 '{"error": "not_found"}';
        add_header Content-Type application/json;
    }
}
