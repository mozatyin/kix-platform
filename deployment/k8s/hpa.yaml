# Horizontal Pod Autoscaler for the API.
# Scales between 4 and 32 pods based on CPU and concurrent connections.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kix-api
  namespace: kix-cn
  labels:
    app: kix-api
    kix.region: cn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kix-api
  minReplicas: 4
  maxReplicas: 32
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kix-push-worker
  namespace: kix-cn
  labels:
    app: kix-push-worker
    kix.region: cn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kix-push-worker
  minReplicas: 2
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
