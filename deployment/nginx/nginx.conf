# KiX nginx — top-level. Per-region behavior in conf.d/<region>.conf.
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────
    log_format kix_main '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'region=$kix_region rt=$request_time uct=$upstream_connect_time '
                       'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log kix_main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 32 8k;

    # ── Compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/x-font-ttf image/svg+xml;

    # ── Rate limiting (per IP) ────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_rl:20m   rate=100r/s;
    limit_req_zone  $binary_remote_addr zone=auth_rl:10m  rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=write_rl:20m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_lim:10m;

    # ── Region detection (env-injected default) ───────────────────────
    map $http_x_kix_region $kix_region {
        default            $kix_region_default;
        cn                 cn;
        id                 id;
        sg                 sg;
        us                 us;
        eu                 eu;
    }

    # ── SSL defaults ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers (applied per-region) ─────────────────────────
    add_header X-Frame-Options           "DENY"          always;
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    include /etc/nginx/conf.d/*.conf;
}
