# ID region nginx vhost.
map "" $kix_region_default { default "id"; }

upstream kix_api_id {
    least_conn;
    server kix-api-1:8000 max_fails=3 fail_timeout=30s;
    server kix-api-2:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name id.api.letskix.com id.partner.letskix.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name id.api.letskix.com id.partner.letskix.com;

    ssl_certificate     /etc/nginx/ssl/id.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/id.privkey.pem;

    add_header X-KiX-Region "id" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn conn_lim 100;

    location ~ ^/api/v1/(auth|portal_auth)/ {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://kix_api_id;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/api/v1/.*/(create|update|delete|topup|charge)$ {
        limit_req zone=write_rl burst=60 nodelay;
        proxy_pass http://kix_api_id;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_rl burst=200 nodelay;
        proxy_pass http://kix_api_id;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location ~ ^/(health|ready|metrics)$ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://kix_api_id;
    }

    location / {
        proxy_pass http://kix_api_id;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
