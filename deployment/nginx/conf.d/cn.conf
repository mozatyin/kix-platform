# CN region nginx vhost.
map "" $kix_region_default { default "cn"; }

upstream kix_api_cn {
    least_conn;
    server kix-api-1:8000 max_fails=3 fail_timeout=30s;
    server kix-api-2:8000 max_fails=3 fail_timeout=30s;
    server kix-api-3:8000 max_fails=3 fail_timeout=30s;
    server kix-api-4:8000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name cn.api.letskix.com cn.partner.letskix.com;
    return 301 https://$host$request_uri;
}

# HTTPS edge
server {
    listen 443 ssl http2;
    server_name cn.api.letskix.com cn.partner.letskix.com;

    ssl_certificate     /etc/nginx/ssl/cn.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cn.privkey.pem;

    add_header X-KiX-Region "cn" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Connection limit
    limit_conn conn_lim 200;

    # Auth endpoints — stricter rate
    location ~ ^/api/v1/(auth|portal_auth)/ {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://kix_api_cn;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Write endpoints — medium rate
    location ~ ^/api/v1/.*/(create|update|delete|topup|charge)$ {
        limit_req zone=write_rl burst=60 nodelay;
        proxy_pass http://kix_api_cn;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # General API
    location /api/ {
        limit_req zone=api_rl burst=200 nodelay;
        proxy_pass http://kix_api_cn;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Health & metrics — no rate limit, internal-only
    location ~ ^/(health|ready|metrics)$ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://kix_api_cn;
    }

    # Default
    location / {
        proxy_pass http://kix_api_cn;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
