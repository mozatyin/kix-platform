# Pre-commit hooks for kix-platform.
# Install: `make install` (runs `pre-commit install`).
# Run all manually: `pre-commit run --all-files`.

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests", "types-PyYAML"]
        args: ["--ignore-missing-imports"]
        files: ^app/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-ll", "-r", "app/"]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: disable}}"]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013", "MD033", "MD041", "--"]

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest fast subset
        entry: pytest -m "fast" -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: i18n-lint
        name: i18n P0 lint
        entry: python scripts/i18n_lint.py --p0-only
        language: system
        pass_filenames: false
        stages: [pre-commit]
