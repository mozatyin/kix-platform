version: "3.8"
services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kix
      POSTGRES_USER: kix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kix_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kix"]
      interval: 10s
      timeout: 3s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "8002:8000"
    volumes:
      - ./config/centrifugo.json:/centrifugo/config.json:ro
    command: centrifugo -c config.json
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-dev_centrifugo_key}

  kix-api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kix
      POSTGRES_USER: kix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kix_dev}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-dev_centrifugo_key}
      CENTRIFUGO_URL: http://centrifugo:8000
      ELTM_API_URL: http://eltm:8001
      KIX_PUBLIC_BASE_URL: http://kix-api:8000
    env_file:
      - .env
    volumes:
      - games:/app/landing/games

  eltm:
    build:
      context: ../eltm
    ports:
      - "8001:8001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KIX_GAMES_DIR: /app/landing/games
      ELTM_CALLBACK_SECRET: ${ELTM_CALLBACK_SECRET:-}
    volumes:
      - games:/app/landing/games

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kix-api
      - centrifugo

volumes:
  pgdata:
  redisdata:
  games:
